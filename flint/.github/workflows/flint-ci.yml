name: CI

on:
  push:
    branches: [main]
    paths:
      - 'flint/**'
      - '.github/workflows/flint-ci.yml'
  pull_request:
    paths:
      - 'flint/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: flint

jobs:
  lint-and-test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # flint ha bisogno dello storico git

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'flint/uv.lock'

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Format check with ruff
        run: uv run ruff format --check .

      - name: Type check with mypy
        run: uv run mypy src

      - name: Run tests
        run: uv run pytest

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: flint/htmlcov
          if-no-files-found: ignore

  flint-self-check:
    name: Caveman self-check (dogfooding)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50 # ultimi 50 commit per l'analisi

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install flint
        working-directory: flint
        run: uv sync

      - name: Run flint status sul repo
        run: |
          cd flint
          uv run flint status --repo ..
        continue-on-error: true # non blocca la CI, è solo informativo
