<html lang="it"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evo-Tactics — Playtest</title>
<style>
  :root {
    --bg:       #0f1117;
    --surface:  #1a1d27;
    --border:   #2a2d3a;
    --text:     #d4d2c8;
    --muted:    #6b6a62;
    --p1:       #3b8bd4;   /* giocatore 1 — blu */
    --p1-light: #b5d4f4;
    --p2:       #e24b4a;   /* sistema — rosso */
    --p2-light: #f7c1c1;
    --hit:      #1d9e75;
    --miss:     #ba7517;
    --cell:     56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 { font-size: 14px; font-weight: 600; letter-spacing: .08em; color: var(--p1-light); }

  #turn-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--muted);
  }

  #turn-badge.player { border-color: var(--p1); color: var(--p1-light); }
  #turn-badge.sistema { border-color: var(--p2); color: var(--p2-light); }

  main {
    display: flex;
    gap: 20px;
    padding: 20px;
    flex: 1;
  }

  /* ── GRIGLIA ── */
  #grid-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .grid-frame {
    display: grid;
    grid-template-columns: 22px 1fr;
    grid-template-rows:    16px 1fr;
    gap: 4px;
  }

  .col-labels {
    grid-column: 2;
    display: grid;
    grid-template-columns: repeat(6, var(--cell));
    gap: 2px;
  }
  .col-labels span {
    text-align: center;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .05em;
  }

  .row-labels {
    grid-row: 2;
    grid-column: 1;
    display: grid;
    grid-template-rows: repeat(6, var(--cell));
    gap: 2px;
  }
  .row-labels span {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 6px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .05em;
  }

  #grid {
    grid-column: 2;
    grid-row: 2;
    display: grid;
    grid-template-columns: repeat(6, var(--cell));
    grid-template-rows:    repeat(6, var(--cell));
    gap: 2px;
  }

  .cell {
    width: var(--cell);
    height: var(--cell);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: background .12s, border-color .12s;
  }

  .cell:hover { background: #222535; border-color: #3a3d50; }

  /* Reachable cell a costo 1 AP (blu standard) */
  .cell.reachable {
    border-color: var(--p1);
    background: rgba(59,139,212,.12);
  }
  .cell.reachable:hover { background: rgba(59,139,212,.22); }

  /* Reachable cell a costo 2 AP (arancio-warning). Visivamente
     distinta per evitare mis-click che consumano tutto il turno. */
  .cell.reachable.reachable-costly {
    border-color: var(--miss);
    background: rgba(186,117,23,.18);
  }
  .cell.reachable.reachable-costly:hover { background: rgba(186,117,23,.30); }

  /* Badge del costo AP in alto a sinistra nella cella reachable */
  .cell-cost {
    position: absolute;
    top: 2px;
    left: 4px;
    font-size: 9px;
    font-weight: 700;
    color: var(--p1-light);
    pointer-events: none;
    opacity: .85;
  }
  .cell.reachable-costly .cell-cost {
    color: #fac775;
  }

  .cell.targetable {
    border-color: var(--p2);
    background: rgba(226,75,74,.1);
  }
  .cell.targetable:hover { background: rgba(226,75,74,.2); }

  /* token unità */
  .token {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    line-height: 1.2;
    border: 2px solid transparent;
    transition: transform .1s;
    pointer-events: none;
  }

  .token.p1 { background: var(--p1); color: #fff; border-color: var(--p1-light); }
  .token.sistema { background: var(--p2); color: #fff; border-color: var(--p2-light); }
  .token.selected { transform: scale(1.1); box-shadow: 0 0 0 3px #fff3; }
  .token.dead { opacity: .25; filter: grayscale(1); }

  .token-job { font-size: 8px; opacity: .8; }

  /* SPRINT_014: badge stato emotivo sovrapposto al token.
     Si posiziona in basso a destra. Emoji + durata in turns. */
  .status-badge {
    position: absolute;
    bottom: 4px;
    right: 4px;
    font-size: 14px;
    line-height: 1;
    filter: drop-shadow(0 0 2px rgba(0,0,0,.8));
    pointer-events: none;
    animation: pulse-status 1.2s ease-in-out infinite;
  }
  @keyframes pulse-status {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.18); }
  }
  /* Glow intorno al token quando c'e' uno stato attivo */
  .cell.has-status-panic   { box-shadow: inset 0 0 12px rgba(255, 204,  79, .35); }
  .cell.has-status-rage    { box-shadow: inset 0 0 12px rgba(226,  75,  74, .50); }
  .cell.has-status-stunned { box-shadow: inset 0 0 12px rgba(192, 132, 252, .40); }

  /* Riga stati attivi nel pannello unit-card */
  .status-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 2px;
  }
  .status-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(0,0,0,.2);
  }
  .status-chip.panic   { border-color: #ffcc4f; color: #ffcc4f; }
  .status-chip.rage    { border-color: var(--p2); color: var(--p2-light); }
  .status-chip.stunned { border-color: #c084fc; color: #c084fc; }
  .status-chip-dur { opacity: .75; font-weight: 700; }

  /* SPRINT_017: scenario picker grid di bottoni */
  .scenario-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .scenario-btn {
    font-size: 10px;
    padding: 6px 4px;
  }
  .scenario-btn.active {
    border-color: var(--p1);
    color: var(--p1-light);
    background: rgba(59,139,212,.18);
  }

  /* ── PANNELLO LATERALE ── */
  aside {
    flex: 1;
    min-width: 260px;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
  }

  .panel-title {
    font-size: 10px;
    letter-spacing: .1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* stat unità */
  .unit-card { display: flex; flex-direction: column; gap: 6px; }

  .unit-header {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600;
  }

  .unit-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .unit-dot.p1 { background: var(--p1); }
  .unit-dot.sistema { background: var(--p2); }

  .stat-row {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted);
  }
  .stat-row span:last-child { color: var(--text); }

  .hp-bar {
    height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .hp-fill {
    height: 100%; border-radius: 2px;
    transition: width .3s;
  }
  .hp-fill.p1 { background: var(--p1); }
  .hp-fill.sistema { background: var(--p2); }

  /* pulsanti */
  .btn {
    width: 100%; padding: 8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: background .12s, border-color .12s;
  }

  .btn:hover { background: #222535; border-color: #3a3d50; }

  .btn.primary {
    border-color: var(--p1);
    color: var(--p1-light);
  }
  .btn.primary:hover { background: rgba(59,139,212,.12); }

  .btn:disabled {
    opacity: .35;
    cursor: not-allowed;
  }

  /* log combattimento */
  #log {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 260px;
  }

  .log-entry {
    font-size: 11px;
    line-height: 1.5;
    padding: 4px 6px;
    border-radius: 3px;
    border-left: 2px solid var(--border);
    color: var(--muted);
  }

  .log-entry.hit  { border-color: var(--hit);  color: #9fe1cb; }
  .log-entry.miss { border-color: var(--miss); color: #fac775; }
  .log-entry.move { border-color: var(--border); color: var(--text); }
  .log-entry.sistema { border-color: var(--p2); color: var(--p2-light); }
  .log-entry.info { border-color: var(--p1); color: var(--p1-light); }
  .log-entry.gameover { border-color: #ffffff55; color: #fff; font-weight:600; }

  /* hint */
  #hint {
    font-size: 11px; color: var(--muted);
    text-align: center; padding: 4px;
    min-height: 20px;
  }

  /* overlay game over */
  #overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
    z-index: 10;
  }
  #overlay.show { display: flex; }
  #overlay h2 { font-size: 24px; }
  #overlay p  { color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<header>
  <h1>EVO-TACTICS · Playtest v0.1</h1>
  <div id="turn-badge">caricamento…</div>
</header>

<main>
  <div id="grid-wrap">
    <div class="grid-frame">
      <div class="col-labels">
        <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
      </div>
      <div class="row-labels">
        <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
      </div>
      <div id="grid"></div>
    </div>
    <div id="hint">Errore: Failed to fetch — backend attivo?</div>
  </div>

  <aside>

    <!-- Unità giocatore -->
    <div class="panel">
      <div class="panel-title">Unità Giocatore</div>
      <div class="unit-card" id="card-p1">
        <div class="unit-header">
          <div class="unit-dot p1"></div>
          <span id="p1-name">—</span>
        </div>
        <div class="hp-bar"><div class="hp-fill p1" id="p1-hp-bar" style="width:100%"></div></div>
        <div class="stat-row"><span>HP</span><span id="p1-hp">—</span></div>
        <div class="stat-row"><span>AP</span><span id="p1-ap">—</span></div>
        <div class="stat-row"><span>Mod</span><span id="p1-mod">—</span></div>
        <div class="stat-row"><span>Trait</span><span id="p1-traits">—</span></div>
        <div class="status-row" id="p1-status"></div>
      </div>
    </div>

    <!-- Unità sistema -->
    <div class="panel">
      <div class="panel-title">Sistema</div>
      <div class="unit-card" id="card-sistema">
        <div class="unit-header">
          <div class="unit-dot sistema"></div>
          <span id="s-name">—</span>
        </div>
        <div class="hp-bar"><div class="hp-fill sistema" id="s-hp-bar" style="width:100%"></div></div>
        <div class="stat-row"><span>HP</span><span id="s-hp">—</span></div>
        <div class="stat-row"><span>Mod</span><span id="s-mod">—</span></div>
        <div class="stat-row"><span>Trait</span><span id="s-traits">—</span></div>
        <div class="status-row" id="s-status"></div>
      </div>
    </div>

    <!-- Azioni -->
    <div class="panel">
      <div class="panel-title">Azioni</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <button class="btn primary" id="btn-end-turn" onclick="endTurn()" disabled="">
          Fine Turno →
        </button>
        <button class="btn" id="btn-new-game" onclick="startSession()">
          Nuova Partita
        </button>
      </div>
    </div>

    <!-- SPRINT_017: Scenari -->
    <div class="panel">
      <div class="panel-title">Scenario</div>
      <div class="scenario-grid">
        <button class="btn scenario-btn active" data-scenario="classic"        onclick="startSession('classic')">Classico</button>
        <button class="btn scenario-btn"        data-scenario="ranger_duel"    onclick="startSession('ranger_duel')">Duello Ranger</button>
        <button class="btn scenario-btn"        data-scenario="caster_vs_tank" onclick="startSession('caster_vs_tank')">Caster vs Tank</button>
        <button class="btn scenario-btn"        data-scenario="mirror_ranger"  onclick="startSession('mirror_ranger')">Mirror Ranger</button>
        <button class="btn scenario-btn"        data-scenario="berserker"     onclick="startSession('berserker')">Berserker</button>
        <button class="btn scenario-btn"        data-scenario="shock_troops"  onclick="startSession('shock_troops')">Shock Troops</button>
      </div>
    </div>

    <!-- Log -->
    <div class="panel" style="flex:1;display:flex;flex-direction:column;min-height:0">
      <div class="panel-title">Log Combattimento</div>
      <div id="log"></div>
    </div>

  </aside>
</main>

<div id="overlay">
  <h2 id="overlay-title">—</h2>
  <p id="overlay-sub">—</p>
  <button class="btn primary" onclick="startSession()" style="width:180px">Nuova Partita</button>
</div>

<script>
const API = 'http://127.0.0.1:3334';

let state       = null;   // stato sessione corrente
let selected    = null;   // id unità selezionata
let maxHp       = {};     // hp iniziali per le barre

/* ── FETCH HELPERS ── */
async function api(path, body) {
  const opts = { method: body ? 'POST' : 'GET', headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
  return r.json();
}

/* SPRINT_017: scenari predefiniti per variare i matchup.
   Ogni scenario configura le unita' con job/range/posizione differenti.
   La chiave `label` appare sul bottone, `desc` nel hint. */
const SCENARIOS = {
  classic: {
    label: 'Classico',
    desc: 'Velox skirmisher r2 vs Carapax vanguard r1',
    units: [
      { id:'unit_1', species:'velox',   job:'skirmisher', traits:['zampe_a_molla'],    controlled_by:'player', position:{x:0,y:0} },
      { id:'unit_2', species:'carapax', job:'vanguard',   traits:['pelle_elastomera'], controlled_by:'sistema', position:{x:5,y:5} },
    ],
  },
  ranger_duel: {
    label: 'Duello Ranger',
    desc: 'Tu velox r2, SIS falco ranger r3 — kite nemico',
    units: [
      { id:'unit_1', species:'velox',  job:'skirmisher', traits:['zampe_a_molla'], controlled_by:'player',  position:{x:0,y:0} },
      { id:'unit_2', species:'falco',  job:'ranger',                                controlled_by:'sistema', position:{x:5,y:5} },
    ],
  },
  caster_vs_tank: {
    label: 'Caster vs Tank',
    desc: 'Tu carapax r1, SIS volpina invoker r3 — sopravvivi al bombardamento',
    units: [
      { id:'unit_1', species:'carapax', job:'vanguard', traits:['pelle_elastomera'], controlled_by:'player',  position:{x:0,y:0} },
      { id:'unit_2', species:'volpina', job:'invoker',                                controlled_by:'sistema', position:{x:5,y:5} },
    ],
  },
  mirror_ranger: {
    label: 'Mirror Ranger',
    desc: 'Entrambi falco ranger r3 — duello di range uguali',
    units: [
      { id:'unit_1', species:'falco', job:'ranger', controlled_by:'player',  position:{x:0,y:0} },
      { id:'unit_2', species:'falco', job:'ranger', controlled_by:'sistema', position:{x:5,y:5} },
    ],
  },
  // SPRINT_018: scenari che mostrano i nuovi trait status-applying
  berserker: {
    label: 'Berserker',
    desc: 'Tu velox + ferocia (rage on kill), SIS lupo intimidatore (panic on melee)',
    units: [
      { id:'unit_1', species:'velox',  job:'skirmisher', traits:['zampe_a_molla','ferocia'], controlled_by:'player',  position:{x:0,y:0} },
      { id:'unit_2', species:'lupo',   job:'vanguard',   traits:['intimidatore'],             controlled_by:'sistema', position:{x:5,y:5} },
    ],
  },
  shock_troops: {
    label: 'Shock Troops',
    desc: 'SIS carapax con stordimento — ogni critico ti storna',
    units: [
      { id:'unit_1', species:'velox',   job:'skirmisher', traits:['zampe_a_molla'], controlled_by:'player',  position:{x:0,y:0} },
      { id:'unit_2', species:'carapax', job:'vanguard',   traits:['pelle_elastomera','stordimento'], controlled_by:'sistema', position:{x:5,y:5} },
    ],
  },
};

let currentScenarioId = 'classic';

/* ── AVVIO SESSIONE ── */
async function startSession(scenarioId) {
  document.getElementById('overlay').classList.remove('show');
  selected = null;
  const id = scenarioId && SCENARIOS[scenarioId] ? scenarioId : currentScenarioId;
  currentScenarioId = id;
  const scenario = SCENARIOS[id];
  setHint(`Avvio ${scenario.label}…`);
  clearLog();
  // Evidenzia il bottone scenario attivo
  document.querySelectorAll('.scenario-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.scenario === id);
  });
  try {
    const res = await api('/api/session/start', { units: scenario.units });
    state = res.state ?? res;
    // salva HP iniziali per le barre
    maxHp = {};
    (state.units || []).forEach(u => { maxHp[u.id] = u.hp; });
    addLog('info', `Scenario: ${scenario.label}`);
    addLog('info', scenario.desc);
    render();
  } catch(e) {
    // fallback: prova a leggere lo stato se la sessione era già aperta
    try {
      state = await api('/api/session/state');
      (state.units || []).forEach(u => { maxHp[u.id] = maxHp[u.id] ?? u.hp; });
      render();
    } catch(e2) {
      setHint(`Errore: ${e.message} — backend attivo?`);
    }
  }
}

/* ── RENDER ── */
function render() {
  if (!state) return;
  renderGrid();
  renderStats();
  const isPlayerTurn = isMyTurn();
  document.getElementById('btn-end-turn').disabled = !isPlayerTurn;
  const badge = document.getElementById('turn-badge');
  badge.textContent = isPlayerTurn ? `Turno ${state.turn} — TUO` : `Turno ${state.turn} — SISTEMA`;
  badge.className   = isPlayerTurn ? 'player' : 'sistema';
  if (!isPlayerTurn) setHint('Il Sistema sta agendo…');
  else {
    const p1 = (state.units || []).find(u => u.id === 'unit_1');
    const apLeft = p1?.ap_remaining ?? p1?.ap ?? 0;
    if (apLeft <= 0) setHint('Nessun AP residuo — termina il turno');
    else if (!selected) setHint('Clicca la tua unità per selezionarla');
  }
}

// SPRINT_014: stato → emoji. Priorita' visiva: stunned > rage > panic.
const STATUS_EMOJI = { stunned: '💫', rage: '😡', panic: '😱' };
const STATUS_PRIORITY = ['stunned', 'rage', 'panic'];

function activeStatuses(unit) {
  if (!unit || !unit.status) return [];
  const out = [];
  for (const key of STATUS_PRIORITY) {
    const turns = Number(unit.status[key]) || 0;
    if (turns > 0) out.push({ key, turns });
  }
  return out;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const units = (state.units || []);
  const unitMap = {};
  units.forEach(u => { unitMap[`${u.position.x},${u.position.y}`] = u; });

  for (let y = 0; y < 6; y++) {
    for (let x = 0; x < 6; x++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.x = x; cell.dataset.y = y;

      const u = unitMap[`${x},${y}`];
      if (u) {
        const isP1 = u.id === 'unit_1';
        const cls  = isP1 ? 'p1' : 'sistema';
        const hp   = u.hp ?? 0;
        const dead = hp <= 0;
        const statuses = activeStatuses(u);
        // SPRINT_014: glow della cella per il primo stato attivo (priorita')
        if (!dead && statuses.length) {
          cell.classList.add(`has-status-${statuses[0].key}`);
        }
        const badgeHtml = (!dead && statuses.length)
          ? `<span class="status-badge" title="${statuses.map(s=>s.key+' '+s.turns).join(', ')}">${STATUS_EMOJI[statuses[0].key]}</span>`
          : '';
        cell.innerHTML = `
          <div class="token ${cls} ${selected === u.id ? 'selected' : ''} ${dead ? 'dead' : ''}">
            <span>${isP1 ? 'P1' : 'SIS'}</span>
            <span class="token-job">${u.job?.slice(0,4) ?? ''}</span>
          </div>${badgeHtml}`;
      }

      // highlight celle raggiungibili / attaccabili (solo se AP disponibili).
      // SPRINT_008: reachable usa ap_remaining (cost=dist), non ap max.
      // SPRINT_009: mostra il costo AP effettivo sulla cella e distingue
      // visivamente reachable a costo 2 (arancio) per evitare mis-click.
      if (selected) {
        const sel = units.find(u => u.id === selected);
        const apLeft = sel?.ap_remaining ?? sel?.ap ?? 0;
        const range  = sel?.attack_range ?? 2;
        if (sel && !u && apLeft > 0) {
          const dist = Math.abs(x - sel.position.x) + Math.abs(y - sel.position.y);
          if (dist > 0 && dist <= apLeft) {
            cell.classList.add('reachable');
            if (dist > 1) cell.classList.add('reachable-costly');
            const costBadge = document.createElement('span');
            costBadge.className = 'cell-cost';
            costBadge.textContent = dist;
            cell.appendChild(costBadge);
          }
        }
        if (u && u.id !== selected && u.id !== 'unit_1' && apLeft > 0) {
          const distT = Math.abs(x - sel.position.x) + Math.abs(y - sel.position.y);
          if (distT <= range) cell.classList.add('targetable');
        }
      }

      cell.addEventListener('click', () => onCellClick(x, y, u));
      grid.appendChild(cell);
    }
  }
}

// SPRINT_014: renderizza la riga di chip stati emotivi attivi nel pannello.
function renderStatusRow(targetId, unit) {
  const el = document.getElementById(targetId);
  if (!el) return;
  const statuses = activeStatuses(unit);
  if (!statuses.length) { el.innerHTML = ''; return; }
  el.innerHTML = statuses.map(s =>
    `<span class="status-chip ${s.key}">${STATUS_EMOJI[s.key]} ${s.key} <span class="status-chip-dur">${s.turns}t</span></span>`
  ).join('');
}

function renderStats() {
  const units  = state.units || [];
  const p1     = units.find(u => u.id === 'unit_1') ?? {};
  const sis    = units.find(u => u.id !== 'unit_1') ?? {};

  setText('p1-name',   `${p1.species ?? '?'} · ${p1.job ?? '?'}`);
  setText('p1-hp',     `${p1.hp ?? 0} / ${maxHp[p1.id] ?? p1.hp ?? 10}`);
  setText('p1-ap',     `${p1.ap_remaining ?? p1.ap ?? '?'} / ${p1.ap ?? '?'}`);
  setText('p1-mod',    `+${p1.mod ?? 0}`);
  setText('p1-traits', (p1.traits ?? []).join(', ') || '—');
  setBar('p1-hp-bar',  p1.hp, maxHp[p1.id] ?? p1.hp);
  renderStatusRow('p1-status', p1);

  setText('s-name',    `${sis.species ?? '?'} · ${sis.job ?? '?'}`);
  setText('s-hp',      `${sis.hp ?? 0} / ${maxHp[sis.id] ?? sis.hp ?? 10}`);
  setText('s-mod',     `+${sis.mod ?? 0}`);
  setText('s-traits',  (sis.traits ?? []).join(', ') || '—');
  setBar('s-hp-bar',   sis.hp, maxHp[sis.id] ?? sis.hp);
  renderStatusRow('s-status', sis);
}

/* ── CLICK CELLA ── */
async function onCellClick(x, y, unit) {
  if (!state || !isMyTurn()) return;

  const myUnit = (state.units || []).find(u => u.id === 'unit_1');

  // click sulla propria unità → seleziona
  if (unit && unit.id === 'unit_1') {
    selected = (selected === 'unit_1') ? null : 'unit_1';
    setHint(selected ? 'Clicca un nemico per attaccare, o una cella per muoverti' : 'Clicca la tua unità per selezionarla');
    renderGrid(); return;
  }

  if (!selected) { setHint('Prima seleziona la tua unità'); return; }

  // click su nemico → attacco
  if (unit && unit.id !== 'unit_1') {
    await doAction({ actor_id:'unit_1', action_type:'attack', target_id: unit.id });
    return;
  }

  // click su cella vuota → movimento
  if (!unit) {
    await doAction({ actor_id:'unit_1', action_type:'move', position:{ x, y } });
    return;
  }
}

/* SPRINT_014: snapshot stati attivi pre-azione per diff e log "entered/exited" */
function snapshotStatuses(s) {
  const out = {};
  for (const u of (s?.units || [])) {
    out[u.id] = {};
    if (u.status) {
      for (const k of ['panic','rage','stunned','focused','confused']) {
        out[u.id][k] = Number(u.status[k]) || 0;
      }
    }
  }
  return out;
}
const STATUS_LABEL = {
  panic:   'panico',
  rage:    'rabbia',
  stunned: 'stordimento',
  focused: 'concentrazione',
  confused:'confusione',
};
function logStatusDiff(pre, post) {
  for (const [unitId, cur] of Object.entries(post)) {
    const prev = pre[unitId] || {};
    for (const [k, v] of Object.entries(cur)) {
      const before = prev[k] || 0;
      const after  = v || 0;
      if (before === 0 && after > 0) {
        // stato appena attivato (sia su P1 che SIS)
        const who = unitId === 'unit_1' ? 'P1' : 'SIS';
        addLog('info', `${STATUS_EMOJI[k] || '✦'} ${who} entra in ${STATUS_LABEL[k] || k} (${after}t)`);
      } else if (before > 0 && after === 0) {
        const who = unitId === 'unit_1' ? 'P1' : 'SIS';
        addLog('info', `${who} esce dallo ${STATUS_LABEL[k] || k}`);
      }
    }
  }
}

/* ── AZIONI ── */
async function doAction(body) {
  setHint('…');
  const preStatus = snapshotStatuses(state);
  try {
    const res = await api('/api/session/action', body);
    state = res.state ?? state;
    logAction(body.action_type, res, body);
    logStatusDiff(preStatus, snapshotStatuses(state));
    checkGameOver();
    selected = null;
    render();
  } catch(e) { setHint(`Errore: ${e.message}`); }
}

async function endTurn() {
  document.getElementById('btn-end-turn').disabled = true;
  setHint('Fine turno — il Sistema agisce…');
  const preStatus = snapshotStatuses(state);
  try {
    const res = await api('/api/session/turn/end', {});
    state = res.state ?? state;
    const iaList = res.ia_actions ?? (res.ia_action ? [res.ia_action] : []);
    for (const ia of iaList) logIaAction(ia);
    logStatusDiff(preStatus, snapshotStatuses(state));
    checkGameOver();
    selected = null;
    render();
  } catch(e) { setHint(`Errore: ${e.message}`); }
}

/* ── GAME OVER ── */
function checkGameOver() {
  const units = state.units || [];
  const p1    = units.find(u => u.id === 'unit_1');
  const sis   = units.find(u => u.id !== 'unit_1');
  if (p1 && p1.hp <= 0) showGameOver('SCONFITTA', 'Il Sistema ha vinto.');
  if (sis && sis.hp <= 0) showGameOver('VITTORIA', 'Hai eliminato il Sistema.');
}

function showGameOver(title, sub) {
  addLog('gameover', `— ${title} —`);
  document.getElementById('overlay-title').textContent = title;
  document.getElementById('overlay-sub').textContent   = sub;
  document.getElementById('overlay').classList.add('show');
}

/* ── LOG ── */
function fmtPos(p) { return p ? `(${p.x},${p.y})` : '(?,?)'; }

function logAction(type, res, body) {
  if (type === 'attack') {
    const hit = res.result === 'hit';
    const effects = (res.trait_effects ?? []).filter(t => t.triggered).map(t => t.effect).join(', ');
    const extra = effects ? ` [${effects}]` : '';
    const from = fmtPos(res.actor_position);
    const to   = fmtPos(res.target_position);
    addLog(hit ? 'hit' : 'miss',
      `Attacco ${from}→${to} d20=${res.roll} MoS=${res.mos} PT=${res.pt} — ${hit ? 'COLPITO' : 'MANCATO'}${extra}`
      + (res.target_hp !== undefined ? ` · HP nemico: ${res.target_hp}` : ''));
  } else {
    const from = fmtPos(res.position_from);
    const to   = fmtPos(body.position);
    addLog('move', `Mosso ${from}→${to}`);
  }
}

function logIaAction(ia) {
  // Il backend emette runSistemaTurn actions con `type`, non `action_type`.
  const kind = ia.type || ia.action_type;
  const rule = ia.ia_rule ?? 'REGOLA_001';
  if (kind === 'attack') {
    const hit = ia.result === 'hit';
    const from = fmtPos(ia.actor_position);
    const to   = fmtPos(ia.target_position);
    const dmg = ia.damage_dealt ? ` d=${ia.damage_dealt}` : '';
    addLog('sistema',
      `SISTEMA (${rule}) ${from}→${to} d20=${ia.roll} — ${hit ? 'COLPITO' : 'MANCATO'}${dmg}`);
  } else if (kind === 'skip') {
    addLog('sistema', `SISTEMA (${rule}) fermo — ${ia.reason ?? 'bloccato'}`);
  } else if (kind === 'retreat') {
    const from = fmtPos(ia.position_from);
    const to   = fmtPos(ia.position_to);
    addLog('sistema', `SISTEMA (${rule}) si ritira ${from}→${to}`);
  } else {
    const from = fmtPos(ia.position_from);
    const to   = fmtPos(ia.position_to);
    addLog('sistema', `SISTEMA (${rule}) si muove ${from}→${to}`);
  }
}

function addLog(cls, msg) {
  const log = document.getElementById('log');
  const e = document.createElement('div');
  e.className = `log-entry ${cls}`;
  e.textContent = msg;
  log.appendChild(e);
  log.scrollTop = log.scrollHeight;
}

function clearLog() { document.getElementById('log').innerHTML = ''; }

/* ── UTILS ── */
function isMyTurn() {
  return state && (state.active_unit === 'unit_1' || state.turn % 2 === 1);
}

function setHint(t) { document.getElementById('hint').textContent = t; }
function setText(id, v) { const el = document.getElementById(id); if (el) el.textContent = v; }
function setBar(id, v, max) {
  const el = document.getElementById(id);
  if (el) el.style.width = `${Math.max(0, Math.round((v / (max||10)) * 100))}%`;
}

/* ── AVVIO ── */
startSession();
</script>
