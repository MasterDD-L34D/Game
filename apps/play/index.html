<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evo-Tactics — Play</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>🦴 Evo-Tactics</h1>
        <div class="status">
          <span id="turn-info">—</span>
          <span id="active-info">—</span>
        </div>
        <div id="pressure-meter" class="pressure-meter">
          <div class="pressure-label">SISTEMA — · 0/100 · cap 1 intents/round</div>
          <div class="pressure-bar"><div class="pressure-fill" style="width: 0%"></div></div>
        </div>
      </header>
      <main>
        <section class="board">
          <canvas id="grid" width="512" height="512"></canvas>
          <div class="controls">
            <button id="end-turn">Fine turno</button>
            <button id="new-session">Nuova sessione</button>
            <button id="open-replay">📽 Replay</button>
            <button id="toggle-mute" title="Mute SFX">🔊</button>
            <select id="scenario-select">
              <option value="enc_tutorial_01">Tutorial 01 · Primi passi</option>
              <option value="enc_tutorial_02">Tutorial 02 · Pattuglia</option>
              <option value="enc_tutorial_03">Tutorial 03 · Hazard savana</option>
              <option value="enc_tutorial_04">Tutorial 04 · Bleeding foresta</option>
              <option value="enc_tutorial_05">Tutorial 05 · BOSS Apex</option>
              <option value="enc_tutorial_06_hardcore">Tutorial 06 · HARDCORE 8p</option>
            </select>
            <select id="modulation-select" title="Party composition (co-op 1-8 player)">
              <option value="">Party: auto</option>
            </select>
          </div>
        </section>
        <aside class="sidebar">
          <h2>Unità</h2>
          <ul id="units"></ul>
          <h2>Log</h2>
          <div id="log"></div>
        </aside>
      </main>
      <!-- M4 P0.1 — Ability bar sticky bottom, always-visible (user feedback) -->
      <div id="ability-bar" class="ability-bar">
        <span id="abilities-title" class="ability-bar-title hidden-empty">Abilities</span>
        <div id="abilities" class="ability-bar-row"></div>
      </div>
      <footer>
        <span id="selected-hint">Seleziona una tua unità per vedere azioni.</span>
        <button id="cancel-pending" class="hidden">✕ Annulla ability</button>
      </footer>
      <div id="endgame-overlay" class="hidden">
        <div class="endgame-card">
          <h2 id="endgame-title">—</h2>
          <p id="endgame-stats">—</p>
          <div class="endgame-actions">
            <button id="endgame-next">Prossimo encounter</button>
            <button id="endgame-retry">Rigioca</button>
            <button id="endgame-close">Chiudi</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
