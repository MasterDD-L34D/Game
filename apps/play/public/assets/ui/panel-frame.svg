<?xml version="1.0" encoding="UTF-8"?>
<!--
  Procedural parchment+gold tactical panel frame
  License: MIT (own asset, no external attribution)
  Visual upgrade Sprint B 2026-04-28 — placeholder before Kenney CC0 swap
  9-slice border-image: slice=32, fill stretch
-->
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="parchment" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d2620"/>
      <stop offset="50%" stop-color="#1e1a17"/>
      <stop offset="100%" stop-color="#161210"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4c08a"/>
      <stop offset="50%" stop-color="#b0a36a"/>
      <stop offset="100%" stop-color="#7a6a3e"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b6f47"/>
      <stop offset="100%" stop-color="#5a4528"/>
    </linearGradient>
  </defs>
  <!-- Panel parchment fill (center 9-slice) -->
  <rect x="16" y="16" width="64" height="64" fill="url(#parchment)"/>
  <!-- Outer gold double stroke -->
  <rect x="2" y="2" width="92" height="92" fill="none" stroke="url(#gold)" stroke-width="2"/>
  <rect x="6" y="6" width="84" height="84" fill="none" stroke="url(#bronze)" stroke-width="1"/>
  <!-- Inner gold rule -->
  <rect x="14" y="14" width="68" height="68" fill="none" stroke="#7a6a3e" stroke-width="1"/>
  <!-- Corner ornaments (4 corners) -->
  <g fill="url(#gold)">
    <!-- Top-left -->
    <path d="M 8 8 L 22 8 L 22 10 L 10 10 L 10 22 L 8 22 Z"/>
    <circle cx="14" cy="14" r="2"/>
    <!-- Top-right -->
    <path d="M 88 8 L 74 8 L 74 10 L 86 10 L 86 22 L 88 22 Z"/>
    <circle cx="82" cy="14" r="2"/>
    <!-- Bottom-left -->
    <path d="M 8 88 L 22 88 L 22 86 L 10 86 L 10 74 L 8 74 Z"/>
    <circle cx="14" cy="82" r="2"/>
    <!-- Bottom-right -->
    <path d="M 88 88 L 74 88 L 74 86 L 86 86 L 86 74 L 88 74 Z"/>
    <circle cx="82" cy="82" r="2"/>
  </g>
  <!-- Mid-edge ornament dots (centered on each edge) -->
  <g fill="url(#bronze)">
    <circle cx="48" cy="6" r="1.5"/>
    <circle cx="48" cy="90" r="1.5"/>
    <circle cx="6" cy="48" r="1.5"/>
    <circle cx="90" cy="48" r="1.5"/>
  </g>
</svg>
