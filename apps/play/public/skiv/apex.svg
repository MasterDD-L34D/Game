<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="120" height="80" aria-label="Skiv apex — Apex delle Dune (future phase)">
  <defs>
    <radialGradient id="sandBgA" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3a2818"/>
      <stop offset="100%" stop-color="#1a0e04"/>
    </radialGradient>
    <linearGradient id="bodyApex" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a2818"/>
      <stop offset="100%" stop-color="#0a0604"/>
    </linearGradient>
    <radialGradient id="eyeApex" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe864"/>
      <stop offset="100%" stop-color="#c47800"/>
    </radialGradient>
  </defs>
  <rect width="120" height="80" fill="url(#sandBgA)"/>
  <!-- stars/distant signals -->
  <circle cx="20" cy="18" r="0.6" fill="#fff" opacity="0.6"/>
  <circle cx="42" cy="10" r="0.4" fill="#fff" opacity="0.4"/>
  <circle cx="100" cy="12" r="0.5" fill="#fff" opacity="0.5"/>
  <ellipse cx="60" cy="72" rx="44" ry="3" fill="#000" opacity="0.5"/>
  <!-- silhouette ridge (Skiv adulto è quasi una linea sulla cresta) -->
  <path d="M 18 56 Q 4 48 2 58 Q 4 46 14 42 Q 28 42 38 48 Z" fill="url(#bodyApex)" stroke="#000" stroke-width="0.6"/>
  <ellipse cx="60" cy="56" rx="33" ry="13" fill="url(#bodyApex)" stroke="#000" stroke-width="0.6"/>
  <!-- spine spectral (ridge tratteggiato, semi-incorporeo) -->
  <path d="M 30 44 Q 50 39 60 39 Q 70 39 90 44" stroke="#7a5d3a" stroke-width="1" stroke-dasharray="2,1" fill="none" opacity="0.8"/>
  <!-- vitrified claws stretched, glow stronger -->
  <path d="M 42 67 L 39 75 L 37 78 M 42 67 L 41 75 L 41 78 M 42 67 L 43 75 L 45 78" stroke="#a8d8ff" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M 78 67 L 75 75 L 73 78 M 78 67 L 77 75 L 77 78 M 78 67 L 79 75 L 81 78" stroke="#a8d8ff" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- mid legs -->
  <path d="M 56 67 L 54 75 M 64 67 L 66 75" stroke="#000" stroke-width="1.2" stroke-linecap="round"/>
  <!-- iridescent dust trail -->
  <circle cx="6" cy="71" r="0.8" fill="#a8d8ff" opacity="0.6"/>
  <circle cx="14" cy="72" r="0.6" fill="#a8d8ff" opacity="0.5"/>
  <circle cx="22" cy="71" r="0.7" fill="#a8d8ff" opacity="0.4"/>
  <!-- head streamlined -->
  <ellipse cx="93" cy="52" rx="14" ry="11" fill="url(#bodyApex)" stroke="#000" stroke-width="0.6"/>
  <!-- echo conches expanded -->
  <path d="M 84 42 Q 86 36 92 38 Q 90 44 86 46 Z" fill="#1a1208" stroke="#000" stroke-width="0.4"/>
  <path d="M 98 41 Q 104 36 105 44 Q 102 46 99 46 Z" fill="#1a1208" stroke="#000" stroke-width="0.4"/>
  <!-- predatorial eye with halo -->
  <ellipse cx="98" cy="50" rx="3.2" ry="2.2" fill="url(#eyeApex)"/>
  <ellipse cx="98" cy="50" rx="1.4" ry="0.6" fill="#0a0000"/>
  <!-- subtle aura -->
  <ellipse cx="98" cy="50" rx="6" ry="4" fill="none" stroke="#ffd864" stroke-width="0.3" opacity="0.5"/>
  <text x="60" y="14" text-anchor="middle" fill="#ffd864" font-family="monospace" font-size="9" font-weight="bold">APEX DELLE DUNE</text>
  <text x="60" y="76" text-anchor="middle" fill="#a8843c" font-family="monospace" font-size="6" font-style="italic">"Numeri dicevano. Avevo ragione."</text>
</svg>
