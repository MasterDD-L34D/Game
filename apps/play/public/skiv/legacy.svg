<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="120" height="80" aria-label="Skiv legacy — Memoria del Branco (post-death lore phase)">
  <defs>
    <radialGradient id="sandBgL" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#a0a8b8"/>
      <stop offset="100%" stop-color="#404856"/>
    </radialGradient>
    <linearGradient id="bodyLeg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8d0e0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7a8090" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="120" height="80" fill="url(#sandBgL)"/>
  <!-- distant moon -->
  <circle cx="100" cy="14" r="6" fill="#e8e8d0" opacity="0.7"/>
  <circle cx="100" cy="14" r="6" fill="none" stroke="#fff" stroke-width="0.3" opacity="0.4"/>
  <!-- stars -->
  <circle cx="20" cy="20" r="0.5" fill="#fff" opacity="0.7"/>
  <circle cx="36" cy="14" r="0.4" fill="#fff" opacity="0.6"/>
  <circle cx="60" cy="22" r="0.6" fill="#fff" opacity="0.5"/>
  <!-- footprints fading (Skiv era già qui) -->
  <ellipse cx="14" cy="73" rx="2" ry="1" fill="#3a4256" opacity="0.5"/>
  <ellipse cx="22" cy="74" rx="2" ry="1" fill="#3a4256" opacity="0.4"/>
  <ellipse cx="32" cy="73" rx="2" ry="1" fill="#3a4256" opacity="0.3"/>
  <!-- spectral silhouette (transparent) -->
  <path d="M 38 56 Q 30 50 28 58 Q 30 48 36 46 Q 44 46 50 50 Z" fill="url(#bodyLeg)" stroke="#c8d0e0" stroke-width="0.4" stroke-dasharray="2,1.5" opacity="0.85"/>
  <ellipse cx="65" cy="56" rx="28" ry="11" fill="url(#bodyLeg)" stroke="#c8d0e0" stroke-width="0.4" stroke-dasharray="2,1.5" opacity="0.85"/>
  <!-- ridge silver shimmer -->
  <path d="M 40 47 Q 55 43 65 43 Q 78 43 90 47" stroke="#e8e8d0" stroke-width="0.6" stroke-dasharray="1,1" fill="none" opacity="0.7"/>
  <!-- legs faded -->
  <path d="M 50 65 L 49 73" stroke="#7a8090" stroke-width="0.8" opacity="0.6" stroke-linecap="round"/>
  <path d="M 60 65 L 60 73" stroke="#7a8090" stroke-width="0.8" opacity="0.6" stroke-linecap="round"/>
  <path d="M 76 65 L 77 73" stroke="#7a8090" stroke-width="0.8" opacity="0.6" stroke-linecap="round"/>
  <path d="M 82 65 L 84 73" stroke="#7a8090" stroke-width="0.8" opacity="0.6" stroke-linecap="round"/>
  <!-- head spectral -->
  <ellipse cx="93" cy="52" rx="11" ry="9" fill="url(#bodyLeg)" stroke="#c8d0e0" stroke-width="0.4" stroke-dasharray="2,1.5" opacity="0.85"/>
  <!-- closed eye / memory -->
  <path d="M 96 50 Q 99 49 102 50" stroke="#3a4256" stroke-width="0.8" fill="none" opacity="0.8"/>
  <!-- glow aura -->
  <ellipse cx="65" cy="56" rx="40" ry="18" fill="none" stroke="#e8e8d0" stroke-width="0.3" opacity="0.4"/>
  <ellipse cx="65" cy="56" rx="46" ry="22" fill="none" stroke="#c8d0e0" stroke-width="0.2" opacity="0.25"/>
  <text x="60" y="14" text-anchor="middle" fill="#e8e8d0" font-family="monospace" font-size="9" font-weight="bold">MEMORIA DEL BRANCO</text>
  <text x="60" y="76" text-anchor="middle" fill="#a0a8b8" font-family="monospace" font-size="6" font-style="italic">"Ero qui prima che arrivassi."</text>
</svg>
