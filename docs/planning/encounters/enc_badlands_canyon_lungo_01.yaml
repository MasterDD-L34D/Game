# =============================================================================
# Encounter: "Il Canyon Lungo" -- secondo encounter grid_sized (big-maps arc)
# Difficulty: 4/5 - Grid: 20x12 AUTORATA (cap larghezza schema, board_scale:
# grid_sized, ADR-2026-07-03) - Bioma: badlands
# Objective: elimination + time_limit (doppio chokepoint serpentina, sez. B3)
#
# SCOPO: (1) esercita il cap enum grid_size=20 (prima board alla larghezza
#   massima); (2) secondo esemplare del path grid_sized -> il wiring non e'
#   piu' un one-off; (3) primo uso del probe GENERALIZZATO
#   tools/sim/grid-band-probe.js (L-069: N=10 -> N=40, baseline post-evidence).
#
# DESIGN (principi densita' ricerca big-map sez. 3 + D1-D10; spec B3; lezioni
# MISURATE su enc_badlands_dorsale_ferrosa_01 -- tutti i valori PROPOSED, SDMG):
#   - Doppio chokepoint SERPENTINA: cresta A (x=6, gate y5-6) + cresta B
#     (x=13, gate y4-5, sfalsato) -> il crossing cambia lane due volte.
#     Blocker LOS-reali (roccia/vegetazione, LOS default ON #3226).
#   - POCHI-FORTI-VICINI (lezione dorsale c1-c4): wave-1 = 3 unita' che
#     PRESIDIANO il gate B (le due echo DENTRO il gate = muro di occupancy
#     reale finche' non cadono); niente roster grandi diluiti dal dial
#     intents_per_round.
#   - Spawn-zone curate: entry tiles a est/creste oltre il gate B, mai alle
#     spalle del party; valvola FINITA max_total_spawns 4.
#   - Anti-dead-time: time_limit 30 su traversata ~19 celle; contatto al
#     gate B entro round 5-6; lava/typed tiles = forward-compat inerte
#     (MOVE_TERRAIN_COST_ENABLED OFF, non flippato qui).
#
# Schema: schemas/evo/encounter.schema.json (board_scale #3199)
# ADR: ADR-2026-07-03-authored-grid-board-scale
# Evidence: docs/research/2026-07-06-dorsale-ferrosa-grid-ratify.md (metodo) +
#   sezione canyon in coda (questo encounter)
# =============================================================================

encounter_id: enc_badlands_canyon_lungo_01
name: 'Il Canyon Lungo'
biome_id: badlands
grid_size: [20, 12]
board_scale: grid_sized
difficulty_rating: 4
pressure_tier_floor: 3
encounter_class: standard

objective:
  type: elimination
  loss_conditions:
    time_limit: 30
    player_wipe: true

player_spawn:
  - [0, 5]
  - [0, 6]
  - [1, 5]
  - [1, 6]

# Terreno: 2 creste serpentina + scatter centrale. 34 celle su 240 (~14%),
# niente fill uniforme. roccia = blocca LOS; vegetazione = screen walkable;
# lava = hazard forward-compat.
grid:
  width: 20
  height: 12
  terrain_features:
    # --- Cresta A (x=6): gate a y=5-6 ---
    - { x: 6, y: 0, type: roccia, defense_mod: 2 }
    - { x: 6, y: 1, type: roccia, defense_mod: 2 }
    - { x: 6, y: 2, type: roccia, defense_mod: 2 }
    - { x: 6, y: 3, type: roccia, defense_mod: 2 }
    - { x: 6, y: 4, type: roccia, defense_mod: 2 }
    - { x: 6, y: 7, type: roccia, defense_mod: 2 }
    - { x: 6, y: 8, type: roccia, defense_mod: 2 }
    - { x: 6, y: 9, type: roccia, defense_mod: 2 }
    - { x: 6, y: 10, type: roccia, defense_mod: 2 }
    - { x: 6, y: 11, type: roccia, defense_mod: 2 }
    - { x: 5, y: 4, type: lava, defense_mod: 0 }
    - { x: 5, y: 7, type: lava, defense_mod: 0 }
    - { x: 7, y: 5, type: vegetazione_densa, defense_mod: 1 }
    - { x: 7, y: 6, type: vegetazione_densa, defense_mod: 1 }
    # --- Scatter centrale (copertura rotta, no corridoio pulito) ---
    - { x: 10, y: 2, type: roccia, defense_mod: 2 }
    - { x: 10, y: 9, type: roccia, defense_mod: 2 }
    - { x: 10, y: 5, type: vegetazione_densa, defense_mod: 1 }
    - { x: 10, y: 6, type: vegetazione_densa, defense_mod: 1 }
    # --- Cresta B (x=13): gate SFALSATO a y=4-5 (serpentina) ---
    - { x: 13, y: 0, type: roccia, defense_mod: 2 }
    - { x: 13, y: 1, type: roccia, defense_mod: 2 }
    - { x: 13, y: 2, type: roccia, defense_mod: 2 }
    - { x: 13, y: 3, type: roccia, defense_mod: 2 }
    - { x: 13, y: 6, type: roccia, defense_mod: 2 }
    - { x: 13, y: 7, type: roccia, defense_mod: 2 }
    - { x: 13, y: 8, type: roccia, defense_mod: 2 }
    - { x: 13, y: 9, type: roccia, defense_mod: 2 }
    - { x: 13, y: 10, type: roccia, defense_mod: 2 }
    - { x: 13, y: 11, type: roccia, defense_mod: 2 }
    - { x: 12, y: 3, type: lava, defense_mod: 0 }
    - { x: 12, y: 6, type: lava, defense_mod: 0 }
    - { x: 14, y: 4, type: vegetazione_densa, defense_mod: 1 }
    - { x: 14, y: 5, type: vegetazione_densa, defense_mod: 1 }
    # --- Approccio est ---
    - { x: 16, y: 4, type: vegetazione_densa, defense_mod: 1 }
    - { x: 16, y: 7, type: vegetazione_densa, defense_mod: 1 }

# Wave unica: il pack PRESIDIA il gate B. Le due echo DENTRO le celle del gate
# (13,4)/(13,5) = muro di occupancy vero (i player devono abbatterle per
# passare); l'apex copre da dietro lo screen. Ordine spawn = espansione 1:1
# (apex -> sp[0]; echo x2 -> sp[1],sp[2]).
waves:
  - wave_id: 1
    turn_trigger: 0
    spawn_points:
      - [15, 4]
      - [13, 4]
      - [13, 5]
    units:
      - species: dune-stalker
        count: 1
        tier: apex
        ai_profile: aggressive_with_stickiness
      - species: echo-wing
        count: 2
        tier: elite
        ai_profile: aggressive

# Push-economy: valvola finita (cap 4), cadenza tier-driven (Escalated=2/tick,
# cooldown 3). Pool badlands coerente col foodweb filter.
reinforcement_pool:
  - unit_id: rust-scavenger
    weight: 3
    max_spawns: 3
    hp: 7
    mod: 2
    dc: 11
    ai_profile: aggressive
  - unit_id: echo-wing
    weight: 1
    max_spawns: 1
    hp: 10
    mod: 3
    dc: 12
    ai_profile: flanking

# Spawn-zone curate: creste oltre il gate B + fondo canyon est. Mai il
# quadrante ovest del party.
reinforcement_entry_tiles:
  - [16, 0]
  - [16, 11]
  - [19, 5]
  - [19, 6]

reinforcement_policy:
  enabled: true
  min_tier: Alert
  cooldown_rounds: 3
  max_total_spawns: 4
  min_distance_from_pg: 4

conditions: []

tags: [standard, timed]

didactic_focus:
  - los_cover_routing
  - chokepoint_breach
  - reinforcement_pressure

narrative: {}

# Art direction metadata (docs/core/41-ART-DIRECTION.md)
visual_mood:
  mood_tag: esposizione
  lighting: alta_calda_dall_alto
  particle_effect: polvere_secca
  accent_override: '#b05a2e'
