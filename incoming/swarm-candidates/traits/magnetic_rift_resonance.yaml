version: 1.0
staging: true # flag: rimuovere quando promosso in data/core/*

# ─── Metadata trait ─────────────────────────────────────────────────

id: magnetic_rift_resonance
label: Risonanza Magnetica Rift

# Tier coerente con incoming/sentience_traits_v1.0.yaml (T2 = Pre-Sociale)
# Razionale: il trait assume comunicazione rudimentale tra creature vicine
# (band-level social), non richiede language/institutions complesse.
tier: T2

# Category inferita dal artifact (environmental) → mappata su vocabolario Game.
# "neurologico-ambientale" non esiste ancora: propongo neurologico con biome_affinity.
category: neurologico

applies_to: actor # l'agente attiva coscientemente

# ─── Trigger + effetto (formato coerente con data/core/traits/active_effects.yaml) ─

trigger:
  action_type: support # non attack: è ability di coordinamento mentale
  requires: magnetic_sensitivity # prerequisito implicito (da catalogare)
  condizione_ambientale:
    biome_class: atollo_ossidiana # o biomi con campi magnetici forti
    biome_affinity_min: 0.7

effect:
  kind: apply_status
  target: allies_in_range
  stato: telepatic_link
  turns: 5
  log_tag: magnetic_resonance_active
  # In runtime dovrebbe permettere: share informazioni tra creature vicine,
  # amplificare sinergia di squadra in biomi magnetici.
  secondary_effects:
    - type: communication_range_boost
      magnitude: 30 # percentage
      duration_turns: 5
    - type: sensory_perception
      magnitude: 20
      duration_turns: 5
    - type: resonance_duration
      magnitude: 100 # intero: turni extra prima fade
      duration_turns: 8

# ─── Costi + vincoli ───────────────────────────────────────────────

cost:
  morph_budget: 10 # slot costo allocazione (scala 0-30)

requires_traits:
  - magnetic_sensitivity # trait base del bioma magnetico
  - rift_attunement # trait emergente biomi ossidiana

conflicts_traits:
  - electromagnetic_disruption # opposto: disturba comunicazione
  - telepathy_suppression # antitetico

biome_affinity:
  atollo_ossidiana: 0.9 # forte
  # altri biomi: score basso o zero (da definire post-review)

# ─── Narrativa (da lore-designer ciclo 0) ───────────────────────────

description_it: |
  I campi magnetici dell'atollo oscillano in sincronia con le frequenze mentali
  degli abitanti. Questa connessione crea onde di risonanza che influenzano
  la comunicazione e la percezione.

narrative_hook: >-
  Nell'atollo di ossidiana, il magnetismo non è solo una forza fisica ma un
  linguaggio segreto che lega le menti in una danza eterea.

proposed_mechanic: >-
  I giocatori possono attivare 'Risonanza Magnetica' per legare mentalmente a
  creature vicine, condividendo informazioni o amplificando abilità tramite
  l'interazione dei campi magnetici.

