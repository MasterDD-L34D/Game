# matches the sistema unit species slug fought in enc_tutorial_01/02 (routed), so
# the `encounter_completed` trigger (apps/play/src/main.js:287-311 ->
# markCodexEntrySeen) fires on the very first tutorial fight -> first real
# in-flow unlock (today ~0 entries are reachable).
#
# CAVEAT (verify-first): predoni_nomadi is a tutorial-phantom stub
# (predoni-nomadi.yaml: sentient:false, tutorial_phantom:true, "nessun trait
# speciale", morphotype bipede_armato = humanoid raider). It is the FIRST routed
# enemy (good for proving the loop + first-impression unlock) but a LORE-LIGHT
# A.L.I.E.N.A. subject -- the 6 dimensions describe nomad raiders, not a rich
# alien. A richer/sentient routed species would carry deeper lore for later
# entries.
#
# Data cross-check (factual):
