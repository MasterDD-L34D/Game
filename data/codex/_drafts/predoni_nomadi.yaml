# encoding: UTF-8
# Schema: codex_entry v1.0 (2026-04-27) -- mirror data/codex/example_dune_stalker.yaml
#
# SPEC-H unlock-reachability seed (2026-06-20). Factual/mechanical fields filled
# from data (cross-checked below). The 6 A.L.I.E.N.A. VOICE PROSE (`content:`
# fields) are now a GENERATED draft (codex_aliena_lore_gen.py from lore_vars),
# PENDING master-dd review -- edit the prose + set lore_review_status:
# human_reviewed (the promote gate refuses while it is pending).
#
# THIS FILE IS A DRAFT under data/codex/_drafts/ -- the loader
# (apps/backend/services/codex/codexEntries.js) globs data/codex/*.yaml FLAT and
# does NOT recurse, so a _drafts/ entry is NOT served/unlockable. To CLOSE the
# unlock-reachability gap end-to-end: master-dd reviews/edits the generated
# `content:` prose, then `node tools/js/promote_codex_draft.js predoni_nomadi`
# (moves it to data/codex/, refused while review is pending). The id `predoni_nomadi`
# matches the sistema unit species slug fought in enc_tutorial_01/02 (routed), so
# the `encounter_completed` trigger (apps/play/src/main.js:287-311 ->
# markCodexEntrySeen) fires on the very first tutorial fight -> first real
# in-flow unlock (today ~0 entries are reachable).
#
# CAVEAT (verify-first): predoni_nomadi is a tutorial-phantom stub
# (predoni-nomadi.yaml: sentient:false, tutorial_phantom:true, "nessun trait
# speciale", morphotype bipede_armato = humanoid raider). It is the FIRST routed
# enemy (good for proving the loop + first-impression unlock) but a LORE-LIGHT
# A.L.I.E.N.A. subject -- the 6 dimensions describe nomad raiders, not a rich
# alien. A richer/sentient routed species would carry deeper lore for later
# entries.
#
# Data cross-check (factual):
#   packs/evo_tactics_pack/data/species/tutorial/predoni-nomadi.yaml -- id, display,
#     archetype, role_trofico, flags, balance, combat_baseline, used_in_encounters
#   packs/evo_tactics_pack/data/biomes.yaml -- savana (biome_class arid, npc_archetypes.primary)
#
# SECRET INVARIANT (SPEC-H sez.8): the coherence/aggregate score is ENGINE-ONLY.
# Do NOT add aggregate / sub_scores / coherence / enforcement_factor fields here.

codex_entry:
  id: predoni_nomadi
  type: species
  display_name_it: Predoni Nomadi
  display_name_en: Nomad Raiders
  subtitle_it: "Razziatori della Savana -- archetipo adattivo - clade Threat (T1)"
  # Cross-check: predoni-nomadi.yaml:1-5,24 (id, display, encounter_role threat, T1)

  unlock:
    triggers:
      - encounter_completed # fine scontro con predoni_nomadi nel roster nemici (enc_tutorial_01/02)
    threshold: 1
    locked_preview: >
      Razziatori nomadi della savana ionizzata. Sopravvivi a uno scontro con loro
      per sbloccare il Codex.
    persistence: "localStorage:evo:codex-seen-predoni_nomadi"

  # Structured slots (factual, from data) consumed by the A.L.I.E.N.A. lore
  # generator (tools/py/codex_aliena_lore_gen.py). The generator narrativizes
  # these into the 6 `content:` blocks as a DRAFT (pending human review). NOT
  # the final prose -- master-dd reviews/edits the generated draft before
  # promoting (the `content:` below are now a generated draft pending review).
  # Adding lore_vars does not change what is served (file is under _drafts/,
  # the loader globs data/codex/*.yaml flat).
  lore_vars:
    subject: "predone nomade"
    biome_name: "savana ionizzata"
    biome_trait: "dune fotoniche, luce radente e tempeste ioniche"
    lineage: "razziatori umanoidi"
    archetype: "adattivo"
    morphotype: "bipede armato"
    job: "skirmisher"
    role: "predatore secondario"
    threat_tier: "T1"
    social: "bande di razzia nomadi"
    sentience: "istintiva"
    hook: "il primo nemico che affronti nel tutorial"

  # Generated by tools/py/codex_aliena_lore_gen.py from lore_vars (PoC 2026-06-20,
  # raw output -- voice grammar is a tunable scaffold). PENDING master-dd review:
  # edit the 6 content: blocks below, then set lore_review_status: human_reviewed
  # (or remove this field) and run promote_codex_draft.js. The gate refuses to
  # promote while this flag is present.
  lore_review_status: generated_pending_review

  aliena_dimensions:
    A_ambiente:
      heading: "Ambiente"
      content: >
        Il territorio del predone nomade e' savana ionizzata: dune fotoniche, luce
        radente e tempeste ioniche. Qui la sopravvivenza detta la forma, e nulla che
        non si adatti dura a lungo.
      key_facts:
        - "Bioma nativo: savana ionizzata (biome_class arid)"
        - "Nomadi -- nessun rifugio fisso; seguono le rotte di razzia stagionali"
      cross_ref:
        - "biome:savana" # biomes.yaml -- Savana Ionizzata
      game_impact: >
        Comparsa come threat tutorial in enc_tutorial_01 / enc_tutorial_02 (savana).

    L_linee_evolutive:
      heading: "Linee evolutive"
      content: >
        Il predone nomade discende dai razziatori umanoidi. La sua linea segue un
        archetipo adattivo: non la forza bruta, ma la capacita' di piegarsi a cio'
        che il bioma richiede.
      key_facts:
        - "resistance_archetype: adattivo (predoni-nomadi.yaml:3)"
        - "role_trofico: predatore_tutorial_secondario; flags.sentient: false"
      cross_ref:
        - "species:predoni_nomadi"
      game_impact: >
        Stub tutorial-phantom (nessun trait speciale); skirmisher base.

    I_impianto:
      heading: "Impianto morfo-fisiologico"
      content: >
        Il corpo del predone nomade -- bipede armato -- e' ottimizzato per il
        skirmisher: rapido, essenziale, fragile se isolato dal gruppo.
      key_facts:
        - "morphotype: bipede_armato (umanoide armato)"
        - "combat_baseline: hp 4 / ap 2 / mod 2 / dc 12 / range 1 / guardia 0"
        - "jobs_bias: skirmisher"
      cross_ref:
        - "species:predoni_nomadi"
      game_impact: >
        Profilo da skirmisher melee a corto raggio (attack_range 1), HP basso (4) =
        bersaglio fragile introduttivo.

    E_ecologia:
      heading: "Ecologia"
      content: >
        Nell'ecologia di savana ionizzata il predone nomade occupa la nicchia di
        predatore secondario (T1). Esercita pressione sulle prede senza contendere
        l'apice.
      key_facts:
        - "role_trofico: predatore_tutorial_secondario"
        - "rarity R1 / threat_tier T1 -- minaccia introduttiva diffusa"
      cross_ref:
        - "biome:savana"
      game_impact: >
        encounter_role: threat; comparsa precoce nel flow (tutorial).

    N_norme_socio:
      heading: "Norme socio"
      content: >
        Il predone nomade vive in bande di razzia nomadi. I legami sono di natura
        istintiva -- funzionali alla razzia e alla sopravvivenza, non al racconto di
        se'.
      key_facts:
        - "functional_tags: nemico_tutorial, predone_umanoide"
        - "Bande nomadi (predone_umanoide) -- razzia come modello di sussistenza"
      cross_ref:
        - "species:predoni_nomadi"
      game_impact: >
        Compaiono in gruppo (roster nemico tutorial), non come singolo apex.

    A_ancoraggio_narrativo:
      heading: "Ancoraggio narrativo"
      content: >
        Per l'allenatore il predone nomade e' il primo nemico che affronti nel
        tutorial. E' qui che il Codex comincia: la prima forma di vita di cui
        annotare la verita'.
      key_facts:
        - "Prima specie nemica che il giocatore affronta (enc_tutorial_01)"
        - "Prima voce del Codex sbloccabile nel flow default"
      cross_ref:
        - "encounter:enc_tutorial_01"
        - "encounter:enc_tutorial_02"
      game_impact: >
        Unlock e2e: completare enc_tutorial_01 con predoni_nomadi nel roster nemici
        sblocca questa voce (primo unlock reale in-flow).
