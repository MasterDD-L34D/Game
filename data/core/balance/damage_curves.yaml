# ─── Scenario overrides (per-encounter knob layer) ────────────────────
# Pattern: Hades Pact of Punishment + Into the Breach scenario-tagged design.
# Risolve cross-scenario tension dove encounter_class globale (es 'hardcore')
# applica stesso multiplier a scenari con bottleneck ortogonali (es. boss-HP
# vs swarm+timer). Override locale per-scenario sopra class default.
#
# Origine: docs/research/2026-05-20-calibration-knob-patterns-industry.md
# Evidence: docs/playtest/2026-05-20-hardcore-06-postwave57-report.md (0% WR
#   stesso class hardcore vs hardcore_07 60% WR — single-knob insufficient).
#
# Schema: keys = scenario_id (matcha hardcoreScenario.js export); valori = oggetto
# con knob opzionali. Knob assenti = inherit class default.
#
# Knob supportati v1:
#   boss_hp_multiplier (float, default 1.0) → moltiplica HP unità con flag is_boss
#                                            o id contiene "_boss"
#
# Validation: vedi validation.scenario_overrides_valid_ids regola sotto.

scenario_overrides:
  enc_tutorial_06_hardcore:
    # NODE-22 RE-CALIBRATE 2026-06-14 (pm): boss_hp_multiplier 1.04 -> 1.02. The 1.04
    # value (history below) was calibrated on a node-24 dev box (22%); on the CANONICAL
    # runtime node 22 (CI + repo-recommended 22.19.0) 1.04 reads 12.5% OOB-low -- the
    # steep lever is node/V8-sensitive near the cliff. 1.02 reads WR 23% in-band on BOTH
    # node 22 AND node 24 (N=100 seed 424242) = cross-runtime-robust (a plateau before the
    # 1.04 cliff). Calibrate on node 22 (CANONICAL sec 3 rule 8). hc07 robust (42% all nodes).
    # --- HISTORY ---
    # RE-RATIFY 2026-06-14 (post-#2719): boss_hp_multiplier 0.65 -> 1.04.
    # git-bisect proved #2719 f5387e66 (channel-routing fix: /round/execute now
    # honors action.channel) flipped hc06 17% (parent #2717) -> 51% OOB. The
    # greedy policy's `psionico` exploit vs the corazzato boss/elites was a no-op
    # under the prior bug (every round attack was physical); the fix unlocked it
    # -> 0.65 too weak. The 15-25% band had been ratified UNDER the bug. Forensic
    # N=100 @ canonical seed 424242: boss 1.04 -> WR 22% (def 78%, timeout 0%) =
    # all 3 class bands met. Lever is STEEP near band (1.0->27%, 1.05->12.5% N=40)
    # -> the combat-balance CI gate + band-invalidation protocol
    # (docs/process/CANONICAL-AI-PLAYTEST.md sec 9) guard recurrence.
    # Evidence: docs/playtest/2026-06-14-canonical-forensic-n100.md
    # --- HISTORY (pre-#2719, channel-bug era; band measured under the bug) ---
    # iter5 OPTUNA REJECTED (2026-05-21): boss 0.866+limit 31 -> N=40 WR 30% OOB
    # (L-073 optimizer-on-N=20-noise). iter2 (boss 0.65) = N=40 WR 15% confirmed
    # BUT under the channel bug. docs/playtest/2026-05-21-optuna-l073-noise-convergence.md
    boss_hp_multiplier: 1.02
    rationale: 'NODE-22 RE-CALIBRATED 2026-06-14: boss_hp_multiplier 1.04 -> 1.02. 1.04 was tuned on node 24 (22%) but reads 12.5% OOB-low on the canonical node 22 (CI/prod); the steep lever is node/V8-sensitive at the cliff. 1.02 = WR 23% in-band [15-25] on BOTH node 22 AND node 24 (N=100 seed 424242) = cross-runtime-robust. Root cause was #2719 (channel-routing fix unlocked the greedy psionico exploit; band had been ratified under the bug). Calibrate on node 22 (CANONICAL sec 3 rule 8). Pre-#2719: iter2 boss 0.65 = WR 15% (under the bug).'

  enc_tutorial_07_hardcore_pod_rush:
    # RE-CENTER 2026-06-14 (PR #2753 follow-up): enemy_damage_multiplier_override
    # 2.1 -> 2.5. hc07 had drifted to the band CEILING (50% N=40 / 52% N=100,
    # in-band but no margin) -> perpetual edge-warning on the new combat-balance
    # CI gate. #2719-INDEPENDENT (fisico-only policy, no channel exploit; verified
    # by git-bisect on hc06; hc07 was 50% already at the 2026-05-30 baseline).
    # Re-centered to mid-band: forensic N=100 seed 424242 -> WR 42% (timeout 58%
    # = timer-race loss by design; defeat 0%). hc07 losses are timeouts, so the
    # class defeat/timeout bands (an elimination concept) do NOT apply -- only the
    # WR band [30-50] gates hc07.
    # --- HISTORY ---
    # 3A iter2 (2026-05-21): edm 2.1 (REPLACES class hardcore 1.8). iter1
    # (enemy_count -1) REJECTED inverted dir. 2026-05-20-hardcore-07-3a-overshoot.md
    enemy_damage_multiplier_override: 2.5
    rationale: 'RE-CENTERED 2026-06-14: enemy_damage_multiplier_override 2.1 -> 2.5 (replaces class 1.8). hc07 sat at the band ceiling (50% N=40 / 52% N=100) since the 2026-05-30 baseline = no margin for the combat-balance gate. #2719-independent (fisico-only, timer-race). Forensic N=100 seed 424242: WR 42% in-band [30-50], timeout 58% (timer-loss by design). edm sweep N=40: 2.1->50, 2.3->47.5, 2.5->42.5, 2.7->42.5.'

# ─── Wound location weights (OD-058 D2) ───────────────────────────────
# SPEC-D2 §4: when a wound triggers (critico/KO), the body location is chosen
# random-weighted. torso heaviest (large target), testa lightest (hard/critical hit).
# Consumed by apps/backend/services/combat/woundSystem.js — DEFAULT_LOCATION_WEIGHTS
# mirrors this table (drift-guarded by tests/scripts/damageCurvesIntegrity.test.js);
# pickWeightedLocation iterates these in declared order.
# Magnitudo per tier (lieve/media/grave = -1/-1/-2; testa-grave = -1 AP) + the
# critico/KO trigger live in woundSystem.js. N=40 magnitude tuning = OD-058 D2 follow-up.
wound_location_weights:
  torso: 40
  arti_anteriori: 25
  arti_posteriori: 25
  testa: 10

# ─── Validation rules ─────────────────────────────────────────────────

validation:
  scenario_overrides_valid_ids:
    description: 'Tutti scenario_id in scenario_overrides devono esistere in hardcoreScenario.js exports (HARDCORE_SCENARIO_06/07/...). Drift = config orfano.'
    enforced_by: 'tests/scripts/damageCurvesIntegrity.test.js'

  target_bands_non_overlapping:
    description: 'Tutorial defeat 10-20% vs standard defeat 25-40% NON si sovrappongono. Encounter class determinabile post-hoc da win_rate oggettivo.'
    enforced_by: 'tests/scripts/damageCurvesIntegrity.test.js'

  multiplier_monotonic:
    description: 'enemy_damage_multiplier deve crescere tutorial → tutorial_advanced → standard → hardcore → boss'
    enforced_by: 'tests/scripts/damageCurvesIntegrity.test.js'

  enrage_threshold_range:
    description: 'boss_enrage_threshold_hp ∈ [0, 1] o null. Null = no enrage (tutorial only).'
    enforced_by: 'schemas/evo/damage_curves.schema.json'

# ─── Riferimenti ──────────────────────────────────────────────────────

references:
  adr: 'docs/adr/ADR-2026-04-20-damage-scaling-curves.md'
  evidence_calibration:
    - 'docs/playtest/2026-04-19-m6-iter2b-baseline.md'
    - 'docs/playtest/2026-04-19-m6-iter3-channel-exploit.md'
  design_pivot_memo: 'docs/process/2026-04-19-M7-sprint-plan-expert-synthesis.md'
