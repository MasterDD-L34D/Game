# Damage scaling curves — M7-#2 (ADR-2026-04-20).
#
# Difficulty as feature, not ad-hoc tuning. Define per-encounter-class
# enemy damage multiplier, boss enrage threshold, target win/defeat/timeout
# bands per calibration harness.
#
# Runtime wire (M7-#2 Phase B):
#   session.js /start → legge encounter.encounter_class → applica
#   enemy_damage_multiplier a unit.mod degli enemy spawn
#   performAttack boss turn → enrage check se hp < threshold_hp
#
# Calibration (M7-#2 Phase D):
#   batch_calibrate_*.py legge target_bands per class → pass/fail oggettivo
#
# Vedi docs/adr/ADR-2026-04-20-damage-scaling-curves.md

version: '1.0'
schema_version: '1.0.0'

# ─── Encounter classes ───────────────────────────────────────────────
# Ogni encounter YAML dichiara `encounter_class: <key>`. Default "standard"
# se assente. Sostituisce target band one-size 15-25% (fallacy).

encounter_classes:
  tutorial:
    description: 'First-contact missions (tutorial_01-03). Skill floor, combat forgiving.'
    target_bands:
      win_rate: [0.60, 0.80]
      defeat_rate: [0.10, 0.20]
      timeout_rate: [0.05, 0.10]
    enemy_damage_multiplier: 1.0
    boss_enrage_threshold_hp: null  # no enrage tutorial tier
    # M9 P6: turn_limit_defeat null = no forced outcome (tutorial forgiving)
    turn_limit_defeat: null

  tutorial_advanced:
    description: 'Late tutorial (04-05). Introduce mechanics status/boss (apex tier-1).'
    target_bands:
      win_rate: [0.40, 0.60]
      defeat_rate: [0.20, 0.35]
      timeout_rate: [0.05, 0.15]
    enemy_damage_multiplier: 1.1
    boss_enrage_threshold_hp: 0.25
    turn_limit_defeat: null

  standard:
    description: 'Mid-game encounters. Balanced threat, most common.'
    target_bands:
      win_rate: [0.35, 0.55]
      defeat_rate: [0.25, 0.40]
      timeout_rate: [0.10, 0.20]
    enemy_damage_multiplier: 1.2
    boss_enrage_threshold_hp: 0.30
    turn_limit_defeat: 30  # soft limit per standard, rare trigger

  hardcore:
    description: 'High-difficulty 8p co-op. Team tactical peak required.'
    # 2026-05-21 (OD-032) band revised to engine reality via N=40 evidence.
    # Original DESIGN-TARGET was defeat [0.40,0.55] + timeout [0.15,0.25] (a
    # "hard but ran-out-of-time" middle outcome). That target is structurally
    # INCOMPATIBLE with turn_limit_defeat=25 below: M7 added the timer
    # specifically to "elimina stalemate pattern (iter7 timeout 67%)" -> it
    # converts every unresolved game to defeat at turn 25, so timeout ~0 always.
    # Optuna 3-knob run (boss_hp + enemy_damage + turn_limit) confirmed: with
    # timer ON timeout=0 (no reachable stalemate band); even timer-OFF the 5
    # trials never produced timeout (hc06 combat resolves win/wipe within 40
    # rounds). Production config (boss_hp 0.65, timer 25) N=40: WR 25% / defeat
    # 75% / timeout 0% (pooled N=72 ~ WR 21% / defeat 78% / to 0%). Band now
    # matches that. WR [0.15,0.25] kept (primary pillar, in-band).
    # ALT (master-dd, OD-032): to restore the timeout-middle band, revert M7
    # (raise/disable turn_limit) + tune the stalemate corner (high boss_hp +
    # low enemy_damage) -- fragile (iter7 hit 67% uncontrolled) and re-opens the
    # stalemate M7 closed. enemy_damage_multiplier_override knob now wired for
    # hc06 (OD-032 C) if that path is pursued.
    target_bands:
      win_rate: [0.15, 0.25]
      defeat_rate: [0.75, 0.85]
      timeout_rate: [0.00, 0.05]
    # M7-#2 Phase E iter7 (post iter6 RED wr 63.3%): 1.4 → 1.8 (+0.4).
    # Vedi docs/playtest/2026-04-20-m7-iter6-hardcore-verdict.md § Option A+D.
    enemy_damage_multiplier: 1.8
    boss_enrage_threshold_hp: 0.40
    # M9 P6 (Flint Long War pattern): force decision pressure.
    # Turn >= 25 + player still alive + objective not completed → defeat.
    # iter7 median turns_win=28 → budget 25 = risky but reachable con focus-fire.
    # Elimina stalemate pattern (iter7 timeout 67%).
    turn_limit_defeat: 25

  boss:
    description: 'Apex boss fight. Signature mechanics, dramatic enrage.'
    target_bands:
      win_rate: [0.05, 0.15]
      defeat_rate: [0.55, 0.70]
      timeout_rate: [0.10, 0.25]
    # M7-#2 Phase E iter7: 1.6 → 2.0 per mantenere monotonic > hardcore 1.8.
    # Boss 1v2 player (solo fight), scaling piu aggressivo giustificato.
    enemy_damage_multiplier: 2.0
    boss_enrage_threshold_hp: 0.50
    # M9 P6: boss 1v2 dura media 20 round. Limit 20 = kill boss o perdi.
    turn_limit_defeat: 20

  badlands:
    # TKT-ADAPTER-ECO-COMBAT phase 2b -- ecology->combat adapter pilot band.
    # Scenario enc_badlands_pilot_01: enemies derived by ecologyCombatAdapter
    # from REAL badlands species ecology (threat_tier x role_class). This is a
    # NEW, SEPARATE band -- it never touches the ratified hardcore_06 [0.15,0.25]
    # or hardcore_07 [0.30,0.50] bands (census anti-pattern 5).
    # Tone: first-contact badlands biome pilot, difficulty 5/10 quartet -- engaging
    # but winnable. WR [0.40,0.60] picked as the calibration target for the N=40 pass.
    # enemy_damage_multiplier 1.0 (NEUTRAL) on purpose: the adapter HP/role-mult knobs
    # are the SOLE calibration lever (D3 adapter-first), so calibration == real play.
    description: 'Badlands ecology-adapter pilot. Adapter-driven enemies, neutral class mult.'
    target_bands:
      win_rate: [0.40, 0.60]  # PRIMARY pillar (handoff target). Pooled N=80 = 0.500.
      # Decisive scenario: the turn_limit_defeat below forces win/defeat (TR ~ 0), so
      # defeat_rate mirrors 1 - win_rate. Band kept CONSISTENT with the win band
      # ([0.40,0.60] win + <=0.15 timeout -> defeat in [0.25,0.60]); pooled N=80 = 0.500.
      defeat_rate: [0.30, 0.60]
      timeout_rate: [0.00, 0.15]
    enemy_damage_multiplier: 1.0
    boss_enrage_threshold_hp: null  # no boss in pilot roster
    # Stalemate breaker (Flint Long War pattern, mirrors standard/hardcore). N=10
    # calibration showed the quartet-vs-5 elimination naturally runs ~30 rounds; with
    # no limit, ~30-60% of games stall to MAX_ROUNDS (round 41) as timeouts. A limit
    # of 34 (>= typical win time 18-32, < stall point 41) converts genuine stalls to
    # tactical defeats, collapsing the timeout band to ~0 while preserving real wins.
    # This is the calibration lever (NOT the adapter knobs: baseline adapter stats land
    # in band once stalls resolve -- no HP/MOD override needed). See phase-2b research doc.
    # Tuned 34->37 at N=40: limit 34 gave WR 0.45 / DR 0.55 (DR +5pp over band ceiling);
    # 37 lets the slow-but-winnable fights (turns 32-37) resolve as wins, lifting WR into
    # the [0.50,0.60] sweet spot so DR lands inside [0.30,0.50].
    turn_limit_defeat: 37

# ─── Enemy tiers ──────────────────────────────────────────────────────
# Base stats pre-class multiplier. Encounter spawn li legge + applica
# multiplier da encounter_class.

enemy_tiers:
  minion:
    description: 'Low-threat fodder, swarm patterns'
    base_mod: 2
    hp_baseline: 4
    base_dc: 11
    role: 'numbers_pressure'

  elite:
    description: 'Mid-threat specialist, archetype-distinct'
    base_mod: 3
    hp_baseline: 8
    base_dc: 12
    role: 'tactical_counter'

  boss:
    description: 'High-threat keystone, enrage-capable'
    base_mod: 5
    hp_baseline: 20
    base_dc: 13
    # M7-#2 Phase E iter7: enrage_mod_bonus 1 → 3. Combined con hardcore 1.8x
    # multiplier, boss enrage passa mod 5 → mod 8 (+60%) late-fight drama.
    enrage_mod_bonus: 3  # applied quando hp < class threshold
    enrage_damage_dice_bonus: 0  # future: bonus dice su enrage
    role: 'encounter_anchor'

# ─── Player job combat baselines ──────────────────────────────────────
# Stat base per job (pre-equipment/trait). Applicato a unit spawn via
# normaliseUnit JOB_STATS hook. M8+ character progression usa qui.

player_classes:
  vanguard:
    description: 'Tank — corazzato archetype, resist fisico/taglio'
    hp_baseline: 14
    armor_baseline: 0
    mod_baseline: 3
    dc_baseline: 13
    ap_baseline: 2
    resistance_archetype: corazzato

  warden:
    description: 'Ranged support caster — psionico archetype'
    hp_baseline: 10
    armor_baseline: 0
    mod_baseline: 3
    dc_baseline: 12
    ap_baseline: 2
    resistance_archetype: psionico

  invoker:
    description: 'Psionic caster offensive'
    hp_baseline: 9
    armor_baseline: 0
    mod_baseline: 4
    dc_baseline: 11
    ap_baseline: 2
    resistance_archetype: psionico

  skirmisher:
    description: 'Mobile damage dealer — adattivo (neutral)'
    hp_baseline: 10
    armor_baseline: 0
    mod_baseline: 3
    dc_baseline: 12
    ap_baseline: 2
    resistance_archetype: adattivo

  ranger:
    description: 'Ranged damage dealer'
    hp_baseline: 10
    armor_baseline: 0
    mod_baseline: 3
    dc_baseline: 12
    ap_baseline: 2
    resistance_archetype: adattivo

  artificer:
    description: 'Utility/support tech'
    hp_baseline: 11
    armor_baseline: 0
    mod_baseline: 2
    dc_baseline: 12
    ap_baseline: 2
    resistance_archetype: adattivo

  harvester:
    description: 'Resource specialist melee'
    hp_baseline: 12
    armor_baseline: 0
    mod_baseline: 3
    dc_baseline: 12
    ap_baseline: 2
    resistance_archetype: adattivo

# ─── Scenario overrides (per-encounter knob layer) ────────────────────
# Pattern: Hades Pact of Punishment + Into the Breach scenario-tagged design.
# Risolve cross-scenario tension dove encounter_class globale (es 'hardcore')
# applica stesso multiplier a scenari con bottleneck ortogonali (es. boss-HP
# vs swarm+timer). Override locale per-scenario sopra class default.
#
# Origine: docs/research/2026-05-20-calibration-knob-patterns-industry.md
# Evidence: docs/playtest/2026-05-20-hardcore-06-postwave57-report.md (0% WR
#   stesso class hardcore vs hardcore_07 60% WR — single-knob insufficient).
#
# Schema: keys = scenario_id (matcha hardcoreScenario.js export); valori = oggetto
# con knob opzionali. Knob assenti = inherit class default.
#
# Knob supportati v1:
#   boss_hp_multiplier (float, default 1.0) → moltiplica HP unità con flag is_boss
#                                            o id contiene "_boss"
#
# Validation: vedi validation.scenario_overrides_valid_ids regola sotto.

scenario_overrides:
  enc_tutorial_06_hardcore:
    # iter5 OPTUNA REJECTED (2026-05-21): Method A TPE 3-trial converged
    # boss 0.866 + limit 31 → N=20 WR 15% BUT N=40 ratify → WR 30% OOB-high.
    # L-073 META-LESSON: Optuna optimized on N=20 objective = converged to
    # noise (trial 1 lucky-low 3/20). Optimizer inherited L-069 flaw.
    # Rollback iter5. iter2 (boss 0.65 alone) restored = N=40 WR 15% confirmed.
    # FUTURE: Optuna n_per_trial MUST be >=40 OR converges to noise.
    # Vedi docs/playtest/2026-05-21-optuna-l073-noise-convergence.md
    boss_hp_multiplier: 0.65
    rationale: 'iter2 N=40 WR 15% in-band primary RESTORED. iter5 Optuna (boss 0.866 + limit 31) REJECTED N=40 WR 30% OOB-high (L-073 optimizer-on-noise). Secondary metrics (defeat 85%) deferred Sprint M14 N=40-objective Optuna OR MAP-Elites.'

  enc_tutorial_07_hardcore_pod_rush:
    # 3A iter2 (2026-05-21): enemy_damage_multiplier_override 2.2 (REPLACES
    # class hardcore 1.8). 3A iter1 (enemy_count -1) REJECTED inverted direction
    # (WR 60->70%). iter2 path B: enemies hit harder = party takes more dmg =
    # LOWER WR toward target [30-50%]. Direction probe N=10 then N=40 ratify.
    # Replaces (not stacks) class 1.8. Vedi docs/playtest/2026-05-20-hardcore-07-3a-overshoot.md
    enemy_damage_multiplier_override: 2.1
    rationale: '3A iter2 enemy_damage 1.8->2.1 (replace class). edm 2.2 N=40 WR 27.5% OOB-low (-2.5pp below floor). Slope ~8pp/0.1edm: 2.1 expect WR ~33-37% mid-band [30-50%]. iter1 enemy_count -1 rejected. PENDING N=40 ratify.'

# ─── Wound location weights (OD-058 D2) ───────────────────────────────
# SPEC-D2 §4: when a wound triggers (critico/KO), the body location is chosen
# random-weighted. torso heaviest (large target), testa lightest (hard/critical hit).
# Consumed by apps/backend/services/combat/woundSystem.js — DEFAULT_LOCATION_WEIGHTS
# mirrors this table (drift-guarded by tests/scripts/damageCurvesIntegrity.test.js);
# pickWeightedLocation iterates these in declared order.
# Magnitudo per tier (lieve/media/grave = -1/-1/-2; testa-grave = -1 AP) + the
# critico/KO trigger live in woundSystem.js. N=40 magnitude tuning = OD-058 D2 follow-up.
wound_location_weights:
  torso: 40
  arti_anteriori: 25
  arti_posteriori: 25
  testa: 10

# ─── Validation rules ─────────────────────────────────────────────────

validation:
  scenario_overrides_valid_ids:
    description: 'Tutti scenario_id in scenario_overrides devono esistere in hardcoreScenario.js exports (HARDCORE_SCENARIO_06/07/...). Drift = config orfano.'
    enforced_by: 'tests/scripts/damageCurvesIntegrity.test.js'

  target_bands_non_overlapping:
    description: 'Tutorial defeat 10-20% vs standard defeat 25-40% NON si sovrappongono. Encounter class determinabile post-hoc da win_rate oggettivo.'
    enforced_by: 'tests/scripts/damageCurvesIntegrity.test.js'

  multiplier_monotonic:
    description: 'enemy_damage_multiplier deve crescere tutorial → tutorial_advanced → standard → hardcore → boss'
    enforced_by: 'tests/scripts/damageCurvesIntegrity.test.js'

  enrage_threshold_range:
    description: 'boss_enrage_threshold_hp ∈ [0, 1] o null. Null = no enrage (tutorial only).'
    enforced_by: 'schemas/evo/damage_curves.schema.json'

# ─── Riferimenti ──────────────────────────────────────────────────────

references:
  adr: 'docs/adr/ADR-2026-04-20-damage-scaling-curves.md'
  evidence_calibration:
    - 'docs/playtest/2026-04-19-m6-iter2b-baseline.md'
    - 'docs/playtest/2026-04-19-m6-iter3-channel-exploit.md'
  design_pivot_memo: 'docs/process/2026-04-19-M7-sprint-plan-expert-synthesis.md'
