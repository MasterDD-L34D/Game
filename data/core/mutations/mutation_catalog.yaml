    pe_cost: 25
    pi_cost: 12
    derived_ability_id: null
    mp_cost: 15
    biome_boost: [savana, badlands, abisso_vulcanico]
    biome_penalty: [cryosteppe, caldera_glaciale]
    mbti_alignment: { E: 1, T: 1 }
