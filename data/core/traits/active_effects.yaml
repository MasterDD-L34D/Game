  rostro_emostatico_litico:
    tier: T2
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
    effect:
      kind: apply_status
      target_side: target
      stato: bleeding
      turns: 3
