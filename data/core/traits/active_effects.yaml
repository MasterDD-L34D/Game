      on_result: hit
      melee_only: true
    effect:
      kind: apply_status
      target_side: target
      stato: bleeding
      turns: 3
      log_tag: aculei_venom
    description_it: |
      Aculei che iniettano un cocktail di tossine emolitiche. Ogni hit melee
