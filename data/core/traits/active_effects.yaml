# Active trait effects — SPRINT_002 fase 2 ("Primo trait vivo")
#
# Questo file definisce i trait meccanici VIVI usati a runtime dal session
# engine (apps/backend/services/traitEffects.js + apps/backend/routes/session.js).
#
# Un trait definito qui viene valutato dopo la risoluzione base d20 e
# puo' alterare il danno finale + aggiungere una voce nel trait_effects
# del session log. Un trait NON definito qui viene ignorato
# silenziosamente (triggered: false).
#
# Questo file NON sovrascrive il glossary (data/core/traits/glossary.json) o
# l'index (data/traits/index.json). Contiene solo la "regola meccanica"
# (trigger + effetto) che e' orthogonale al metadata descrittivo.
#
# Scope SPRINT_002: 2 trait minimi per validare la pipeline end-to-end.
# Estensioni future (tier T2+, categorie aggiuntive) richiederanno di
# ampliare lo schema qui sotto e l'evaluator in traitEffects.js.

version: 1
traits:
  zampe_a_molla:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      min_mos: 5
      requires: posizione_sopraelevata
    effect:
      kind: extra_damage
      amount: 1
      log_tag: backstab_bonus
    description_it: |
      Arti a molla che accumulano energia per balzi di riposizionamento.
      Se l'attaccante colpisce da posizione sopraelevata (y > y_target)
      con un margin of success >= 5, infligge 1 PT di danno extra.

  pelle_elastomera:
    tier: T1
    category: fisiologico
    applies_to: target
    trigger:
      action_type: attack
      on_result: hit
    effect:
      kind: damage_reduction
      amount: 1
      min: 0
      log_tag: damage_reduction
    description_it: |
      Pelle elastomerica che ammortizza l'impatto dei colpi in arrivo.
      Quando il target subisce un hit, il danno ricevuto viene ridotto
      di 1 (minimo 0).

  # SPRINT_018: trait che applicano stati emotivi temporanei al target.
  # Usano il nuovo effect.kind = 'apply_status' gestito da traitEffects.js
  # + performAttack in session.js. Il campo `stato` specifica quale
  # chiave di unit.status toccare, `turns` la durata in turni, `target`
  # dove applicarlo ('target' o 'actor'). Interagiscono con il policy
  # engine (services/ai/policy.js) gia' consapevole di status.

  ferocia:
    tier: T1
    category: comportamentale
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      # Trigger solo quando l'hit uccide il target (killing blow).
      on_kill: true
    effect:
      kind: apply_status
      target_side: actor
      stato: rage
      turns: 3
      log_tag: ferocia_rage
    description_it: |
      Ferocia ancestrale: ogni uccisione fa entrare l'attaccante in
      rabbia per 3 turni. In rage ignora l'autoconservazione (niente
      retreat REGOLA_002) e infligge +1 damage ai colpi riusciti.

  intimidatore:
    tier: T1
    category: comportamentale
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      # Trigger solo sugli attacchi ravvicinati (Manhattan == 1).
      melee_only: true
    effect:
      kind: apply_status
      target_side: target
      stato: panic
      turns: 2
      log_tag: intimidatore_panic
    description_it: |
      Aura intimidatoria che terrorizza chi viene colpito da vicino.
      Ogni hit adiacente riuscito applica 2 turni di panic sul target:
      l'unita' scappera' (REGOLA_002 / STATO_PANIC) invece di
      contrattaccare.

  stordimento:
    tier: T1
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      # Trigger solo sui colpi critici (mos >= 8).
      min_mos: 8
    effect:
      kind: apply_status
      target_side: target
      stato: stunned
      turns: 1
      log_tag: stordimento_stun
    description_it: |
      Colpo traumatico: ogni critico (MoS >= 8) applica 1 turno di
      stunned al bersaglio, che saltera' il turno successivo.

  # SPRINT_019: status fisici (Sanguinamento + Frattura), dal design doc
  # docs/core/10-SISTEMA_TATTICO.md linea 18. Si innestano sul sistema
  # status di sprint-013 + trait pipeline di sprint-018.
  #
  # Action 5b (2026-04-29) — severity 3-tier per bleeding + fracture.
  # Convention shape:
  #   unit.status.bleeding          = N (turns remaining, esistente)
  #   unit.status.bleeding_severity = 'minor' | 'medium' | 'major'   (NEW)
  #   unit.status.fracture          = N (turns remaining, esistente)
  #   unit.status.fracture_severity = 'minor' | 'medium' | 'major'   (NEW)
  #
  # Default `minor` se field assente (backward-compat: graffio leggero =
  # neutral, NO double-penalty oltre HP drain). Solo `medium`/`major`
  # triggerano `slow_down` (action_speed -1) in computeSlowDownPenalty
  # (apps/backend/services/combat/statusModifiers.js).
  # User verdetto Q2 2026-04-28: minor NO trigger, major SI trigger.
  # Spec ref: docs/adr/ADR-2026-04-28-deep-research-actions.md §Action 5b.

  denti_seghettati:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
    effect:
      kind: apply_status
      target_side: target
      stato: bleeding
      turns: 2
      log_tag: denti_bleeding
    description_it: |
      Denti seghettati che lacerano la carne del bersaglio. Ogni hit
      applica 2 turni di sanguinamento: il target subisce 1 danno non
      riducibile al termine di ogni turno.

  martello_osseo:
    tier: T1
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      # Trigger solo sui colpi critici (mos >= 8).
      min_mos: 8
    effect:
      kind: apply_status
      target_side: target
      stato: fracture
      turns: 2
      log_tag: martello_fracture
    description_it: |
      Protuberanza ossea pesante come una mazza. Ogni critico (MoS >= 8)
      applica 2 turni di frattura: il target perde AP al reset di turno
      (ap_remaining = 1 invece di ap pieno), limitando il movimento.

  # ============================================================================
  # WAVE 1 — OFFENSIVE (2026-04-25 — autonomous content sprint)
  # 25 trait offensivi che mappano famiglie del glossary su extra_damage e
  # apply_status (bleeding/fracture). Riferiti tutti al glossary.json esistente.
  # Filosofia: ogni famiglia di "appendici taglienti" ha 1-2 mechanics live.
  # ============================================================================

  # --- Famiglia ARTIGLI (claws) — extra_damage on melee + status modifiers ---
  artigli_sette_vie:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
    effect:
      kind: extra_damage
      amount: 1
      log_tag: artigli_grip
    description_it: |
      Artigli multipli che assicurano presa stabile su superfici irregolari.
      Ogni hit melee infligge +1 danno per la presa supplementare che impedisce
      al bersaglio di liberarsi e amplifica la profondit� dello squarcio.

  artigli_ipo_termici:
    tier: T2
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
      min_mos: 5
    effect:
      kind: apply_status
      target_side: target
      stato: stunned
      turns: 1
      log_tag: artigli_freeze
    description_it: |
      Falangi criogeniche che inducono shock da freddo localizzato. Su MoS >= 5
      in melee, applica 1 turno di stunned: il bersaglio salta il prossimo
      turno per ipotermia da contatto rapido.

  artigli_sghiaccio_glaciale:
    tier: T2
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
    effect:
      kind: apply_status
      target_side: target
      stato: fracture
      turns: 2
      log_tag: artigli_glacier_lock
    description_it: |
      Artigli che congelano e fissano il bersaglio al terreno. Ogni hit melee
      applica 2 turni di frattura (limitazione AP), simulando crampi e
      cristalli intra-articolari che bloccano il movimento.

  artigli_acidofagi:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
    effect:
      kind: apply_status
      target_side: target
      stato: bleeding
      turns: 2
      log_tag: artigli_acid_corrode
    description_it: |
      Artigli rivestiti di enzimi corrosivi che lacerano e digeriscono il
      tessuto del bersaglio. Ogni hit melee applica 2 turni di sanguinamento
      (1 PT non riducibile a fine turno).

  artigli_vetrificati:
    tier: T2
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      min_mos: 5
    effect:
      kind: extra_damage
      amount: 2
      log_tag: artigli_glass_pierce
    description_it: |
      Artigli vetrificati per indurimento estremo. Su un colpo solido (MoS >= 5)
      perforano cuticole e armature minerali infliggendo +2 danno extra di
      penetrazione.

  artigli_induzione:
    tier: T2
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
      min_mos: 5
    effect:
      kind: apply_status
      target_side: target
      stato: stunned
      turns: 1
      log_tag: artigli_inductive_shock
    description_it: |
      Artigli che canalizzano scariche elettromagnetiche al contatto. Un colpo
      ben piazzato (MoS >= 5) trasmette una scarica che disorienta il sistema
      nervoso del bersaglio per 1 turno.

  artigli_radice:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
    effect:
      kind: apply_status
      target_side: target
      stato: fracture
      turns: 1
      log_tag: artigli_root_grip
    description_it: |
      Artigli che si ramificano come radici nel terreno e nella carne.
      L'aggancio profondo applica 1 turno di frattura (bersaglio rallentato a
      ap=1 al prossimo reset di turno).

  artigli_scivolo_silente:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
      min_mos: 8
    effect:
      kind: extra_damage
      amount: 2
      log_tag: artigli_silent_strike
    description_it: |
      Artigli a profilo aerodinamico che colpiscono senza preavviso. Su un
      critico (MoS >= 8) infliggono +2 danno extra (bonus assassinio per
      sorpresa).

  artiglio_cinetico_a_urto:
    tier: T2
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
      min_mos: 5
    effect:
      kind: apply_status
      target_side: target
      stato: fracture
      turns: 2
      log_tag: artiglio_kinetic_smash
    description_it: |
      Artiglio singolo che concentra tutto il momento in un punto. MoS >= 5 in
      melee applica 2 turni di frattura, simulando l'effetto di un maglio su
      ossa lunghe.

  # --- Famiglia DENTI/MASCELLE — bleeding extras ---
  denti_chelatanti:
    tier: T2
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
    effect:
      kind: apply_status
      target_side: target
      stato: bleeding
      turns: 3
      log_tag: denti_chelate_bleed
    description_it: |
      Denti capaci di sequestrare metalli pesanti dal sangue del bersaglio
      durante il morso. Applica 3 turni di sanguinamento prolungato, simulando
      la perdita continua di emoglobina chelata.

  denti_ossidoferro:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
    effect:
      kind: extra_damage
      amount: 1
      log_tag: denti_iron_oxide
    description_it: |
      Denti rivestiti di ossidi di ferro durissimi. Ogni morso melee infligge
      +1 danno extra (penetrazione di scaglie e cuticole minerali).

  denti_silice_termici:
    tier: T2
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
      min_mos: 5
    effect:
      kind: apply_status
      target_side: target
      stato: bleeding
