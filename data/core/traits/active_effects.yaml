      target_side: actor
      stato: attuned
      turns: 2
      log_tag: sintonia_magnetica_passive
    description_it: |
      Sintonia con le fratture ossidiane — l'unita' canalizza l'energia
      magnetica del bioma. Stub data-only locked su atollo_obsidiana
      (M-future: enforcement biome gating). Prerequisito per
      risonanza_magnetica.
    biome_affinity:
      atollo_obsidiana: 0.8

  # =====================================================================
  # ANCESTORS NEURONS DUMP 01B — 22 trigger reaction-aware (OD-011 Path A)
  # =====================================================================
  # Source: reports/incoming/ancestors/ancestors_neurons_dump_01B_sanitized.csv
  # Card:   docs/museum/cards/ancestors-neurons-dump-csv.md (M-2026-04-25-004)
  # Branches mapped:
  #   - Self-Control (FR 01-08): faster reactions / timing window → modeled as
  #     small extra_damage on min_mos threshold (proxy "wider timing window
  #     converted to damage edge"). 8 distinct entries.
  #   - Attack/Counterattack (CO 01-06): counterattack prep speed → modeled as
  #     melee extra_damage on hit. 6 distinct entries.
  #   - Dodge (DO 01-06): dodge prep speed → modeled as target-side
  #     damage_reduction on incoming hit. 6 distinct entries.
  #   - BB-genetic exemplars (BB CO 01 + BB FR 01): T2 stronger variants. 2.
  # Total: 22 entries.
  #
  # Schema notes:
  # - All entries use existing `kind` enum (extra_damage / damage_reduction /
  #   apply_status) — no schema extension required.
  # - Status names introduced (tachypsychia, determination, ataraxia,
  #   evasive_focus) are runtime-inert free strings (precedent OD-012).
  # - Trigger fields: action_type/on_result/min_mos/melee_only — all already
  #   honored by apps/backend/services/traitEffects.js#passesBasicTriggers.
  # - Effects kept conservative (1-2 amount) per zampe_a_molla / pelle_elastomera
  #   precedent. No game-breaking values.
  # - "Branch-specific requires" hints (e.g. predator/irascible/wildlife) are
  #   captured in description_it as design intent; runtime-inert until
  #   M-future enemy-tag system is wired.

