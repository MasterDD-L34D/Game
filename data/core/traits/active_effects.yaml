  # --- CARAPACE ---
  carapace_fase_variabile:
    tier: T3
    category: fisiologico
    applies_to: target
    trigger:
      action_type: attack
      on_result: hit
      min_mos: 5
    effect:
      kind: damage_reduction
      amount: 3
