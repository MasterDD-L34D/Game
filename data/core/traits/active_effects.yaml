# Active trait effects — SPRINT_002 fase 2 ("Primo trait vivo")
#
# Questo file definisce i trait meccanici VIVI usati a runtime dal session
# engine (apps/backend/services/traitEffects.js + apps/backend/routes/session.js).
#
# Un trait definito qui viene valutato dopo la risoluzione base d20 e
# puo' alterare il danno finale + aggiungere una voce nel trait_effects
# del session log. Un trait NON definito qui viene ignorato
# silenziosamente (triggered: false).
#
# Questo file NON sovrascrive il glossary (data/core/traits/glossary.json) o
# l'index (data/traits/index.json). Contiene solo la "regola meccanica"
# (trigger + effetto) che e' orthogonale al metadata descrittivo.
#
# Scope SPRINT_002: 2 trait minimi per validare la pipeline end-to-end.
# Estensioni future (tier T2+, categorie aggiuntive) richiederanno di
# ampliare lo schema qui sotto e l'evaluator in traitEffects.js.

# ADR-2026-05-29-trait-schema-canonization: schema_version 2.0 bump 2026-05-29.
# `version: 1` legacy preservato 1 release per back-compat consumer; rimuovere
# in TKT successivo dopo verify nessun consumer legge il vecchio field.
schema_version: "2.0"
schema_version_previous: "1"
schema_bumped_at: "2026-05-29"
schema_bumped_ref: "ADR-2026-05-29-trait-schema-canonization"
version: 1
traits:
  zampe_a_molla:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      min_mos: 5
      requires: posizione_sopraelevata
    effect:
      kind: extra_damage
      amount: 1
      log_tag: backstab_bonus
    description_it: |
      Arti a molla che accumulano energia per balzi di riposizionamento.
      Se l'attaccante colpisce da posizione sopraelevata (y > y_target)
      con un margin of success >= 5, infligge 1 PT di danno extra.

  pelle_elastomera:
    tier: T1
    category: fisiologico
    applies_to: target
    trigger:
      action_type: attack
      on_result: hit
    effect:
      kind: damage_reduction
      amount: 1
      min: 0
      log_tag: damage_reduction
    description_it: |
      Pelle elastomerica che ammortizza l'impatto dei colpi in arrivo.
      Quando il target subisce un hit, il danno ricevuto viene ridotto
      di 1 (minimo 0).

  # SPRINT_018: trait che applicano stati emotivi temporanei al target.
  # Usano il nuovo effect.kind = 'apply_status' gestito da traitEffects.js
  # + performAttack in session.js. Il campo `stato` specifica quale
  # chiave di unit.status toccare, `turns` la durata in turni, `target`
  # dove applicarlo ('target' o 'actor'). Interagiscono con il policy
  # engine (services/ai/policy.js) gia' consapevole di status.

  ferocia:
    tier: T1
    category: comportamentale
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      # Trigger solo quando l'hit uccide il target (killing blow).
      on_kill: true
    effect:
      kind: apply_status
      target_side: actor
      stato: rage
      turns: 3
      log_tag: ferocia_rage
    description_it: |
      Ferocia ancestrale: ogni uccisione fa entrare l'attaccante in
      rabbia per 3 turni. In rage ignora l'autoconservazione (niente
      retreat REGOLA_002) e infligge +1 damage ai colpi riusciti.

  intimidatore:
    tier: T1
    category: comportamentale
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      # Trigger solo sugli attacchi ravvicinati (Manhattan == 1).
      melee_only: true
    effect:
      kind: apply_status
      target_side: target
      stato: panic
      turns: 2
      log_tag: intimidatore_panic
    description_it: |
      Aura intimidatoria che terrorizza chi viene colpito da vicino.
      Ogni hit adiacente riuscito applica 2 turni di panic sul target:
      l'unita' scappera' (REGOLA_002 / STATO_PANIC) invece di
      contrattaccare.

  stordimento:
    tier: T1
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      # Trigger solo sui colpi critici (mos >= 8).
      min_mos: 8
    effect:
      kind: apply_status
      target_side: target
      stato: stunned
      turns: 1
      log_tag: stordimento_stun
    description_it: |
      Colpo traumatico: ogni critico (MoS >= 8) applica 1 turno di
      stunned al bersaglio, che saltera' il turno successivo.

  # SPRINT_019: status fisici (Sanguinamento + Frattura), dal design doc
  # docs/core/10-SISTEMA_TATTICO.md linea 18. Si innestano sul sistema
  # status di sprint-013 + trait pipeline di sprint-018.
  #
  # Action 5b (2026-04-29) — severity 3-tier per bleeding + fracture.
  # Convention shape:
  #   unit.status.bleeding          = N (turns remaining, esistente)
  #   unit.status.bleeding_severity = 'minor' | 'medium' | 'major'   (NEW)
  #   unit.status.fracture          = N (turns remaining, esistente)
  #   unit.status.fracture_severity = 'minor' | 'medium' | 'major'   (NEW)
  #
  # Default `minor` se field assente (backward-compat: graffio leggero =
  # neutral, NO double-penalty oltre HP drain). Solo `medium`/`major`
  # triggerano `slow_down` (action_speed -1) in computeSlowDownPenalty
  # (apps/backend/services/combat/statusModifiers.js).
  # User verdetto Q2 2026-04-28: minor NO trigger, major SI trigger.
  # Spec ref: docs/adr/ADR-2026-04-28-deep-research-actions.md §Action 5b.

  denti_seghettati:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
    effect:
      kind: apply_status
      target_side: target
      stato: bleeding
      turns: 2
      log_tag: denti_bleeding
    description_it: |
      Denti seghettati che lacerano la carne del bersaglio. Ogni hit
      applica 2 turni di sanguinamento: il target subisce 1 danno non
      riducibile al termine di ogni turno.

  martello_osseo:
    tier: T1
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      # Trigger solo sui colpi critici (mos >= 8).
      min_mos: 8
    effect:
      kind: apply_status
      target_side: target
      stato: fracture
      turns: 2
      log_tag: martello_fracture
    description_it: |
      Protuberanza ossea pesante come una mazza. Ogni critico (MoS >= 8)
      applica 2 turni di frattura: il target perde AP al reset di turno
      (ap_remaining = 1 invece di ap pieno), limitando il movimento.

  # ============================================================================
  # WAVE 1 — OFFENSIVE (2026-04-25 — autonomous content sprint)
  # 25 trait offensivi che mappano famiglie del glossary su extra_damage e
  # apply_status (bleeding/fracture). Riferiti tutti al glossary.json esistente.
  # Filosofia: ogni famiglia di "appendici taglienti" ha 1-2 mechanics live.
  # ============================================================================

  # --- Famiglia ARTIGLI (claws) — extra_damage on melee + status modifiers ---
  artigli_sette_vie:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
    effect:
      kind: extra_damage
      amount: 1
      log_tag: artigli_grip
    description_it: |
      Artigli multipli che assicurano presa stabile su superfici irregolari.
      Ogni hit melee infligge +1 danno per la presa supplementare che impedisce
      al bersaglio di liberarsi e amplifica la profondit� dello squarcio.

  artigli_ipo_termici:
    tier: T2
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
      min_mos: 5
    effect:
      kind: apply_status
      target_side: target
      stato: stunned
      turns: 1
      log_tag: artigli_freeze
    description_it: |
      Falangi criogeniche che inducono shock da freddo localizzato. Su MoS >= 5
      in melee, applica 1 turno di stunned: il bersaglio salta il prossimo
      turno per ipotermia da contatto rapido.

  artigli_sghiaccio_glaciale:
    tier: T2
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
    effect:
      kind: apply_status
      target_side: target
      stato: fracture
      turns: 2
      log_tag: artigli_glacier_lock
    description_it: |
      Artigli che congelano e fissano il bersaglio al terreno. Ogni hit melee
      applica 2 turni di frattura (limitazione AP), simulando crampi e
      cristalli intra-articolari che bloccano il movimento.

  artigli_acidofagi:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
    effect:
      kind: apply_status
      target_side: target
      stato: bleeding
      turns: 2
      log_tag: artigli_acid_corrode
    description_it: |
      Artigli rivestiti di enzimi corrosivi che lacerano e digeriscono il
      tessuto del bersaglio. Ogni hit melee applica 2 turni di sanguinamento
      (1 PT non riducibile a fine turno).

  artigli_vetrificati:
    tier: T2
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      min_mos: 5
    effect:
      kind: extra_damage
      amount: 2
      log_tag: artigli_glass_pierce
    description_it: |
      Artigli vetrificati per indurimento estremo. Su un colpo solido (MoS >= 5)
      perforano cuticole e armature minerali infliggendo +2 danno extra di
      penetrazione.

  artigli_induzione:
    tier: T2
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
      min_mos: 5
    effect:
      kind: apply_status
      target_side: target
      stato: stunned
      turns: 1
      log_tag: artigli_inductive_shock
    description_it: |
      Artigli che canalizzano scariche elettromagnetiche al contatto. Un colpo
      ben piazzato (MoS >= 5) trasmette una scarica che disorienta il sistema
      nervoso del bersaglio per 1 turno.

  artigli_radice:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
    effect:
      kind: apply_status
      target_side: target
      stato: fracture
      turns: 1
      log_tag: artigli_root_grip
    description_it: |
      Artigli che si ramificano come radici nel terreno e nella carne.
      L'aggancio profondo applica 1 turno di frattura (bersaglio rallentato a
      ap=1 al prossimo reset di turno).

  artigli_scivolo_silente:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
      min_mos: 8
    effect:
      kind: extra_damage
      amount: 2
      log_tag: artigli_silent_strike
    description_it: |
      Artigli a profilo aerodinamico che colpiscono senza preavviso. Su un
      critico (MoS >= 8) infliggono +2 danno extra (bonus assassinio per
      sorpresa).

  artiglio_cinetico_a_urto:
    tier: T2
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
      min_mos: 5
    effect:
      kind: apply_status
      target_side: target
      stato: fracture
      turns: 2
      log_tag: artiglio_kinetic_smash
    description_it: |
      Artiglio singolo che concentra tutto il momento in un punto. MoS >= 5 in
      melee applica 2 turni di frattura, simulando l'effetto di un maglio su
      ossa lunghe.

  # --- Famiglia DENTI/MASCELLE — bleeding extras ---
  denti_chelatanti:
    tier: T2
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
    effect:
      kind: apply_status
      target_side: target
      stato: bleeding
      turns: 3
      log_tag: denti_chelate_bleed
    description_it: |
      Denti capaci di sequestrare metalli pesanti dal sangue del bersaglio
      durante il morso. Applica 3 turni di sanguinamento prolungato, simulando
      la perdita continua di emoglobina chelata.

  denti_ossidoferro:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
    effect:
      kind: extra_damage
      amount: 1
      log_tag: denti_iron_oxide
    description_it: |
      Denti rivestiti di ossidi di ferro durissimi. Ogni morso melee infligge
      +1 danno extra (penetrazione di scaglie e cuticole minerali).

  denti_silice_termici:
    tier: T2
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
      min_mos: 5
    effect:
      kind: apply_status
      target_side: target
      stato: bleeding
      turns: 2
      log_tag: denti_silica_thermal
    description_it: |
      Denti silicei che surriscaldano il bersaglio al contatto. MoS >= 5
      applica 2 turni di sanguinamento da microustioni che non si rimarginano.

  denti_tuning_fork:
    tier: T1
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      min_mos: 8
    effect:
      kind: apply_status
      target_side: target
      stato: stunned
      turns: 1
      log_tag: denti_resonance_stun
    description_it: |
      Denti come diapason: ogni critico (MoS >= 8) trasmette vibrazioni nel
      cranio del bersaglio causando 1 turno di disorientamento (stunned).

  # --- Famiglia ALI — extra_damage on elevated dive ---
  ali_fulminee:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      requires: posizione_sopraelevata
    effect:
      kind: extra_damage
      amount: 2
      log_tag: ali_dive_strike
    description_it: |
      Ali che permettono di attaccare in tuffo da posizione sopraelevata
      (y > y_target). +2 danno extra che simula il momento d'urto del
      picchio aereo.

  ali_solari_fotoni:
    tier: T2
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      requires: posizione_sopraelevata
      min_mos: 5
    effect:
      kind: extra_damage
      amount: 3
      log_tag: ali_photon_lance
    description_it: |
      Ali fotovoltaiche che concentrano luce in un raggio incenerente durante
      il tuffo. Da sopraelevato e MoS >= 5, +3 danno extra per
      vetrificazione del bersaglio.

  ali_ioniche:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      requires: posizione_sopraelevata
    effect:
      kind: apply_status
      target_side: target
      stato: stunned
      turns: 1
      log_tag: ali_ion_burst
    description_it: |
      Ali che rilasciano scariche ioniche durante la planata d'attacco.
      L'attacco da posizione sopraelevata applica 1 turno di stunned per
      shock elettrico al sistema nervoso.

  scarica_ionica:
    # Codex PR #2351 audit fix (2026-05-21): mirror trait_mechanics.yaml entry
    # into active_effects.yaml. Senza questo runtime resolution (traitEffects.js
    # loadActiveTraitRegistry) ignora silenziosamente il trait → A4 ionico
    # dead-channel fix incompleto in production flows.
    tier: T1
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      min_mos: 5
    effect:
      kind: extra_damage
      amount: 1
      log_tag: ionic_pulse
    resistances:
      - { channel: ionico, modifier_pct: 10 }
    description_it: |
      Scarica ionica baseline. Il colpo ionico riuscito con MoS >= 5 genera
      un impulso elettrico che infligge 1 PT extra (ionic_pulse). Resist
      canalico +10% (vedi trait_mechanics.yaml, applicato da resistanceEngine).
      2026-05-20 PR #2351 ship A4 design-space ionico attivazione.
      Codex PR #2355 audit fix: amount 0 → 1 (era no-op, ora effetto reale
      gated MoS 5 per coerenza con damage_step 0 baseline + ability ionic_pulse).

  arco_voltaico:
    # Codex PR #2351 audit fix (2026-05-21): mirror trait_mechanics.yaml entry.
    # Pattern analogico a ghiandole_nebbia_ionica + ali_ioniche.
    tier: T1
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      min_mos: 5
    effect:
      kind: apply_status
      target_side: target
      stato: disorient
      turns: 1
      log_tag: voltaic_arc_disorient
    resistances:
      - { channel: ionico, modifier_pct: 15 }
    description_it: |
      Arco voltaico aggressivo. Colpo ionico riuscito con MoS >= 5 induce
      disorient sul bersaglio (1 turno) per shock elettrico al sistema
      sensoriale. Resist canalico +15%, damage_step +1 (vedi trait_mechanics.yaml).
      2026-05-20 PR #2351 ship A4 design-space ionico attivazione.

  elettromagnete_biologico:
    # TKT-D4-ENRICH #2533 (2026-06-10): SPEC-D4 PROPOSTA A -- offensivo
    # anti-corazza canale `elettrico` (sinergia vuln corazzato elettrico:120,
    # SoT 13.9.1). Attiva il trait catalogo Offensivo/Elettrico esistente
    # (data/traits/offensivo/elettromagnete_biologico.json, usage_tag breaker).
    # NOTA runtime: primo trait con `resistances` in active_effects -- il
    # combat runtime legge i resist trait SOLO da questo file
    # (session.js performAttack -> traitRegistry[tid].resistances).
    # Valori PROPOSED -- ratify master-dd post N=40 (probe elettrica #2533).
    tier: T1
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      min_mos: 5
    effect:
      kind: extra_damage
      amount: 1
      log_tag: magnetic_overload
    resistances:
      - { channel: elettrico, modifier_pct: 10 }
    description_it: |
      Elettromagnete biologico. Il campo magnetico corporeo si scarica nel
      punto d'impatto: colpo riuscito con MoS >= 5 infligge 1 PT extra
      (magnetic_overload). Contro bersagli corazzati il canale elettrico
      sfrutta la vulnerabilita' della matrice (elettrico: 120). Ability
      attiva Sovraccarico Magnetico (1d8+1 elettrico, vedi jobs.yaml).
      Resist canale elettrico +10% (il campo proprio scherma le scariche).
      Consolida lo stub electromanta 2026-05-10 (PR #2164, trigger
      ranged_attack mai esercitato runtime) -- lineage: museum
      M-2026-04-25-005 magnetic_rift tier ladder, electromanta_abyssalis.

  seta_conduttiva_elettrica:
    # TKT-D4-ENRICH #2533 (2026-06-10): SPEC-D4 PROPOSTA C -- debuff/control.
    # Estende lo shock->disorient (arco_voltaico) in trait control dedicato
    # canale `elettrico`. Status canonico `disorient` (combat.schema.json
    # status_id enum) -- consumer live: attack -2 (session.js), action_speed
    # -1/intensity (roundOrchestrator), AI target-bias (policy.js).
    # Coordinamento D1 overcharge: NESSUN effetto -AP (no overlap tetto-AP).
    # Valori PROPOSED -- ratify master-dd post N=40 (probe elettrica #2533).
    tier: T1
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      min_mos: 5
    effect:
      kind: apply_status
      target_side: target
      stato: disorient
      turns: 1
      log_tag: voltaic_web_disorient
    resistances:
      - { channel: elettrico, modifier_pct: 10 }
    description_it: |
      Seta conduttiva elettrica. I fili intessuti scaricano la carica sul
      bersaglio agganciato: colpo riuscito con MoS >= 5 applica disorient
      (1 turno, cap canonico STATUS_DURATION_CAPS) per scarica al sistema
      nervoso. Identita' control del canale elettrico: nessun danno extra,
      il valore e' la finestra tattica (attack -2 + action_speed -1).
      Ability attiva Rete Voltaica (apply_status disorient, vedi jobs.yaml).
      Resist canale elettrico +10% (la seta mette a terra le scariche).

  ali_membrana_sonica:
    tier: T1
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      min_mos: 5
    effect:
      kind: apply_status
      target_side: target
      stato: panic
      turns: 2
      log_tag: ali_sonic_terror
    description_it: |
      Le ali emettono ultrasuoni terrificanti durante il battito d'attacco.
      MoS >= 5 applica 2 turni di panic (bersaglio fugge invece di
      contrattaccare).

  ali_fono_risonanti:
    tier: T2
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      min_mos: 8
    effect:
      kind: apply_status
      target_side: target
      stato: stunned
      turns: 1
      log_tag: ali_phono_resonance
    description_it: |
      Ali che generano una banda sonora amplissima in volo. Critico (MoS >= 8)
      applica 1 turno di stunned per saturazione uditiva del bersaglio.

  # --- Famiglia CODA — push e fracture ---
  coda_frusta_cinetica:
    tier: T1
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
      min_mos: 5
    effect:
      kind: apply_status
      target_side: target
      stato: fracture
      turns: 2
      log_tag: coda_whip_crack
    description_it: |
      Coda elastica che accumula slancio per un colpo a frusta devastante.
      MoS >= 5 in melee applica 2 turni di frattura (bersaglio a ap=1 al
      prossimo reset).

  coda_balanciere:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
    effect:
      kind: extra_damage
      amount: 1
      log_tag: coda_balanced_strike
    description_it: |
      Coda di equilibratura che permette colpi di precisione anche in
      movimento. +1 danno extra per stabilit� del baricentro durante l'attacco.

  coda_contrappeso:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
      min_mos: 5
    effect:
      kind: extra_damage
      amount: 2
      log_tag: coda_counterweight
    description_it: |
      Coda muscolosa usata come contrappeso per amplificare il momento di un
      colpo singolo. MoS >= 5 in melee infligge +2 danno extra.

  coda_prensile_muscolare:
    tier: T1
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
    effect:
      kind: apply_status
      target_side: target
      stato: fracture
      turns: 1
