  pungiglione_paralizzante:
    tier: T2
    category: traumatico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
      min_mos: 5
    effect:
      kind: apply_status
      target_side: target
      stato: stunned
      turns: 2
      log_tag: pungiglione_paralysis
    description_it: |
      Pungiglione carico di neurotossina inibitrice. MoS >= 5 in melee applica
