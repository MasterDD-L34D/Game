      min: 0
      log_tag: vestibular_advantage
    description_it: |
      Equilibrio Vestibolare: vantaggio vs cadute, riduce 1 PT danno
      da attacchi destabilizzanti. RFC sentience v0.1 interoception_trait
      T1. Hook: penalità carico -1 tier (folded in encumbrance engine).

  nocicezione:
    tier: T1
    category: sensoriale
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      requires: ferito
    effect:
      kind: extra_damage
      amount: 1
      log_tag: nociception_reactive
    description_it: |
      Nocicezione: quando Ferito, trigger difensivi reattivi infliggono
      +1 PT danno contrattacco. RFC sentience v0.1 interoception_trait
      T1. Hook: ritardi -1 quando Ferito (folded in action timing).

  termocezione:
    tier: T1
    category: sensoriale
    applies_to: target
    trigger:
      action_type: attack
      on_result: hit
    effect:
      kind: damage_reduction
      amount: 1
      min: 0
      log_tag: thermoception_resist
    description_it: |
      Termocezione: clock caldo/freddo + resistenze gear/ambiente.
      Riduce 1 PT danno da attacchi termici (fuoco/ghiaccio). RFC
      sentience v0.1 interoception_trait T1.

  # ADR-2026-05-29 TKT-CL-05 REVERTED 2026-05-29: pre-existing handler trovato
  # a linea 10383 (amount: 0, dice 1d6+1, log_tag filamenti_digestivi_heal).
  # L'audit 2026-05-10-trait-mech-no-handler-audit.md era stale - il gap b era
  # gia chiuso. Diff balance (amount 0 vs 3) e' decisione Balancer agent + tier
  # check, fuori scope ADR-2026-05-29 §scope guard "NO touch ai dati esistenti".

  # -- Creature-kit trait mechanics (salvage 2026-06-22) -------------------
  # 12 ratified signature traits per le creature recuperate (spec
  # docs/superpowers/specs/2026-06-22-creature-trait-mechanics-design.md).
  # Band-neutral: nessuna unita' di sim referenzia questi id finche' una
  # creatura non viene canonizzata + flippata live.
  # Slice 1: matrice_antimagia Mode B (soppressione abilita' on-hit, status inibito).
  matrice_antimagia:
    tier: T2
    category: neurologico
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
      # Mode B: solo sui colpi ravvicinati (Manhattan == 1).
      melee_only: true
    effect:
      kind: apply_status
      target_side: target
      stato: inibito
      turns: 1
      log_tag: matrice_antimagia
    description_it: |
      Matrice antimagia (golem): ogni colpo ravvicinato riuscito impone
      `inibito` per 1 turno -- il bersaglio non puo' usare abilita' attive
      (movimento, attacchi base e reazioni restano attivi). La modalita' A
      (impulso AoE da 2 AP) e' una slice successiva. Ref XCOM Disruptive
      Field / D&D Antimagic Field, duration-gated (non silenzio totale).

  # Slice 2+3: nuclei_di_controllo punto-debole bersagliabile (golem). Passivo:
  # nucleo_intatto -> +1 attacco + aura coordinamento agli alleati raggio 2
  # (combat/statusModifiers + combat/allyAuraMark). Un colpo MoS>=5 avanza lo
  # stato del nucleo (combat/nucleiWeakPoint): intatto -> danno_nucleo (+1 difesa)
  # -> nucleo_distrutto (burst +2, terminale).
  nuclei_di_controllo:
    tier: T2
    category: neurologico
    applies_to: actor
    trigger:
      action_type: passive
    effect:
      kind: apply_status
      stato: nucleo_intatto
      turns: 99
      log_tag: nuclei_di_controllo
    description_it: |
      Nuclei di controllo (golem): finche' il nucleo e' intatto coordina i colpi
      (+1 attacco) e l'aura coordinamento da' +1 attacco agli alleati entro raggio 2.
      Un colpo preciso (MoS >= 5) spezza il nucleo -> stato danneggiato (+1 difesa,
      perde le aure offensive); un secondo colpo preciso lo distrugge -> nucleo
      distrutto (detonazione, danno +2 una tantum). Punto debole bersagliabile.
      Ref XCOM MEC weak-point / Othercide.

  # Slice 3: corteccia_memetica (treant). Reazione difensiva engine-coded
  # (combat/cortecciaMemetica): subito >=3 danni -> riduzione danno 2 + broadcast
  # risonanza_memetica agli alleati raggio 3. persistent_marker = no-op nel
  # resolver; la logica vive in performAttack (session.js) sul trait_id.
  corteccia_memetica:
    tier: T2
    category: difensivo
    applies_to: actor
    trigger:
      action_type: passive
    effect:
      kind: persistent_marker
      marker: corteccia_memetica
      log_tag: corteccia_memetica
    description_it: |
      Corteccia memetica (treant): quando subisce un colpo pesante (>= 3 danni) la
      corteccia si indurisce (riduzione danno 2 sui colpi successivi) e la ferita
      condivisa risuona -> risonanza_memetica (uso singolo, +1 attacco) agli alleati
      entro raggio 3. Reazione difensiva con broadcast. Ref Darkest Dungeon ripple /
      Banner Saga willpower.

  # Slice 4: artigli_psionici (rakshasa). Reazione "leggi-la-preda" engine-coded
  # (combat/artigliPsionici): a ogni colpo in mischia marca il bersaglio; difendendosi
  # poi da quella stessa preda guadagna riduzione danno crescente (cap 3). DR
  # source-predicata, letta allo step di mitigazione in performAttack.
  artigli_psionici:
    tier: T2
    category: mentale
    applies_to: actor
    trigger:
      action_type: passive
    effect:
      kind: persistent_marker
      marker: artigli_psionici
      log_tag: artigli_psionici
    description_it: |
      Artigli psionici (rakshasa): colpendo in mischia il portatore studia la preda
      (lettura_preda). Quando in seguito si difende da quella stessa preda accumula
      riduzione danno (max 3), solo verso quel bersaglio. Difesa condizionale appresa.
      Ref Pillars Psion / Hades Guan Yu.

  # Slice 4: tessuti_adattivi (rakshasa). Reazione di adattamento canale engine-coded
  # (combat/tessutiAdattivi): subito >=2 danni di un canale -> +15% resistenza a quel
  # canale per 3 round + cura 1 (max 2 canali). Resistenza letta allo step di applica
  # resistenza in performAttack (pass separato, non la cache _resistances congelata).
  tessuti_adattivi:
    tier: T2
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: passive
    effect:
      kind: persistent_marker
      marker: tessuti_adattivi
      log_tag: tessuti_adattivi
    description_it: |
      Tessuti adattivi (rakshasa): subendo >= 2 danni di un canale il tessuto si adatta
      (adattamento_<canale>) -> +15% resistenza a quel canale per 3 round e cura 1.
      Al massimo 2 canali adattati insieme. La resistenza morde sui colpi successivi.
      Ref Hades Stubborn Roots.

  # Slice 5: filtri_bioattivi (otyugh). Bio-filtro passivo engine-coded
  # (combat/filtriBioattivi): a fine round purga 1 sanguinamento + 1 frattura e cura
  # 1 per purga. Il modo attivo (1 AP, purga tutti gli status negativi su un alleato
  # adiacente) e' rinviato -- richiede l'effect_type cleanse_status nello schema
  # contracts (forbidden path) + re-baseline jobs.yaml (owner-gated).
  filtri_bioattivi:
    tier: T2
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: passive
    effect:
      kind: persistent_marker
      marker: filtri_bioattivi
      log_tag: filtri_bioattivi
    description_it: |
      Filtri bioattivi (otyugh): ogni round il bio-filtro purga 1 sanguinamento e 1
      frattura e cura 1 per ogni status purgato. Mantiene la creatura ripulita dalle
      ferite da logoramento. Ref Subnautica filtering / Pathfinder otyugh.

  # Slice 5: membrane_osmotiche (otyugh). Assorbimento durata engine-coded
  # (combat/membraneOsmotiche): le durate degli status in arrivo sono ridotte di 1
  # all'applicazione (uno status da 1 turno e' assorbito del tutto). Il modo cura-da-
  # terreno (acqua/palude adiacente) e' rinviato -- manca il substrato terreno per-tile.
  membrane_osmotiche:
    tier: T2
    category: fisiologico
    applies_to: actor
    trigger:
      action_type: passive
    effect:
      kind: persistent_marker
      marker: membrane_osmotiche
      log_tag: membrane_osmotiche
    description_it: |
      Membrane osmotiche (otyugh): la membrana assorbe il morso degli status in arrivo
      -- la loro durata e' ridotta di 1 all'applicazione (uno status da 1 turno viene
      assorbito completamente). In tensione coi filtri: meno sofferenza, meno cure da
      purga. Ref Subnautica fluids / Darkest bleed-resist.

  # Slice 7: pigmenti_aurorali (treant). Bagliore passivo engine-coded
  # (combat/pigmentiAurorali): finche' il portatore e' a HP >= 50%, a fine round
  # acceca (abbagliato, -1 attacco al prossimo colpo) i nemici adiacenti. Il modo
  # attivo (intensifica a -2 + disorient) e' rinviato (ability path, owner-gated);
  # eco_sismico (partner LARGE di slice 7) rinviato -- serve il substrato terreno/mossa.
  pigmenti_aurorali:
    tier: T2
    category: sensoriale
    applies_to: actor
    trigger:
      action_type: passive
    effect:
      kind: persistent_marker
      marker: pigmenti_aurorali
      log_tag: pigmenti_aurorali
    description_it: |
      Pigmenti aurorali (treant): finche' e' in salute (HP >= 50%) i pigmenti brillano
      e a fine round accecano i nemici che restano adiacenti (abbagliato: -1 attacco al
      prossimo colpo). Il bagliore si affievolisce sotto meta' vita. Ref Slay-the-Spire
      Glow.
