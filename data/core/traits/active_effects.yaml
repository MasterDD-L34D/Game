  carapace_luminiscente_abissale:
    tier: T2
    category: fisiologico
    applies_to: target
    trigger:
      action_type: attack
      on_result: hit
    effect:
      kind: damage_reduction
      amount: 1
      log_tag: carapace_luminescent
    description_it: |
