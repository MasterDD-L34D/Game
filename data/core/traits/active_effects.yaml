    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
    effect:
      kind: apply_status
      target_side: target
      stato: slowed
      turns: 3
      log_tag: tela_appiccicosa_slowed
    description_it: |
      Ghiandole che secernono fili vischiosi. Ogni hit applica 3 turni di
      slowed: il target riceve -1 AP al reset turno (minimo 1 AP garantito).

  # Stato marked Tier 1: prossimo attaccante ottiene +1 dmg, mark consumato.
  # Wire: performAttack (session.js) controlla + consuma il mark prima del danno.

  marchio_predatorio:
    tier: T1
    category: comportamentale
    applies_to: actor
    trigger:
      action_type: attack
      on_result: hit
    effect:
      kind: apply_status
      target_side: target
      stato: marked
      turns: 2
      log_tag: marchio_predatorio_marked
    description_it: |
      Feromoni predatori che segnalano il bersaglio alla squadra. Ogni hit
      applica 2 turni di marked: il prossimo attacco sul target ottiene
      +1 danno (il mark viene consumato al primo utilizzo).

  # Sprint 6 (2026-04-27) — Beast Bond reaction trigger (AncientBeast Tier S #6
  # residuo). Pattern: "quando un alleato adiacente attacca, il portatore del
  # trait riceve un buff atk/def per N turni". Estensione per-creature di
  # squadCombo focus_fire (che e' globale player-only). Schema:
  #   triggers_on_ally_attack:
  #     range: <int>            # Manhattan max ally→holder, default 1
  #     species_filter:         # 'same' | 'any' | 'pack:<species_id>' (opzionale)
  #     atk_delta: <int>        # delta a holder.attack_mod_bonus
  #     def_delta: <int>        # delta a holder.defense_mod_bonus
  #     duration: <int>         # turni status[*_buff] (decay sessionRoundBridge)
  # Trigger eseguito da apps/backend/services/combat/beastBondReaction.js,
  # wired post-resolveAttack in routes/session.js performAttack. Surface:
  # response.beast_bond_reactions[] + raw event action_type='beast_bond_triggered'.

  legame_di_branco:
    tier: T2
    category: comportamentale
    applies_to: actor
    triggers_on_ally_attack:
      range: 1
      species_filter: same
      atk_delta: 1
      def_delta: 1
      duration: 1
      log_tag: legame_di_branco_triggered
    description_it: |
      Coordinamento istintivo tra esemplari della stessa specie. Quando un
      compagno della stessa specie adiacente (Manhattan <= 1) attacca, il
      portatore ottiene +1 attack_mod e +1 defense_mod fino al termine del
      round (decadimento via status[*_buff]).

  spirito_combattivo:
    tier: T2
    category: comportamentale
    applies_to: actor
    triggers_on_ally_attack:
      range: 1
      species_filter: any
      atk_delta: 1
      def_delta: 0
      duration: 1
      log_tag: spirito_combattivo_triggered
    description_it: |
      Morale rinforzato dall'iniziativa di chi combatte al proprio fianco.
      Quando QUALSIASI alleato adiacente (range Manhattan <= 1) attacca, il
      portatore guadagna +1 attack_mod fino al termine del round.

  # 2026-05-10 V10 C delete batch — pack_tactics rimosso (species
  # `predoni_nomadi` non esistente in data/core/species.yaml +
  # species_expansion.yaml. Trait dead — species_filter dead reference.
  # Cross-stack ref solo glossary entry (rimossa parallelamente).

  # Skiv Goal 1 (2026-04-28) — wounded_perma "cicatrice" persistente.
  #
  # Status NOT trait-applied via apply_status YAML loop (no trigger entry).
  # Applicato runtime da apps/backend/services/combat/woundedPerma.js quando
  # actor protagonista (Skiv) finisce KO in encounter con loss_conditions
  # player_wipe → propagato cross-encounter via session.lastMissionWoundedPerma
  # map. Effetto: -1 max_hp persistent durata sessione (NON decay per turno).
  #
  # Engine wired flow:
  #   1. enc_savana_skiv_solo_vs_pack.yaml definisce objective.loss_conditions.player_wipe
  #   2. on player_wipe → woundedPerma.applyWound(unit, sessionMap)
  #   3. unit.status.wounded_perma = { hp_penalty: 1 } + unit.max_hp -= 1
  #   4. cross-encounter: woundedPerma.restoreOnEncounterStart(unit, sessionMap)
  #
  # Trigger entry "marker_only": evaluator skip silently (no trigger.action_type),
  # serve solo come dichiarazione formale del status type per glossary/lint.
  # Action 5a (2026-04-29) — injury severity stack 3-tier (Battle Brothers
  # attrition pattern). `unit.status.wounded_perma.severity` ∈ enum:
  #   light  → -0 attack_mod (graffio leggero, default backward-compat)
  #   medium → -1 attack_mod (ferita compromettente)
  #   severe → -2 attack_mod (ferita grave, "compromesso totale")
  # Default `light` se field assente (NO surprise difficulty regression).
  # Letta runtime da apps/backend/services/combat/statusModifiers.js
  # (computeStatusModifiers — actor-side debuff). Persistenza cross-encounter
  # via session.lastMissionWoundedPerma map (woundedPerma.applyWound opts.severity).
  # Spec ref: docs/adr/ADR-2026-04-28-deep-research-actions.md §Action 5a.
  wounded_perma:
    tier: T1
    category: persistente
    applies_to: target
    severity_enum: [light, medium, severe]
    severity_default: light
    trigger:
      action_type: marker_only
    effect:
      kind: persistent_marker
      stato: wounded_perma
      log_tag: wounded_perma_marker
    description_it: |
      Cicatrice della ferita grave subita in encounter solo. -1 max_hp
      persistent per la durata della sessione (NON decay turn-based). Applicato
      runtime via woundedPerma.js quando l'attore protagonista subisce KO in
      encounter con loss_conditions.player_wipe attivo. Cross-encounter via
      session.lastMissionWoundedPerma map (riapplica HP penalty allo start).
      Severity 3-tier (Action 5a 2026-04-29): light/medium/severe → attack_mod
      penalty 0/-1/-2 letto da statusModifiers.js. Default `light` backward-compat.

