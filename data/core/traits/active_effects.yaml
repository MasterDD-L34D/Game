  # --- CUTICOLE ---
  cuticole_cerose:
    tier: T1
    category: fisiologico
    applies_to: target
    trigger:
      action_type: attack
      on_result: hit
      melee_only: true
    effect:
      kind: damage_reduction
      amount: 1
      log_tag: cuticole_wax
    description_it: |
      Cuticole rivestite di cera idrofobica che ammortizzano colpi melee.
      Ogni hit ravvicinato subisce -1 danno per scorrimento del colpo sulla
