  - id: codex_tutorial_intro
    title: A.L.I.E.N.A. — Introduzione
    category: tutorial
    always_deciphered: true
    content_clear: |
      Codex A.L.I.E.N.A. — archivio enciclopedico in-game. Le pagine vengono decifrate
