# Skiv Archetype Pool — companion worldgen-aware instances
#
# Schema: skiv_archetype_pool v0.1 (2026-04-27)
# Scopo: definisce il pool generativo per istanze Skiv-archetype negli altri run.
# NON modifica la persona canonica di Skiv (allenatore = override B3 ibrido).
#
# Voice rule (invariante — da docs/skiv/CANONICAL.md):
#   - prima persona italiana
#   - metafore sensoriali bioma-specifiche (NON sempre sabbia)
#   - interlocutore: "allenatore"
#   - closing: rituale bioma-specifico (vedi closing_pool per bioma)
#   - MBTI bias: influenzato da cluster Form dominante della squadra
#   - ANTI-PATTERN: registro pure-tecnico vietato; metafore inventate senza bioma vietate
#
# Dati verificati da:
#   - data/core/species.yaml (biome_affinity + clade_tag per ogni specie)
#   - data/core/biomes.yaml (biome_class + affixes + hazard + npc_archetypes)
#   - data/core/species/dune_stalker_lifecycle.yaml (lifecycle 5 fasi canonical)
#   - Museum M-2026-04-26-017 (forme MBTI come seed evolutivi)
#   - Museum M-2026-04-26-018 (bioma come pacchetto gameplay+fiction)
#   - Museum M-2026-04-26-013 (emergenza specie da ecosistema role_templates)
#
# Encoding: UTF-8 (json.dump ensure_ascii=False equivalente)

schema_version: "0.1.0"
generated_at: "2026-04-27"

# ─────────────────────────────────────────────────────────────────────
# SEZIONE 1 — Voice rule (inalterabile, invariante cross-bioma)
# ─────────────────────────────────────────────────────────────────────

voice_rule:
  person: prima_persona
  language: italiano
  register: mythic_melanconico_curioso  # mai pure-tecnico
  interlocutor: allenatore              # sempre "allenatore", mai "giocatore"
  metaphor_kind: bioma_specifica        # ogni bioma ha il suo vocabolario sensoriale
  closing: rituale_bioma               # vedi closing_pool per bioma

# ─────────────────────────────────────────────────────────────────────
# SEZIONE 2 — Generative rules schema
# ─────────────────────────────────────────────────────────────────────
#
# Input worldgen → istanza Skiv-archetype.
# Regola B3 ibrido: se allenatore == canonical_trainer → override Skiv canonical.
# Altri run: generazione completa da questa matrice.

generative_rules:
  inputs:
    primary_biome:
      source: worldgen.primary_biome  # slug biome da biomes.yaml
      required: true
    squad_dominant_form:
      source: cluster.dominant_form   # MBTI type aggregato dalla squadra (vcScoring)
      required: false
      default: null                   # null = nessun personality bias
    ecological_role_gap:
      source: biome_pool.role_gap     # ruolo trofico mancante nel bioma corrente
      # Deriva da: biome_pools.json role_templates (Museum M-2026-04-26-013)
      # Logica: conta apex/keystone/bridge/threat già presenti in sessione
      # Gap = ruolo con 0 istanze o ruolo ecologico chiave del bioma non rappresentato
      required: false
      default: bridge                 # bridge è ruolo default companion (mediatore)

  selection:
    species_id:
      logic: from biome_species_pool[primary_biome] filter by ecological_role_gap
      fallback: dune_stalker          # se bioma senza pool o no match
    name:
      logic: from name_pool[primary_biome] random_seeded(run_seed)
      # run_seed derivato da worldgen.seed per riproducibilità
    starting_phase: hatchling         # sempre fresh start, coerente con lifecycle canonical
    voice_metaphor_set:
      logic: from biome_metaphor_pool[primary_biome]
    closing_ritual:
      logic: from closing_pool[primary_biome] random_seeded(run_seed)

  mbti_personality_bias:
    # Squad Form dominante → personality bias istanza (non rigido, solo inclinazione)
    # Implementazione: modifica tono voice + postura (da dune_stalker_lifecycle.yaml mbti_aspect_correlates)
    solitari_t_high:   # T_F axis T dominant → istanza più analitica, meno empatica
      description: "Istanza Predatori-Soli: più distaccata, metriche prima delle storie."
      voice_modifier: fredda_analitica
    simbionti_f_high:  # F dominant → istanza più connessa al branco
      description: "Istanza Simbionti: più comunicativa, vocalizzazioni frequenti."
      voice_modifier: empatica_branco
    esploratori_n_high: # N dominant → movimenti sinuosi, vede pattern
      description: "Istanza Esploratori: linguaggio visionario, anticipa percorsi."
      voice_modifier: visionaria_intuitiva
    sensoriali_s_high: # S dominant → body-first, dettagli tattili
      description: "Istanza Sensoriali: ancorata al presente, metafore tattili."
      voice_modifier: sensoriale_presente

  b3_hybrid_override:
    condition: "unit.id == 'skiv' AND trainer == canonical_trainer"
    action: "usa Skiv canonical da docs/skiv/CANONICAL.md — NON generare"
    note: "Skiv canonical è invariante. override SEMPRE per l'allenatore."

  fallback:
    condition: "primary_biome NOT in biome_species_pool"
    action: "usa savana pool (dune_stalker archetype, nomi pool savana)"
    log: "WARN: biome [X] has no companion pool, defaulting to savana"

# ─────────────────────────────────────────────────────────────────────
# SEZIONE 3 — Pool per bioma
# ─────────────────────────────────────────────────────────────────────
#
# Copertura: 8 biomi shipping da biomes.yaml + expansion.
# Specie citate: SOLO quelle verificate in data/core/species.yaml.
# NON aggiungere specie inventate.
#
# Schema per voce bioma:
#   species_pool:  [id da species.yaml, con clade_tag]
#   name_pool:     8-12 nomi (max 6 lettere, fonosimbolico, bioma-coerenti)
#   biome_metaphor_set: 3-4 metafore sensoriali per voice
#   closing_pool:  2-3 ritual closing line

