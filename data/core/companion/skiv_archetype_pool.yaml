      - "sento il calore salire prima che il sole sia visibile"
      - "la sabbia ricorda ogni passo, anche i miei"
      - "il vento porta odori da tre dune di distanza"
      - "aspetto dove l'ombra non si muove ancora"
    closing_pool:
