  savana:
    species_pool:
      - id: dune_stalker
        clade_tag: Threat
        sentience_tier: T2
        ecological_role: threat_stalker
        # Canonical Skiv archetype — altri nomi pescati dal name_pool
    name_pool:
      # Skiv = canonical (allenatore). Pool per altri allenatori.
      - Vrak    # corto, occlusiva finale, duro come roccia
      - Krenn   # gutturale + vibrante
      - Yorà    # aperto, con accento su vocale larga
      - Mara    # bilabiale, suono basso
      - Nael    # liquida finale, quasi liquida
      - Oren    # aperto, vibrante
      - Sabe    # sibilante iniziale, evoca sabbia
      - Tiro    # breve, preciso
      - Vena    # risuona in gola
      - Zhan    # fricativa + nasale
      - Khàl    # occlusiva velare + accento
      - Drav    # chiuso, rotolante
