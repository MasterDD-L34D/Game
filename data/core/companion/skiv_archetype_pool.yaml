      - "il vento porta cristalli che cantano spettralmente"
      - "ogni nodo ionico vibra come una corda tesa"
      - "le canope risuonano in armoniche fratte"
      - "leggo i pattern ionici come una mappa sonora"
    closing_pool:
      - "L'eco si ritira."
      - "La canopia respira."
      - "Risonanza scolpisce."

  # ═══════════════════════════════════════════════════════════════════
  # DORSALE TERMALE TROPICALE — biome_class: geothermal
  # 2026-05-10 D2 T4 species adoption (PR #2164):
  # symbiotica_thermalis Keystone T4 + umbra_alaris T3 esistente.
  # Pre-PR: biome listed edge_cases biome_not_in_pool. Now wired.
  # ═══════════════════════════════════════════════════════════════════
  dorsale_termale_tropicale:
    species_pool:
      - id: symbiotica_thermalis
        clade_tag: Keystone
        sentience_tier: T4
        ecological_role: keystone_coordinator
      - id: umbra_alaris
        clade_tag: Playable
        sentience_tier: T3
        ecological_role: playable_endemic
    name_pool:
      - Calys   # caldo + abisso
      - Therma  # termale
      - Vento   # corrente termale
      - Pyrr    # pira tropicale
      - Solis   # sole
      - Nephe   # vapore
      - Volyn   # volo termico
      - Cinder  # cenere
      - Plumi   # pluma vapore
      - Halor   # alone termale
    biome_metaphor_set:
      - "il calore sale dalla bocca della dorsale come un saluto"
      - "le pieghe metalliche cantano quando il vento le tocca"
      - "ogni gradiente termico è un sentiero invisibile"
      - "il vapore porta odori profondi, sale dal cuore della terra"
    closing_pool:
      - "Il vapore sale."
      - "La dorsale respira."
      - "Calore ricorda."

# ─────────────────────────────────────────────────────────────────────
# SEZIONE 3.5 — Ennea archetype bias per biome (TKT-SKIV-ENNEA-ARCHETYPE)
# ─────────────────────────────────────────────────────────────────────
#
# 2026-05-10 audit cross-domain BACKLOG: skiv_archetype_pool aveva
# 0/9 Ennea archetype assignments → companion worldgen no path per
# triggerare enneaEffects su instance Skiv-archetype.
#
# Mapping biome → 2-3 Ennea types weighted (semantic fit). Future
# companion service ("companionService.js" — TKT-SKIV-COMPANION-SERVICE,
# Tier L scope) usa questo lookup per assegnare ennea archetype a
# istanze companion generative, abilitando enneaEffects runtime.
#
# Schema: biome → ennea types ordered by weight (primary, secondary,
# tertiary). Selection via worldgen seed o squad_dominant_form bias.
#
# Cross-ref: apps/backend/services/enneaEffects.js (handler 9/9 wired)

ennea_archetype_bias:
  # Arid + threat-heavy → predator endurance
  savana: [Cacciatore, Stoico, Conquistatore]

  # Subterranean + eco-listening → introspection + vigilance
  caverna: [Architetto, Lealista, Stoico]

  # Balanced + variety → coordinator + explorer
  foresta_temperata: [Coordinatore, Esploratore, Riformatore]

  # Harsh + survival → endurance + predator
  badlands: [Stoico, Cacciatore, Riformatore]

  # Volcanic + reef exotic → explorer + individualist
  atollo_obsidiana: [Esploratore, Individualista, Cacciatore]

  # Strange + neural → introspection + individualist
  frattura_abissale_sinaptica: [Architetto, Individualista, Esploratore]

  # Heights + isolation → endurance + reformer
  terrestre_montano: [Stoico, Riformatore, Architetto]

  # Ancient + mystery → introspection + reformer
  rovine_planari: [Architetto, Riformatore, Lealista]

  # 2026-05-10 D2 T4 dorsale_termale_tropicale wired post-pool addition:
  # geothermal mutualism + ecosystem coordinator → Coordinatore primary.
  # symbiotica_thermalis Keystone T4 ennea_archetype: Coordinatore.
  dorsale_termale_tropicale: [Coordinatore, Architetto, Stoico]

  # 2026-05-10 D3 T4 canopia_ionica wired (acoustic territorial dominance):
  # sonaraptor_dissonans Threat T4 ennea_archetype: Conquistatore.
  canopia_ionica: [Conquistatore, Cacciatore, Esploratore]

  # 2026-05-10 D4 T4 caldera_glaciale wired (psionic mountain dwellers):
  # psionerva_montis Bridge T4 ennea_archetype: Architetto.
  caldera_glaciale: [Architetto, Stoico, Lealista]

  # 2026-05-10 D5 T4 palude wired (morphic shapeshifter ecosystem):
  # fusomorpha_palustris Playable T4 ennea_archetype: Individualista.
  palude: [Individualista, Esploratore, Coordinatore]

# ─────────────────────────────────────────────────────────────────────
# SEZIONE 4 — Edge case + fallback rules
# ─────────────────────────────────────────────────────────────────────

edge_cases:
  biome_not_in_pool:
    condition: "worldgen.primary_biome NOT in biome_pools keys"
    action: use_savana_pool
    log_level: WARN
    examples_without_pool:
      # Biomi in biomes.yaml/expansion senza pool companion definito:
      # palude, dorsale_termale_tropicale, foresta_acida, foresta_miceliale,
      # canopia_ionica, canyons_risonanti, reef_luminescente, pianura_salina_iperarida,
      # stratosfera_tempestosa, mezzanotte_orbitale, steppe_algoritmiche,
      # e tutti i biomi expansion (ferrous-badlands, cinder-dunes, saltglass-flats, ecc.)
      action: "fallback to savana pool — non inventare specie"

  no_ecological_role_gap:
    condition: "biome_pool.role_gap == null"
    action: "default ecological_role: bridge — sempre disponibile"

  squad_form_null:
    condition: "cluster.dominant_form == null (squadra non ancora MBTI-classificata)"
    action: "nessun personality bias — usa voice_modifier neutro"

  apex_species_as_companion:
    condition: "selected species clade_tag == Apex"
    action: "exclude — Apex species non sono companion, sono boss/antagonisti"
    affected_species: [leviatano_risonante]

  canonical_trainer_check:
    # B3 ibrido: Skiv canonical per l'allenatore
    condition: "trainer_id == canonical_trainer_id (config)"
    action: "override totale — usa Skiv canonical (dune_stalker, INTP, savana)"
    note: >
      Il trainer_id canonico è configurabile in session config. Default:
      l'allenatore che ha originariamente 'allevato' Skiv (user esplicito 2026-04-25).
      Negli altri run (altri allenatori) → generazione completa da questo pool.

