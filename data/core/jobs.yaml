  # qualunque unit possieda il trait_id sorgente referenziato.
  trait_native:
    id: trait_native
    label: "Native (Trait)"
    label_it: "Nativa (Trait)"
    label_en: "Native (Trait)"
    role: support
    status: pseudo
    description: "Pseudo-job indice trait-native abilities."
    description_it: "Pseudo-job indice. Ogni unità eredita le abilità trait-native dei propri trait_id."
    fantasy_flavor: "Le forme stesse parlano: ogni mutazione è un'arma."
    synergy_tags: []
    initiative: 0
    attack_range: 0
