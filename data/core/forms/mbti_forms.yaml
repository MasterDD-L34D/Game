# Soft-gate penalty: se il job scelto e' in job_penalties del form,
# il giocatore subisce un malus al primo turno.
soft_gate:
  first_turn_penalty:
    attack_mod: -1
    defense_mod: -1
    duration_turns: 1
  # Alternativa: costo PI extra per unlock
  pi_surcharge: 5
