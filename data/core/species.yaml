      counters:
        - echolocation

species:
  - id: dune_stalker
    legacy_slug: dune_stalker
    genus: Arenavenator
    epithet: vagans
    clade_tag: Threat
    sentience_tier: T2
    display_name_it: Predatore delle Dune
    display_name_en: Dune Stalker
    display_name: Dune Stalker
    estimated_weight: 11
    weight_budget: 12
    biome_affinity: savana
    default_parts:
      locomotion: burrower
      metabolism: sand_digest
      offense: [sand_claws]
      defense: [heat_scales]
      senses: [echolocation]
    synergy_hints: [echo_backstab]
    trait_plan:
      core:
        - artigli_sette_vie
        - struttura_elastica_amorfa
        - scheletro_idro_regolante
        - sensori_geomagnetici
      optional:
        - coda_frusta_cinetica
        - sacche_galleggianti_ascensoriali
        - criostasi_adattiva
        - lamelle_termoforetiche
        - legame_di_branco # Sprint 6 — bond reaction trigger (same-species pack coord)
      synergies:
        - focus_frazionato
        - risonanza_di_branco
        - tattiche_di_branco
      environment_focus:
        biome_class: caverna
        rationale: >-
          Mantenere mobilità verticale e resistenza termica nelle cavità iper-saline
          in cui si rifugia il branco durante le tempeste desertiche.
    # ecology block additivo (ADR-2026-05-02): apex savana, solitario.
    # Compete con pulverator_gregarius per nicchia (entrambi apex).
    # Mutualismo indirect rare (Pulverator pack scaccia prede a Skiv).
    ecology:
      trophic_tier: apex
      pack_size:
        min: 1
        max: 1
      competes_with:
        - pulverator_gregarius
      prey_of: []
      preys_on: []
      scavenges_from: []
      mutualism_with:
        - species_id: pulverator_gregarius
          type: indirect
          note: >-
            Pulverator pack scaccia prede da copertura agevolando ambush
            di Skiv (effetto raro, non intenzionale dal pack).

