catalog:
  slots:
    locomotion:
      burrower:
        name: Burrower
        effects:
          resistances:
            res:
              sand: 1
    metabolism:
      sand_digest:
        name: Sand Digestor
        effects:
          resistances:
            res:
              sand: 1
    offense:
      sand_claws:
        name: Sand Claws
        effects: {}
    defense:
      heat_scales:
        name: Heat Scales
        effects:
          resistances:
            res:
              heat: 1
    senses:
      echolocation:
        name: Echolocation
        effects:
          resistances:
            res:
              sonic: 1
  synergies:
    # Schema (additive, runtime read by apps/backend/services/combat/synergyDetector.js):
    #   id        — slug stabile (telemetria + log)
    #   name      — label diegetic
    #   when_all  — list di "slot.part" tutti richiesti per fire
    #   effect    — opzionale; { bonus_damage: N }. Default 1 se assente.
    - id: echo_backstab
      name: Echo Backstab
      when_all:
        - senses.echolocation
        - offense.sand_claws
      effect:
        bonus_damage: 1

global_rules:
  morph_budget:
    default_weight_budget: 12
  stacking_caps:
    res_cap_per_type: 2
    dr_cap_per_type: 1
  counters_reference:
    - counter: ultrasound_ping
      counters:
        - echolocation

