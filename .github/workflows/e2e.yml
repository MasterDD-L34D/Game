name: E2E Tests (Playwright)

on:
  workflow_dispatch: {}
  schedule:
    - cron: '7 5 * * *'

env:
  # Opt-in Node.js 24 runtime per actions JavaScript (checkout, setup-node,
  # setup-python, upload-artifact, ecc.). Evita deprecation warning Node 20
  # (rimosso 2026-09-16). Vedi https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        working-directory: tests/playwright
        run: npm ci || npm i
      - name: Install Playwright browsers
        working-directory: tests/playwright
        run: npx playwright install --with-deps chromium
      - name: Resolve BASE_URL
        run: |
          if [ -n "${{ vars.SITE_BASE_URL }}" ]; then
            echo "BASE_URL=${{ vars.SITE_BASE_URL }}" >> $GITHUB_ENV
          elif [ -n "${{ secrets.SITE_BASE_URL }}" ]; then
            echo "BASE_URL=${{ secrets.SITE_BASE_URL }}" >> $GITHUB_ENV
          else
            echo "BASE_URL=" >> $GITHUB_ENV
          fi
      - name: Run Playwright tests (remote)
        if: env.BASE_URL != ''
        working-directory: tests/playwright
        run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright/playwright-report
          if-no-files-found: warn
