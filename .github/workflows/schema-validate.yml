name: Validate JSON Schemas

on:
  push:
    paths:
      - 'schemas/**'
      - 'config/schemas/**'
  pull_request:
    paths:
      - 'schemas/**'
      - 'config/schemas/**'
  workflow_dispatch: {}

env:
  # Opt-in Node.js 24 runtime per actions JavaScript (checkout, setup-node,
  # setup-python, upload-artifact, ecc.). Evita deprecation warning Node 20
  # (rimosso 2026-09-16). Vedi https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install schema validation dependencies
        run: pip install jsonschema==4.* pyyaml==6.*
      - name: Validate schemas and YAML samples
        run: python tools/py/validate_json_schemas.py
