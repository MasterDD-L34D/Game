name: Daily tracker refresh

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

env:
  # Opt-in Node.js 24 runtime per actions JavaScript (checkout, setup-node,
  # setup-python, upload-artifact, ecc.). Evita deprecation warning Node 20
  # (rimosso 2026-09-16). Vedi https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  refresh:
    runs-on: ubuntu-latest
    # GITHUB_TOKEN non serve piu' in scrittura: push + PR passano dal token
    # della GitHub App (step app-token). Least privilege: read-only.
    permissions:
      contents: read
    steps:
      # Token GitHub App dedicata al posto di GITHUB_TOKEN: dal 2026-06-11
      # le PR create/aggiornate da github-actions[bot] generano run
      # pull_request in stato action_required (approvazione umana richiesta)
      # -> PR #3196 bloccata 6 giorni. L'attore app-bot dedicato non e' gated.
      # https://github.blog/changelog/2026-06-11-bot-created-pull-requests-can-run-workflows-if-approved/
      - name: Mint automation app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Credenziale persistita = app token: git push usa l'app, non
          # github-actions[bot].
          token: ${{ steps.app-token.outputs.token }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install PyYAML
      - name: Aggiorna tracker e README
        run: python scripts/daily_tracker_refresh.py --export-json reports/daily_tracker_summary.json
      - name: Open tracker-refresh PR
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -e
          # main e' protetto: nessun push diretto. Consegna via PR branch +
          # auto-PR (idioma riusato da ai-sim-nightly B3), con app token
          # cosi' i check pull_request partono senza approvazione manuale.
          if git diff --quiet -- docs/00-INDEX.md; then
            echo "Tracker index invariato -- nessun PR necessario"
            exit 0
          fi
          BRANCH="automation/daily-tracker-refresh"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/00-INDEX.md
          git commit -m "chore: refresh tracker index"
          git push origin "$BRANCH" --force
          gh pr create \
            --title "chore: daily tracker index refresh" \
            --body "Auto-refresh indice tracker (docs/00-INDEX.md) generato da scripts/daily_tracker_refresh.py. main e' protetto: consegna via PR (mai auto-commit diretto su main). Rollback: git revert <sha> oppure chiudi il PR." \
            --label "automation" \
            --base main --head "$BRANCH" \
            --repo "${{ github.repository }}" || echo "PR gia' esistente per $BRANCH (aggiornato via force-push)"
