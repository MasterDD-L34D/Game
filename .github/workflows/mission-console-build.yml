name: Mission Console Build

# 2026-05-10 TKT-BOND-HUD Phase C (verdict #A3 = A master-dd grant + ship).
# Auto-build apps/mission-console/ Vue 3 source + commit dist a docs/mission-console/
# (GitHub Pages publish path).
#
# Trigger:
#   - push main su apps/mission-console/** path
#   - workflow_dispatch (manual)
#
# Replaces master-dd manual build pattern (npm run build + cp -r dist/* docs/mission-console/)
# documentato in ADR-2026-05-10-mission-console-recovery.md Phase C.
#
# Cross-ref:
#   - apps/mission-console/vite.config.ts
#   - docs/mission-console/ (GitHub Pages source)
#   - PR #2169 source restore

on:
  push:
    branches: [main]
    paths:
      - 'apps/mission-console/**'
      - 'package-lock.json'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspace apps/mission-console

      - name: Build Mission Console
        working-directory: apps/mission-console
        run: npm run build

      - name: Sync dist → docs/mission-console
        run: |
          rm -rf docs/mission-console
          mkdir -p docs/mission-console
          cp -r apps/mission-console/dist/* docs/mission-console/
          # Verify expected entrypoints present.
          test -f docs/mission-console/index.html || (echo "ERROR: index.html missing"; exit 1)

      - name: Commit + push if changed
        run: |
          if [ -n "$(git status --porcelain docs/mission-console/)" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add docs/mission-console/
            git commit -m "chore(mission-console): auto-build dist from apps/mission-console source

            Triggered by push to apps/mission-console/** OR workflow_dispatch.
            Vite build output synced docs/mission-console/ (GitHub Pages publish path).

            🤖 Generated by .github/workflows/mission-console-build.yml"
            git push
          else
            echo "No changes to docs/mission-console/ — skip commit."
          fi
