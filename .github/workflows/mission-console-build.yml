name: Mission Console Build

# 2026-05-10 TKT-BOND-HUD Phase C (verdict #A3 = A master-dd grant + ship).
# 2026-05-10 P0 latent caught smoke dispatch run 25627227469 — branch protection
# main GH006 rejected direct push da github-actions[bot] (6/6 status check
# expected). Refactor V1 Option A (PR-based auto-deploy) preserva docs/
# Pages root + branch protection rule + adds auto-merge L3 candidate label.
#
# Auto-build apps/mission-console/ Vue 3 source + open PR a main con dist
# update di docs/mission-console/ (GitHub Pages publish path), label
# `auto-merge-l3-candidate` per cascade auto-merge L3 (vedi ADR-2026-05-07
# auto-merge authorization L3).
#
# Trigger:
#   - push main su apps/mission-console/** path (esclude PR generato workflow)
#   - workflow_dispatch (manual)
#
# Replaces master-dd manual build pattern (npm run build + cp -r dist/* docs/mission-console/)
# documentato in ADR-2026-05-10-mission-console-recovery.md Phase C.
#
# Cross-ref:
#   - apps/mission-console/vite.config.ts
#   - docs/mission-console/ (GitHub Pages source, branch=main path=/)
#   - PR #2169 source restore
#   - ADR-2026-05-07 auto-merge L3 cascade

on:
  push:
    branches: [main]
    paths:
      - 'apps/mission-console/**'
      - 'package-lock.json'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Concurrency group: cancellable se push consecutivi su apps/mission-console/**.
# Evita PR duplicate stacked.
concurrency:
  group: mission-console-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Codex P1 fix 2026-05-10: GITHUB_TOKEN-created PR non triggera
          # `pull_request` CI (GitHub recursion guard). Auto-PR resterebbe
          # senza required checks → branch protection blocca → Option A
          # PR-based auto-deploy defeats. Use AUTODEPLOY_PAT (fine-grained
          # PAT con `contents: write` + `pull-requests: write` + `actions: write`)
          # se configurato, fallback a GITHUB_TOKEN + dispatch CI esplicito.
          # Master-dd setup PAT: Settings → Secrets → AUTODEPLOY_PAT.
          token: ${{ secrets.AUTODEPLOY_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspace apps/mission-console

      - name: Build Mission Console
        working-directory: apps/mission-console
        run: npm run build

      - name: Sync dist → docs/mission-console
        run: |
          rm -rf docs/mission-console
          mkdir -p docs/mission-console
          cp -r apps/mission-console/dist/* docs/mission-console/
          # Verify expected entrypoints present.
          test -f docs/mission-console/index.html || (echo "ERROR: index.html missing"; exit 1)

      - name: Open auto-deploy PR if changed
        env:
          # PAT preferito per triggerare CI `pull_request` event sulla PR.
          # Fallback GITHUB_TOKEN se PAT non setup — in quel caso CI viene
          # esplicitamente dispatched via `gh workflow run` step successivo.
          GITHUB_TOKEN: ${{ secrets.AUTODEPLOY_PAT || secrets.GITHUB_TOKEN }}
          # Codex P3 fix 2026-05-10: marker promosso a step OUTPUT (non env)
          # per visibility cross-step. Step env scope = step only.
          AUTODEPLOY_PAT_PRESENT: ${{ secrets.AUTODEPLOY_PAT != '' }}
        id: open_pr
        run: |
          # Persist PAT-presence marker via step output (env scope insufficient).
          if [ "$AUTODEPLOY_PAT_PRESENT" = "true" ]; then
            echo "autodeploy_pat_active=true" >> $GITHUB_OUTPUT
          else
            echo "autodeploy_pat_active=false" >> $GITHUB_OUTPUT
          fi

          if [ -z "$(git status --porcelain docs/mission-console/)" ]; then
            echo "No changes to docs/mission-console/ — skip PR creation."
            echo "pr_created=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          DATE_TAG=$(date -u +%Y-%m-%d-%H%M)
          BRANCH="auto/mission-console-dist-${DATE_TAG}"
          COMMIT_MSG="chore(mission-console): auto-build dist from apps/mission-console source

          Triggered by push to apps/mission-console/** OR workflow_dispatch.
          Vite build output synced docs/mission-console/ (GitHub Pages publish path).

          🤖 Generated by .github/workflows/mission-console-build.yml"

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add docs/mission-console/
          git commit -m "$COMMIT_MSG"
          git push -u origin "$BRANCH"

          PR_BODY=$(cat <<'EOF'
          ## Summary

          Auto-build dist Vue 3 da apps/mission-console/ source. GitHub Pages publish path docs/mission-console/ aggiornato.

          ## Trigger

          Generato da `.github/workflows/mission-console-build.yml` su push apps/mission-console/** o workflow_dispatch.

          ## Auto-merge L3 candidate

          Etichettato `auto-merge-l3-candidate` per cascade auto-merge L3 (ADR-2026-05-07). Safety gate verification:

          1. CI 100% verde (zero fail/pending; skip OK)
          2. Codex review resolved (no outstanding requested_changes su latest commit)
          3. Format + governance verde (Prettier + docs-governance)
          4. Test baseline preserved (AI ≥382/382)
          5. ZERO file in forbidden paths (.github/workflows/, migrations/, packages/contracts/, services/generation/, services/rules/)
          6. No regola 50 righe violation fuori apps/backend/
          7. No nuove dipendenze npm/pip

          ## Rollback

          `git revert <commit_sha>` su main ripristina dist precedente.
          EOF
          )

          # Codex P2 fix 2026-05-10: ensure auto-merge L3 candidate label
          # exists in repo (create-if-missing idempotent) prima di add a PR.
          # Originale `gh pr create --label auto-merge-l3-candidate` failed
          # con "label not found" su test PR #2184 → label droppata. Senza
          # label, generated dist PR non riconosciuti da L3 cascade
          # (ADR-2026-05-07).
          gh label create auto-merge-l3-candidate \
            --description "PR candidata auto-merge L3 cascade (ADR-2026-05-07 7-gate)" \
            --color FBCA04 \
            --force 2>/dev/null || echo "Label auto-merge-l3-candidate already exists or create skipped."

          gh pr create \
            --title "chore(mission-console): auto-build dist ${DATE_TAG}" \
            --body "$PR_BODY" \
            --label "auto-merge-l3-candidate" \
            --label "automation" \
            --base main \
            --head "$BRANCH"

          PR_NUMBER=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          echo "pr_created=true" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      # Codex P1 fix 2026-05-10: se GITHUB_TOKEN fallback path attivo (PAT
      # non setup), CI `pull_request` event NON fired (recursion guard).
      # Dispatch esplicito CI workflow via workflow_dispatch su branch
      # auto-PR per popolare required status checks. Skip se PAT attivo
      # (CI fired natural via PR open).
      - name: Force CI dispatch if no PAT (recursion guard fallback)
        # Codex P3 fix 2026-05-10: condizione legge step OUTPUT (cross-step
        # visible) invece di step ENV (step-scope only). Senza fix, condition
        # vedeva sempre empty value → duplicate dispatch su PAT-created PR.
        if: steps.open_pr.outputs.pr_created == 'true' && steps.open_pr.outputs.autodeploy_pat_active != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.open_pr.outputs.branch }}
        run: |
          echo "PAT not configured. Dispatching required CI workflows via workflow_dispatch."
          echo "Branch: $BRANCH"
          # Dispatch workflows che hanno workflow_dispatch trigger + paths-filter rilevante.
          # Nota: workflow_dispatch run NON appare come `pull_request` status check sul PR.
          # Master-dd review gate: branch protection rule potrebbe bloccare merge se
          # checks expected richiedono `pull_request` event esattamente. In tal caso
          # configurare AUTODEPLOY_PAT secret per unblock cascade.
          for WF in ci.yml docs-governance.yml; do
            if gh workflow view "$WF" --repo "${{ github.repository }}" >/dev/null 2>&1; then
              echo "Dispatching $WF on $BRANCH"
              gh workflow run "$WF" --ref "$BRANCH" --repo "${{ github.repository }}" || \
                echo "::warning::Failed to dispatch $WF — manual trigger may be required"
            fi
          done

          echo "::notice::Auto-PR #${{ steps.open_pr.outputs.pr_number }} created via GITHUB_TOKEN fallback. Required CI checks dispatched explicitly. Merge may require AUTODEPLOY_PAT secret setup if branch protection rule expects native pull_request event checks."
