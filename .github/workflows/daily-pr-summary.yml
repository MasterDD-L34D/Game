name: Daily PR Summary

on:
  schedule:
    - cron: '10 17 * * *'
  workflow_dispatch:

env:
  # Opt-in Node.js 24 runtime per actions JavaScript (checkout, setup-node,
  # setup-python, upload-artifact, ecc.). Evita deprecation warning Node 20
  # (rimosso 2026-09-16). Vedi https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r tools/py/requirements.txt

      - name: Generate daily PR summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python tools/py/daily_pr_report.py \
            --repo "${{ github.repository }}" \
            --date "$(date -u -d 'yesterday' +%Y-%m-%d)"

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/planning/changelog.md docs/planning/roadmap_operativa.md docs/process/action-items.md docs/frontend/feature-updates.md docs/generated/pr-summaries/
          git commit -m "chore: aggiorna riepilogo PR giornaliero"
          git push
