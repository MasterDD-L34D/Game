name: CI

on:
  push:
  pull_request:
  # Codex P2 fix 2026-05-10 (PR #2184): workflow_dispatch enable per
  # mission-console-build.yml fallback path (GITHUB_TOKEN-created auto-PR
  # senza recursion guard bypass). Dispatch consente force-fire CI checks
  # su branch auto/mission-console-dist-* quando PAT non configurato.
  workflow_dispatch:

env:
  # Opt-in Node.js 24 runtime per actions JavaScript (checkout, setup-node,
  # setup-python, upload-artifact, ecc.). Evita deprecation warning Node 20
  # (rimosso 2026-09-16). Vedi https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  paths-filter:
    runs-on: ubuntu-latest
    outputs:
      ts: ${{ steps.filter.outputs.ts }}
      cli: ${{ steps.filter.outputs.cli }}
      python: ${{ steps.filter.outputs.python }}
      data: ${{ steps.filter.outputs.data }}
      deploy: ${{ steps.filter.outputs.deploy }}
      styleguide: ${{ steps.filter.outputs.styleguide }}
      stack: ${{ steps.filter.outputs.stack }}
      site_audit: ${{ steps.filter.outputs.site_audit }}
      i18n: ${{ steps.filter.outputs.i18n }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: filter
        name: Detect impacted areas
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ts:
              - 'package.json'
              - 'package-lock.json'
              - 'tools/ts/**'
            cli:
              - 'scripts/cli_smoke.sh'
              - 'tools/py/game_cli.py'
              - 'tools/py/game_cli/**'
            python:
              - 'scripts/**/*.py'
              - 'server/**/*.py'
              - 'services/**/*.py'
              - 'tests/**/*.py'
              - 'tools/py/**'
              # OD-038 — the playtest#2 analyzer regression guard
              # (python-tests job) exercises tools/sim/telemetry-bridge.js
              # round-trip. Bridge edits MUST re-run that guard, otherwise
              # the biome_focus / schema-contract assertions are skipped.
              - 'tools/sim/**'
            data:
              - 'data/**'
              - 'packs/**'
              - 'reports/**'
              - 'config/schemas/**'
            deploy:
              - 'scripts/trait_audit.py'
              - 'scripts/run_deploy_checks.sh'
              - 'tools/py/report_trait_coverage.py'
              - 'config/deploy/**'
            styleguide:
              - 'tools/py/styleguide_compliance_report.py'
              - 'tools/py/styleguide_utils.py'
              - 'logs/qa/latest-dashboard-metrics.json'
              - 'reports/styleguide_compliance.*'
              - 'scripts/cron/traits_monthly_maintenance.sh'
              - '.github/workflows/traits-monthly-maintenance.yml'
            stack:
              - 'package.json'
              - 'package-lock.json'
              - 'Makefile'
              - 'scripts/dev-stack.sh'
              - 'scripts/lint-stack.mjs'
              - 'apps/backend/**'
              - 'services/**/*.js'
              - 'tests/**/*.js'
              - 'apps/trait-editor/**'
              # 2026-05-11 — paths-filter blind spot fix post-PR #2223.
              # YAML data files consumed by backend AJV schema validation
              # (npm run test:api). Pack-only / data-only edits previously
              # skipped stack-quality, allowing schema regressions to slip
              # (e.g. on_hit_status.status_id enum violation in #2223).
              - 'data/core/**/*.yaml'
              - 'packs/**/*.yaml'
              - 'packages/contracts/schemas/**'
              # OD-038 — sim bridge JS must hit stack-quality (Prettier).
              - 'tools/sim/**'
            site_audit:
              - 'ops/site-audit/**'
              - 'Makefile'
            i18n:
              - 'data/i18n/**'
              - 'tools/py/validate_i18n_parity.py'
              - 'tests/i18n/**'

  playwright-bundle:
    runs-on: ubuntu-latest
    needs: paths-filter
    if: needs.paths-filter.outputs.deploy == 'true'
    outputs:
      sha256: ${{ steps.chromium_meta.outputs.sha256 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/ts/package-lock.json

      - name: Install TypeScript tool dependencies
        working-directory: tools/ts
        run: npm ci --no-audit --no-fund

      - name: Prepare Chromium cache
        working-directory: tools/ts
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/playwright-browsers
        run: node ./scripts/prepare_playwright.mjs

      - name: Archive Chromium bundle
        id: chromium_meta
        env:
          PLAYWRIGHT_BUNDLE_DIR: ${{ runner.temp }}/playwright-browsers
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          BUNDLE_DIR="$PLAYWRIGHT_BUNDLE_DIR"
          if [ ! -d "$BUNDLE_DIR" ]; then
            echo "Chromium bundle non disponibile in $BUNDLE_DIR" >&2
            exit 1
          fi
          if ! ls "$BUNDLE_DIR"/chromium-* >/dev/null 2>&1; then
            echo "Bundle Chromium assente nella cache Playwright" >&2
            exit 1
          fi
          tar -czf "$RUNNER_TEMP/chromium-bundle.tar.gz" -C "$BUNDLE_DIR" .
          SHA=$(sha256sum "$RUNNER_TEMP/chromium-bundle.tar.gz" | cut -d ' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "archive=$RUNNER_TEMP/chromium-bundle.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload Chromium bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-chromium-bundle
          path: ${{ steps.chromium_meta.outputs.archive }}
          retention-days: 5

  generator-dashboard-validation:
    runs-on: ubuntu-latest
    needs:
      - paths-filter
      - playwright-bundle
    if: needs.paths-filter.outputs.deploy == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate generator dashboard
        run: |
          python tests/validate_dashboard.py --metrics-output logs/qa/dashboard_ci_metrics.json --no-log

      - name: Upload dashboard metrics
        uses: actions/upload-artifact@v4
        with:
          name: generator-dashboard-metrics
          path: logs/qa/dashboard_ci_metrics.json
          if-no-files-found: error

  typescript-tests:
    runs-on: ubuntu-latest
    needs: paths-filter
    if: needs.paths-filter.outputs.ts == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node.js dependencies
        run: npm ci --workspace tools/ts --include-workspace-root false

      - name: Run TypeScript tests
        working-directory: tools/ts
        run: npm test

      - name: Validate Species (TS)
        working-directory: tools/ts
        run: node dist/validate_species.js ../../data/core/species.yaml

  # dashboard-quality job rimosso — apps/dashboard cancellato in #1343
  # (SPRINT_001 fase 2). Il workspace non esiste piu' nel repo.

  stack-quality:
    runs-on: ubuntu-latest
    needs: paths-filter
    if: needs.paths-filter.outputs.stack == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Lint stack
        run: npm run lint:stack

      - name: Run backend API tests
        run: npm run test:api

      - name: Install Trait Editor dependencies
        working-directory: apps/trait-editor
        run: npm ci --no-audit --no-fund

      - name: Run Trait Editor unit tests
        working-directory: apps/trait-editor
        run: npm run test

      - name: Build Trait Editor
        working-directory: apps/trait-editor
        run: npm run build

  cli-checks:
    runs-on: ubuntu-latest
    needs:
      - paths-filter
    if: needs.paths-filter.outputs.cli == 'true' || needs.paths-filter.outputs.data == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/ts/package-lock.json

      - name: Install Node.js dependencies
        working-directory: tools/ts
        run: npm ci

      - name: Build TypeScript artifacts
        working-directory: tools/ts
        run: npm run build --silent

      - name: Run TypeScript CLI
        working-directory: tools/ts
        run: node dist/roll_pack.js ENTP invoker ../../data/packs.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: tools/py
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements.txt

      - name: Validate base datasets (CLI)
        working-directory: tools/py
        run: python3 game_cli.py validate-datasets

      - name: Validate Evo-Tactics ecosystem pack
        run: python3 tools/py/game_cli.py validate-ecosystem-pack --json-out /tmp/evo_pack_report.json

      - name: Run CLI smoke profiles
        run: ./scripts/cli_smoke.sh

  python-tests:
    runs-on: ubuntu-latest
    needs:
      - paths-filter
    if: needs.paths-filter.outputs.python == 'true' || needs.paths-filter.outputs.data == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: tools/py
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements.txt

      - name: Run pytest
        run: pytest

      - name: Validate Species (Python)
        working-directory: tools/py
        run: |
          python3 validate_species.py ../../data/core/species.yaml

      - name: Run Python validation script
        working-directory: tools/py
        run: python roll_pack.py ENTP invoker ../../data/packs.yaml

      # Envelope A A6 — playtest #2 analyzer regression guard.
      # 1. Analyzer must still parse the canonical synthetic fixture + exit 0
      #    (locks the schema contract the telemetry-bridge targets).
      # 2. telemetry-bridge round-trips a hand-made batch into a telemetry
      #    JSONL the analyzer accepts + emits a report with all sections.
      - name: Playtest #2 analyzer regression guard
        run: |
          set -euo pipefail
          # (1) synthetic fixture still parses, markdown + json-out, exit 0
          python tools/py/playtest_2_analyzer.py \
            --telemetry tests/fixtures/playtest-2-synthetic-telemetry.jsonl \
            --output /tmp/pt2-fixture-report.md \
            --json-out /tmp/pt2-fixture-metrics.json \
            --min-sample 30
          grep -q '## 1. Executive summary' /tmp/pt2-fixture-report.md
          grep -q '## 8. Verdict + next action' /tmp/pt2-fixture-report.md
          python -c "import json; json.load(open('/tmp/pt2-fixture-metrics.json'))"
          # (2) telemetry-bridge round-trip on a hand-made batch dir
          mkdir -p /tmp/pt2-batch/runs
          cat > /tmp/pt2-batch/runs/run-1-guard.jsonl <<'JSONL'
          {"ts":1,"kind":"config","run_label":"ci_guard_1","run_seed":42}
          {"ts":2,"kind":"player_action","round":1,"actor":"pg1","action":"attack","status":200,"command_latency_ms":50}
          {"ts":3,"kind":"vc_capture","ok":true,"per_actor":{"pg1":{"mbti_type":"ENTJ","ennea_archetypes":[{"id":"Conquistatore(3)","triggered":true}],"conviction_axis":{"utility":60,"liberty":50,"morality":50},"sentience":{"tier":"T2"}}}}
          {"ts":4,"kind":"combat_outcome","outcome":"victory","rounds":3}
          {"ts":5,"kind":"final_phase","phase":"ended"}
          not-json-malformed-line
          JSONL
          # SKIP_GODOT_BIOME_FOCUS=1 keeps this round-trip hermetic (no
          # cross-repo network dependency on the Godot artifact, which may
          # not yet exist on Game-Godot-v2 main when this PR's CI runs).
          SKIP_GODOT_BIOME_FOCUS=1 node tools/sim/telemetry-bridge.js --in /tmp/pt2-batch
          test -s /tmp/pt2-batch/playtest-2-telemetry.jsonl
          python tools/py/playtest_2_analyzer.py \
            --telemetry /tmp/pt2-batch/playtest-2-telemetry.jsonl \
            --output /tmp/pt2-bridge-report.md \
            --min-sample 30
          grep -q '## 3. P4 Temperamenti' /tmp/pt2-bridge-report.md
          # (3) OD-026/OD-038 — Godot biome_focus_changed merge path. Serve
          # a local fixture over http (fetch has no file:// support) and
          # assert od026_atlas.biome_focus_events becomes NON-EMPTY with
          # REAL biome ids + malformed lines skipped. Locks 7-of-7 close.
          FIX=/tmp/biome-focus.jsonl
          cat > "$FIX" <<'JSONL'
          {"session_id":"godot-atlas-biome-focus","event_type":"biome_focus_changed","actor_id":"godot-client","biome_id":"caverna","surface":"tv"}
          {"session_id":"godot-atlas-biome-focus","event_type":"biome_focus_changed","actor_id":"godot-client","biome_id":"foresta_temperata","surface":"phone"}
          bad-line-must-be-skipped
          JSONL
          ( cd /tmp && python3 -m http.server 8765 >/tmp/httpd.log 2>&1 & echo $! > /tmp/httpd.pid )
          for i in $(seq 1 20); do curl -fsS http://127.0.0.1:8765/biome-focus.jsonl >/dev/null 2>&1 && break; sleep 0.5; done
          GODOT_BIOME_FOCUS_URL=http://127.0.0.1:8765/biome-focus.jsonl \
            node tools/sim/telemetry-bridge.js --in /tmp/pt2-batch --out /tmp/pt2-bf.jsonl
          kill "$(cat /tmp/httpd.pid)" 2>/dev/null || true
          python tools/py/playtest_2_analyzer.py \
            --telemetry /tmp/pt2-bf.jsonl \
            --output /tmp/pt2-bf-report.md \
            --json-out /tmp/pt2-bf-metrics.json \
            --min-sample 30
          python3 - <<'PY'
          import json
          m = json.load(open('/tmp/pt2-bf-metrics.json'))
          bf = m['od026_atlas']['biome_focus_events']
          assert bf.get('caverna') == 1 and bf.get('foresta_temperata') == 1, bf
          print('OD-026 biome_focus_events real & non-empty:', bf)
          PY
          echo "Playtest #2 analyzer regression guard: PASS"

  dataset-checks:
    runs-on: ubuntu-latest
    needs:
      - paths-filter
    if: needs.paths-filter.outputs.data == 'true' || needs.paths-filter.outputs.deploy == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node.js dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: tools/py
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements.txt

      - name: Validate YAML datasets
        run: python3 tools/py/validate_datasets.py

      - name: Audit trait catalog consistency
        run: python3 scripts/trait_audit.py --check

      - name: Validate trait templates
        run: python3 tools/py/trait_template_validator.py --summary

      - name: Build trait index
        run: node scripts/build_trait_index.js

      - name: Regenerate trait baseline
        run: |
          python3 tools/py/build_trait_baseline.py \
            packs/evo_tactics_pack/docs/catalog/env_traits.json \
            packs/evo_tactics_pack/docs/catalog/trait_reference.json \
            --trait-glossary data/core/traits/glossary.json \
            --out data/derived/analysis/trait_baseline.yaml

      - name: Regenerate trait coverage reports
        run: |
          python3 tools/py/report_trait_coverage.py \
            --env-traits packs/evo_tactics_pack/docs/catalog/env_traits.json \
            --trait-reference packs/evo_tactics_pack/docs/catalog/trait_reference.json \
            --species-root packs/evo_tactics_pack/data/species \
            --trait-glossary data/core/traits/glossary.json \
            --out-json data/derived/analysis/trait_coverage_report.json \
            --out-csv data/derived/analysis/trait_coverage_matrix.csv
          python3 - <<'PY'
          import json, sys

          with open('data/derived/analysis/trait_coverage_report.json', encoding='utf-8') as handle:
              summary = json.load(handle).get('summary', {})

          min_traits = 27
          max_missing = 0

          traits_with_species = summary.get('traits_with_species')
          rules_missing = summary.get('rules_missing_species_total')

          errors: list[str] = []
          if traits_with_species is None or traits_with_species < min_traits:
              errors.append(f"traits_with_species={traits_with_species!r} sotto la soglia {min_traits}")
          if rules_missing is None or rules_missing > max_missing:
              errors.append(f"rules_missing_species_total={rules_missing!r} eccede il massimo consentito {max_missing}")

          if errors:
              print("\n".join(errors))
              sys.exit(1)
          PY

      - name: Generate trait completion dashboard
        run: |
          python3 tools/py/trait_completion_dashboard.py \
            --trait-reference data/traits/index.json \
            --out-markdown reports/trait_progress.md \
            --history-file logs/trait_audit/trait_progress_history.json

      - name: Run trait style guide check
        run: |
          mkdir -p reports/trait_style
          node scripts/trait_style_check.js \
            --output-json reports/trait_style/ci_trait_style_report.json \
            --output-markdown reports/trait_style/ci_trait_style_report.md \
            --fail-on error

      - name: Refresh release status report
        run: node tools/deploy/generateStatusReport.js --status reports/status.json

      # M5 audit P0 fix CI guard (data path-filter job).
      # Cattura pack-only edits che skippano stack-quality path filter.
      - name: Verify tutorial species YAML existence
        run: node --test tests/scripts/tutorialSpeciesExistence.test.js

      - name: Verify species-index integrity
        run: node --test tests/scripts/speciesIndexIntegrity.test.js

      - name: Verify species trait references have glossary entries
        run: node --test tests/scripts/speciesTraitReferences.test.js

      - name: Upload trait style guide report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trait-style-report-${{ github.run_id }}
          path: |
            reports/trait_style/ci_trait_style_report.json
            reports/trait_style/ci_trait_style_report.md
          if-no-files-found: warn

  i18n-parity:
    runs-on: ubuntu-latest
    needs:
      - paths-filter
    if: needs.paths-filter.outputs.i18n == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify i18n bundles exist
        id: check_bundles
        run: |
          if [ ! -d data/i18n ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "data/i18n/ not present, skipping parity validation" >&2
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run i18n parity validator
        if: steps.check_bundles.outputs.exists == 'true'
        run: python tools/py/validate_i18n_parity.py --root data/i18n

      - name: Set up Node.js
        if: steps.check_bundles.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run i18n parity Node test wrapper
        if: steps.check_bundles.outputs.exists == 'true'
        run: node --test tests/i18n/parity.test.js

  site-audit:
    runs-on: ubuntu-latest
    needs:
      - paths-filter
    if: >-
      needs.paths-filter.outputs.site_audit == 'true' ||
      needs.paths-filter.outputs.deploy == 'true' ||
      needs.paths-filter.outputs.stack == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve site audit options
        run: |
          if [ -n "${{ vars.SITE_BASE_URL }}" ]; then
            echo "SITE_BASE_URL=${{ vars.SITE_BASE_URL }}" >> "$GITHUB_ENV"
          elif [ -n "${{ secrets.SITE_BASE_URL }}" ]; then
            echo "SITE_BASE_URL=${{ secrets.SITE_BASE_URL }}" >> "$GITHUB_ENV"
          else
            echo "SITE_BASE_URL=" >> "$GITHUB_ENV"
          fi

          max_pages="${{ vars.SITE_AUDIT_MAX_PAGES }}"
          if [ -z "$max_pages" ]; then
            max_pages=2000
          fi
          echo "SITE_AUDIT_MAX_PAGES=$max_pages" >> "$GITHUB_ENV"

          timeout="${{ vars.SITE_AUDIT_TIMEOUT }}"
          if [ -z "$timeout" ]; then
            timeout=10
          fi
          echo "SITE_AUDIT_TIMEOUT=$timeout" >> "$GITHUB_ENV"

          concurrency="${{ vars.SITE_AUDIT_CONCURRENCY }}"
          if [ -z "$concurrency" ]; then
            concurrency=10
          fi
          echo "SITE_AUDIT_CONCURRENCY=$concurrency" >> "$GITHUB_ENV"

      - name: Install site audit dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement ops/site-audit/requirements.txt

      - name: Run site audit checks
        run: |
          python ops/site-audit/run_suite.py \
            --repo-root "${GITHUB_WORKSPACE}" \
            --base-url "$SITE_BASE_URL" \
            --max-pages "$SITE_AUDIT_MAX_PAGES" \
            --timeout "$SITE_AUDIT_TIMEOUT" \
            --concurrency "$SITE_AUDIT_CONCURRENCY"

      - name: Upload site audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-audit
          path: ops/site-audit/_out
          if-no-files-found: warn

  lighthouse-ci:
    runs-on: ubuntu-latest
    needs:
      - paths-filter
    if: >-
      needs.paths-filter.outputs.ts == 'true' ||
      needs.paths-filter.outputs.deploy == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Lighthouse CI
        run: npm i -g @lhci/cli@0.13.x

      - name: Resolve SITE_BASE_URL
        run: |
          if [ -n "${{ vars.SITE_BASE_URL }}" ]; then
            echo "SITE_BASE_URL=${{ vars.SITE_BASE_URL }}" >> $GITHUB_ENV
          elif [ -n "${{ secrets.SITE_BASE_URL }}" ]; then
            echo "SITE_BASE_URL=${{ secrets.SITE_BASE_URL }}" >> $GITHUB_ENV
          else
            echo "SITE_BASE_URL=" >> $GITHUB_ENV
          fi

      - name: Run Lighthouse CI (remote)
        run: |
          if [ -z "$SITE_BASE_URL" ]; then
            echo "SITE_BASE_URL not configured; skipping Lighthouse audit." >&2
            exit 0
          fi
          lhci autorun --config=./lighthouserc.json

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: ./.lighthouseci
          if-no-files-found: warn

  styleguide-compliance:
    runs-on: ubuntu-latest
    needs:
      - paths-filter
    if: >-
      needs.paths-filter.outputs.styleguide == 'true'
      || needs.paths-filter.outputs.data == 'true'
      || needs.paths-filter.outputs.python == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Generate styleguide compliance report
        run: python tools/py/styleguide_compliance_report.py --strict

      - name: Upload styleguide artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: styleguide-compliance-${{ github.run_id }}
          path: |
            reports/styleguide_compliance.json
            reports/styleguide_compliance.md
            logs/trait_audit/styleguide_compliance_history.json
          if-no-files-found: warn

  deployment-checks:
    runs-on: ubuntu-latest
    needs:
      - paths-filter
      - playwright-bundle
    if: needs.paths-filter.outputs.deploy == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/ts/package-lock.json

      - name: Install Node.js dependencies
        working-directory: tools/ts
        run: npm ci

      - name: Build TypeScript artifacts
        working-directory: tools/ts
        run: npm run build --silent

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: tools/py
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements.txt

      - name: Download Chromium bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-chromium-bundle
          path: ${{ runner.temp }}/playwright-bundle

      - name: Run deploy validation checks
        env:
          DEPLOY_DATA_DIR: ${{ github.workspace }}/data
          CI: 'true'
          PLAYWRIGHT_REUSE_SERVER: '0'
          DEPLOY_SKIP_SMOKE_TEST: '1'
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/playwright-browsers
          DEPLOY_CHROMIUM_BUNDLE_ARCHIVE: ${{ runner.temp }}/playwright-bundle/chromium-bundle.tar.gz
          DEPLOY_CHROMIUM_BUNDLE_SHA256: ${{ needs.playwright-bundle.outputs.sha256 }}
        run: scripts/run_deploy_checks.sh
