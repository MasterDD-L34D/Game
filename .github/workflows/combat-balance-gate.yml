name: Combat Balance Gate

# Per-PR canonical balance-oracle gate (the missing guardrail behind #2719).
#
# WHY: docs/process/CANONICAL-AI-PLAYTEST.md sec 5 declares the merge gate as
# "touched-scenario WR in-band @ N=40", but it was never wired per-PR -- only
# the weekly playtest-2 sweep existed. So PR #2719 (a CORRECT channel-routing
# fix) silently pushed canonical oracle hardcore_06 from 17% to 53% WR and sat
# undetected for days (caught later by a forensic N=100 sweep + git-bisect).
# With the reconstruction suite (SPEC A..Q) shipping combat changes ~daily,
# this WILL recur. This gate re-runs the canonical oracles on combat-touching
# PRs and surfaces any band drift before merge.
#
# Determinism: the canonical runner pins seed 424242 and splits it across
# --shards 4 (per-shard seed offsets). CI MUST use the SAME shards count + seed
# as ratification, else the sampled runs differ. Do not change --shards here
# without re-ratifying the bands. host 127.0.0.1 + LOBBY_WS_ENABLED=false +
# DAMAGE_CURVES_PATH are all handled inside playtest_canonical.py.
#
# PHASE 2 (current, 2026-06-14): blocking. The verdict step emits ::error:: +
# `exit 1` when an oracle is OOB, failing the job. Both oracles are in-band on
# main (hc06 22% / hc07 42% @ N=100, PR #2753 + #2760) so it passes on baseline.
# PHASE 1 was warn-only (`continue-on-error`) until hc07 was re-centered.
# FINAL STEP to make it actually block merge: register `combat-oracle` as a
# required status check in branch protection (owner-gated, set once). Until then
# the gate shows a hard red X on OOB but does not technically block.
# Rollback to warn-only: re-add `continue-on-error: true` on the job.
#
# Band-invalidation protocol (correct-fix shifts a band): see
# docs/process/CANONICAL-AI-PLAYTEST.md sec 9 -- block + human re-ratify, never
# auto-update target_band.

on:
  pull_request:
    paths:
      - 'apps/backend/services/combat/**'
      - 'apps/backend/routes/session*.js'
      - 'apps/backend/services/ai/**'
      - 'apps/backend/services/hardcoreScenario.js'
      - 'apps/backend/services/tutorialScenario.js'
      - 'data/core/balance/**'
      - 'data/core/traits/active_effects.yaml'
      - 'packs/evo_tactics_pack/data/balance/**'
      - 'tools/py/batch_calibrate_hardcore*.py'
      - 'tools/py/calibrate_parallel.py'
      - 'tools/py/playtest_canonical.py'
      - 'docs/playtest/canonical-suite.yaml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  combat-oracle:
    # Oracle MUST run on the dev/prod OS (Windows). The combat RNG is NOT cross-OS
    # deterministic: on Linux/ubuntu hc06 reads 12.5% vs 22% on Windows (the steep
    # boss_hp lever amplifies a small RNG/float OS delta). Evo-Tactics dev + prod are
    # Windows-only -> gate on Windows or it validates the wrong reality. See
    # CANONICAL-AI-PLAYTEST.md sec 3 (repro contract).
    runs-on: windows-latest
    permissions:
      contents: read
    timeout-minutes: 30
    defaults:
      run:
        shell: bash # run: steps use bash syntax -> Git Bash on the Windows runner
    # PHASE 2 (2026-06-14): blocking. The job fails when an oracle is OOB. Both
    # oracles are in-band on main (hc06 22% / hc07 42% @ N=100), so this passes on
    # the current baseline; it fails only when a future combat change shifts a band
    # -> follow the band-invalidation protocol (CANONICAL-AI-PLAYTEST.md sec 9).
    # To actually block merge, `combat-oracle` must also be a required status check
    # in branch protection (owner-gated, set once).
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-pyyaml

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Run canonical balance oracles (N=40, seed 424242, shards 4)
        id: oracle
        continue-on-error: true
        env:
          LOBBY_WS_ENABLED: 'false'
          ORCHESTRATOR_AUTOCLOSE_MS: '2000'
        run: |
          mkdir -p _oracle
          set +e
          python tools/py/playtest_canonical.py \
            --n 40 --shards 4 --base-port 3360 \
            --label ci-${{ github.run_id }} \
            --out-dir _oracle
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Write step summary
        if: always()
        run: |
          echo "## Combat balance oracle (N=40, seed 424242)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat _oracle/ci-${{ github.run_id }}-canonical-suite.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null \
            || echo "(no report produced -- the oracle run failed before writing; see job log)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload oracle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combat-oracle-${{ github.run_id }}
          path: _oracle/
          retention-days: 14

      - name: Verdict (phase 2 = blocking)
        if: always()
        run: |
          if [ "${{ steps.oracle.outputs.exit_code }}" != "0" ]; then
            echo "::error title=Combat balance oracle out-of-band::A canonical oracle WR left its ratified band (see step summary). If this PR is a correct combat fix, follow the band re-ratify protocol: docs/process/CANONICAL-AI-PLAYTEST.md sec 9, then re-run. PHASE 2 = blocking."
            exit 1
          fi
          echo "All canonical oracles in-band."
