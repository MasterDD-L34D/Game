# Species Resistance Matrix — Evo-Tactics
# Pattern W2 (wesnoth damage type / resistance matrix).
# Resistenze base per-specie, indipendenti dai trait.
# Il resolver somma queste + trait resistances nel calcolo danno.
#
# modifier_pct: 100 = neutro, >100 = vulnerabile, <100 = resistente
# Es. 80 = 20% resistenza, 120 = 20% vulnerabilita
#
# Canali canonici: elettrico, psionico, fisico, fuoco, gravita, mentale,
# taglio, ionico, earth, wind, dark
# Vedi docs/planning/tactical-architecture-patterns.md §W2
# Sprint 6 (2026-04-27): aggiunti earth/wind/dark — parity 11 channel vs
# AncientBeast Material/Element classes. Vedi docs/balance/2026-04-27-numeric-reference-canonical.md §10.
#
# 2026-05-20 balance-auditor P3 polish — `gravita` channel: definito qui in
# tutti 5 archetype (neutral 100) MA zero damage trait usa `channel: gravita`
# in trait_mechanics.yaml. Channel **reserved per future damage trait** (intent
# design: gravita = anti-ranged/anti-flying meccanica futura). Mantenuto attivo
# nello schema per evitare migration cost quando primo trait gravita arriva.
# Master-dd verdict needed se intent cambia → rimuovere channel da schema.

version: "0.2.0"

# Matrice resistenze base per archetipo specie.
# Le specie nel dataset riferiscono un archetipo qui definito.
species_archetypes:
  corazzato:
    label: "Corazzato"
    description: "Alta resistenza fisico/taglio/earth, vulnerabile a psionico/mentale/elettrico."
    resistances:
      fisico: 80
      taglio: 80
      fuoco: 100
      # balance-audit 2026-05-22: elettrico was a dead offensive channel (no archetype vulnerable). Armor conducts -> corazzato vuln 100->120. RATIFIED #2381 (tune) + #2389 (N=40 EV-parity); OD-058 D4 downscope-A = dead-channel CLOSED. SoT canon: docs/core/00-SOURCE-OF-TRUTH.md §13.9.1.
      elettrico: 120
      psionico: 120
      mentale: 120
      gravita: 100
      ionico: 100
      earth: 70
      wind: 80
      dark: 100

  bioelettrico:
    label: "Bioelettrico"
    description: "Resistente a elettrico/ionico/wind, vulnerabile a fisico/earth."
    resistances:
      fisico: 120
      taglio: 100
      fuoco: 100
      # TKT-D4-ENRICH #2533 (2026-06-10): retune 70->80 post-vuln matrix. Con le
      # prime fonti di danno `elettrico` live (elettromagnete_biologico +
      # seta_conduttiva_elettrica) il -30% over-shieldava il canale appena
      # aperto; 80 allinea alla famiglia elettrica (ionico 80, wind 90) e lascia
      # bioelettrico il piu' resistente della matrice sul canale. SPEC-D4 sez.6
      # ("offensivo paga, difensivo non over-shielda"). PROPOSED -- ratify
      # master-dd su evidence N=40 (#2533).
      elettrico: 80
      psionico: 100
      mentale: 100
      gravita: 100
      ionico: 80
      earth: 120
      wind: 90
      dark: 110

  psionico:
    label: "Psionico"
    description: "Resistente a mentale/psionico/dark, fragile fisicamente."
    resistances:
      fisico: 120
      taglio: 120
      fuoco: 100
      elettrico: 100
      psionico: 70
      mentale: 70
      gravita: 100
      ionico: 100
      earth: 100
      wind: 100
      dark: 80

  termico:
    label: "Termico"
    # 2026-05-20 balance-auditor P2 description alignment: YAML resistances
    # mostrano 3-channel vulnerability (ionico 120, wind 110, dark 120) MA
    # description originale dichiarava solo 2 (ionico + dark). Update doc
    # per allineare description a YAML reality (additive doc fix, zero
    # behavior change). Master-dd verdict needed se design intent diverso
    # (es. restore wind: 100 per neutral) — flag come P2 monitor.
    description: "Resistente a fuoco/earth, vulnerabile a gelo (ionico proxy), wind e dark (glass-cannon 3-channel)."
    resistances:
      fisico: 100
      taglio: 100
      fuoco: 70
      elettrico: 100
      psionico: 100
      mentale: 100
      gravita: 100
      ionico: 120
      earth: 90
      wind: 110
      dark: 120

  adattivo:
    label: "Adattivo"
    description: "Nessuna resistenza/vulnerabilita marcata. Equilibrato."
    resistances:
      fisico: 100
      taglio: 100
      fuoco: 100
      elettrico: 100
      psionico: 100
      mentale: 100
      gravita: 100
      ionico: 100
      earth: 100
      wind: 100
      dark: 100

# Default per specie senza archetipo: neutro su tutto
default_archetype: adattivo
