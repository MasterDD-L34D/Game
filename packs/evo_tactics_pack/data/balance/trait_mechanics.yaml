# trait_mechanics.yaml — Valori combattimento per 30 trait del glossario TRT-02
# Sistema: TV/d20 (5-class balance framework)
# Versione: 0.1.0
# Ultimo aggiornamento: 2026-04-13

schema_version: "0.1.0"
balance_framework: tv_d20_5class

# Legenda campi:
#   attack_mod    — bonus al tiro d'attacco (d20)
#   defense_mod   — bonus alla difesa passiva / CA
#   damage_step   — step di danno addizionale (ogni step = +1d su scala MoS)
#   damage_channel — tipo di danno primario
#   resistances   — riduzione % per tipo di danno
#   on_hit_status  — condizione inflitta on-hit (nome + DC salvezza)
#   on_hit_stress_delta — variazione stress on-hit (+0.xx paura, -0.xx calma)
#   note_balance   — nota breve in italiano sulla scelta di bilanciamento

traits:

