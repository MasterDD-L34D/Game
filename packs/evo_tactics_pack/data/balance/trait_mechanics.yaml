schema_version: "0.2.0"
generated_from: >
  Fase 3 (euristica) + Fase 3-bis (pass Balancer manuale collaborativo).
  Vedi packs/evo_tactics_pack/data/balance/README.md per il framework,
  ADR-2026-04-13-rules-engine-d20.md per le decisioni di design,
  docs/catalog/traits_inventory.json per l'elenco dei 30 core,
  docs/balance/Frattura_Abissale_Sinaptica_balance_draft.md per i range numerici
  di riferimento, traits/parts_scaling.yaml per la baseline attack per_level.
notes: >
  Layer di bilanciamento meccanico per il rules engine d20. Questo file e' la
  fonte unica di verita' consumata dal resolver in services/rules/. I valori
  sono prodotti dal pass Balancer manuale della Fase 3-bis applicando le 5
  classi del framework (offensive / defensive / hybrid / mobility / utility)
  con regole deterministiche ancorate a fatti del repo: ogni mod e' giustificato
  dalla description_it del pack glossary o dalla famiglia_tipologia + usage_tags
  del trait. Canali canonici dal Frattura draft: elettrico, psionico, fisico,
  fuoco, gravita, mentale, taglio, ionico. Canale non-canonico introdotto:
  gelo (solo criostasi_adattiva; documentato nel README come estensione da
  stabilizzare nel prossimo combat pack). Distribuzione: offensive 4,
  defensive 9, hybrid 1, mobility 3, utility 13. Trait con mod non-zero: 14/30.
