# AI Personality Profiles — Evo-Tactics
# Pattern W5 (wesnoth micro-AI).
# Ogni profilo sovrascrive soglie da ai_intent_scores.yaml.
# Il Sistema carica un profilo per sessione/encounter.
#
# Vedi docs/planning/tactical-architecture-patterns.md §W5

version: "0.2.0"

# Asymmetric AI resource model (AI War pattern: Park 2012)
# SIS non usa la stessa economia dei PG. Niente PT pool, niente trait cost.
# Il Sistema riceve un "intent budget" per round derivato da sistema_pressure
# (vedi sistema_pressure.yaml). Questo e' un invariante di design:
# risolve fairness via outcome measurement, non via simmetria di regole.
# Source: reference_tactical_postmortems.md §A.2
sistema_resource_model:
  economy: "intent_budget"        # non "pt_pool"
  budget_source: "sistema_pressure"  # tier lookup da sistema_pressure.yaml
  ignores_fog_of_war: true        # SIS vede stato completo
  ignores_trait_costs: true       # intent non consuma PT/AP del PG model
  reinforcement_from_pressure: true
  note: "Asymmetry invariant — do NOT refactor to mirror player rules"

profiles:
  aggressive:
    label: "Aggressivo"
    description: "Attacca con poca considerazione per HP. Retreat solo in extremis."
    # Utility AI gradual rollout (ADR-2026-04-17 Q-001 T3.1): primo profile flip.
    # 2026-04-29 fix utilityBrain oscillation (action-aware TargetHealth/SelfHealth +
    # additive scoring) → kill-switch ripristinato a true. Apex tutorial_05 verificato
    # monotonic forward 5→4→3→2 (range scout). Vedi docs/reports/2026-04-29-utility-ai-oscillation-bug.md.
    #
    # FASE 2.x rollback 2026-05-09 (PR #2145 + K3 ablation):
    # tutorial_01 multi-unit kite scenarios mostrano 2026-04-29 fix
    # INCOMPLETO. N=40 K3 ablation ha confermato utility brain causale:
    #   - aggressive utility ON   → 65% WR (35% timeout, 29.5 avg rounds)
    #   - aggressive_no_util ABL  → 95% WR (0% timeout, 24.8 avg rounds)
    # ΔWR +30pp. Flip kill-switch back to false fino a fix utilityBrain
    # stickiness/commit-window (K4 follow-up audit).
    # Cross-ref: docs/research/2026-05-09-aggressive-h1-validation-oscillation.md
    use_utility_brain: false
    overrides:
      retreat_hp_pct: 0.15
      kite_buffer: 0
      default_attack_range: 2
      threat_passivity_threshold: 2 # reagisce prima al turtling

  # FASE 2.x — K3 ablation profile (PR #2145 follow-up). Identical
  # overrides al profilo `aggressive` ma `use_utility_brain: false` per
  # isolare il contributo del utility brain alla sottoperformance
  # osservata (aggressive 53.5% WR vs balanced 100% N=162). Validation
  # pattern: run batch `--profiles aggressive,aggressive_no_util` +
  # measure ΔWR delta:
  #   ΔWR > 30pp → utility brain root cause confirmed → patch shipped
  #   ΔWR < 10pp → utility brain non causale → escalate K4 stickiness
  #   ΔWR 10-30pp → partial → combine K3 + K4
  aggressive_no_util:
    label: "Aggressivo (utility OFF — K3 ablation)"
    description: "Aggressive con utility_brain disabilitato per isolare oscillation root cause."
    use_utility_brain: false
    overrides:
      retreat_hp_pct: 0.15
      kite_buffer: 0
      default_attack_range: 2
      threat_passivity_threshold: 2

  # FASE 2.x — K4 Approach A stickiness (PR #2146 follow-up). Re-enable
  # utility_brain ma con stickiness_weight additivo per inibire flip-flop
  # oscillation tra azioni near-tie. SPRT plan: confronto vs aggressive
  # (utility OFF baseline 90% WR):
  #   ≥ 88% WR → ship sticky come default + deprecate aggressive_no_util
  #   < 80% WR → escalate Approach B commit-window OR Approach C softmax
  aggressive_with_stickiness:
    label: "Aggressivo (utility ON + K4 stickiness 0.15)"
    description: "Aggressive con utility_brain riabilitato + stickiness term anti-flip-flop."
    use_utility_brain: true
    stickiness_weight: 0.15
    stickiness_direction_weight: 0.075
    overrides:
      retreat_hp_pct: 0.15
      kite_buffer: 0
      default_attack_range: 2
      threat_passivity_threshold: 2

  # K4 Approach A — heavier stickiness sweep. 0.15 N=20 N=20 mostra 55% WR
  # (insufficient vs 85% OFF baseline). 0.30 sweep candidate.
  aggressive_sticky_30:
    label: "Aggressivo (utility ON + K4 stickiness 0.30)"
    description: "Aggressive sticky 2x weight per testare oscillation suppression."
    use_utility_brain: true
    stickiness_weight: 0.30
    stickiness_direction_weight: 0.15
    overrides:
      retreat_hp_pct: 0.15
      kite_buffer: 0
      default_attack_range: 2
      threat_passivity_threshold: 2

  balanced:
    label: "Bilanciato"
    description: "Comportamento default del Sistema. Nessun override."
    # Utility AI gradual rollout: attesa metriche VC fairness su aggressive
    use_utility_brain: false
    overrides: {}

  cautious:
    label: "Cauto"
    description: "Retreat aggressivo, mantiene distanza. Preferisce kiting."
    # Utility AI gradual rollout: flip dopo validation su aggressive + balanced
    use_utility_brain: false
    overrides:
      # Balance audit 2026-04-25: retreat_hp_pct 0.5→0.3 (allinea al default
      # ai_intent_scores.yaml:23). Soglia 0.5 causava timeout deadlock hardcore
      # (66.7% timeout iter7, docs/playtest/2026-04-20-m7-iter7-phase-e-verdict.md:25).
      # Balance-auditor 2026-04-26: 0.3 = default = ZERO differentiation vs balanced.
      # Compromesso 0.4 (+33% vs default, -20% vs origin 0.5 deadlock-causante).
      # Restore behavioral cautious distinct senza regredire timeout fix.
      retreat_hp_pct: 0.4
      kite_buffer: 2
      default_attack_range: 2
      threat_passivity_threshold: 5 # tollera piu passivita prima di escalare
